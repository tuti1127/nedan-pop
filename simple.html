<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>値段POP作成ツール</title>
<style>
:root {
  --color-primary: #52c41a;
  --color-primary-hover: #73d13d;
  --color-primary-active: #389e0d;
  --color-primary-bg: #f6ffed;
  --color-primary-border: #b7eb8f;
  --color-error: #ff4d4f;
  --color-error-bg: #fff2f0;
  --color-price: #d48806;
  --color-text: rgba(0,0,0,0.88);
  --color-text-secondary: rgba(0,0,0,0.65);
  --color-text-tertiary: rgba(0,0,0,0.45);
  --color-text-quaternary: rgba(0,0,0,0.25);
  --color-bg-container: #ffffff;
  --color-bg-layout: #f5f5f5;
  --color-border: #d9d9d9;
  --color-border-secondary: #f0f0f0;
  --space-xxs: 4px;
  --space-xs: 8px;
  --space-sm: 12px;
  --space-md: 16px;
  --space-lg: 24px;
  --space-xl: 32px;
  --radius-xs: 2px;
  --radius-sm: 4px;
  --radius: 6px;
  --radius-lg: 8px;
  --shadow-1: 0 1px 2px 0 rgba(0,0,0,0.03), 0 1px 6px -1px rgba(0,0,0,0.02), 0 2px 4px 0 rgba(0,0,0,0.02);
  --shadow-2: 0 6px 16px 0 rgba(0,0,0,0.08), 0 3px 6px -4px rgba(0,0,0,0.12), 0 9px 28px 8px rgba(0,0,0,0.05);
  --transition: all 0.2s cubic-bezier(0.645, 0.045, 0.355, 1);
  --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans CJK JP', 'Hiragino Sans', 'Meiryo', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-family);
  background: var(--color-bg-layout);
  color: var(--color-text);
  font-size: 14px;
  line-height: 1.5714;
}

.header {
  background: var(--color-primary);
  color: #fff;
  padding: var(--space-sm) var(--space-md);
  font-size: 16px;
  font-weight: 600;
  text-align: center;
  box-shadow: var(--shadow-1);
}

.container {
  max-width: 600px;
  margin: 0 auto;
  padding: var(--space-md);
}

.section {
  background: var(--color-bg-container);
  border: 1px solid var(--color-border-secondary);
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  margin-bottom: var(--space-md);
  box-shadow: var(--shadow-1);
}

.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--color-primary-active);
  margin-bottom: var(--space-md);
  display: flex;
  align-items: center;
  gap: var(--space-xs);
}

.section-title::before {
  content: '';
  display: inline-block;
  width: 3px;
  height: 14px;
  background: var(--color-primary);
  border-radius: var(--radius-xs);
  flex-shrink: 0;
}

label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text-secondary);
  margin-bottom: var(--space-xxs);
}

input[type="text"],
input[type="number"] {
  width: 100%;
  height: 40px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: 4px 11px;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  color: var(--color-text);
  background: var(--color-bg-container);
  transition: var(--transition);
}

input[type="text"]:hover,
input[type="number"]:hover {
  border-color: var(--color-primary-hover);
}

input:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 2px rgba(82,196,26,0.1);
}

input.error {
  border-color: var(--color-error);
  box-shadow: 0 0 0 2px rgba(255,77,79,0.1);
  background: var(--color-error-bg);
}

.field { margin-bottom: var(--space-md); }

.tax-buttons {
  display: flex;
  gap: var(--space-xs);
}

.tax-btn {
  flex: 1;
  height: 40px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  background: var(--color-bg-container);
  font-size: 14px;
  font-weight: 600;
  color: var(--color-text-secondary);
  cursor: pointer;
  font-family: inherit;
  transition: var(--transition);
}

.tax-btn:hover {
  border-color: var(--color-primary-hover);
  color: var(--color-primary-hover);
}

.tax-btn.active {
  border-color: var(--color-primary);
  color: var(--color-primary);
  background: var(--color-primary-bg);
}

.price-display {
  background: var(--color-primary-bg);
  border: 1px solid var(--color-primary-border);
  border-radius: var(--radius);
  padding: var(--space-sm) var(--space-md);
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-md);
}

.price-label {
  font-size: 13px;
  color: var(--color-primary-active);
  font-weight: 600;
}

.price-value {
  font-size: 22px;
  font-weight: 600;
  color: var(--color-primary-active);
}

.add-btn {
  width: 100%;
  height: 40px;
  background: var(--color-primary);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: var(--transition);
  box-shadow: var(--shadow-1);
}

.add-btn:hover {
  background: var(--color-primary-hover);
  transform: translateY(-1px);
  box-shadow: var(--shadow-2);
}

.add-btn:active {
  background: var(--color-primary-active);
  transform: translateY(0);
  box-shadow: var(--shadow-1);
}

.list-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--space-sm) 0;
  border-bottom: 1px solid var(--color-border-secondary);
}

.list-item:last-child { border-bottom: none; }

.item-name {
  font-weight: 600;
  font-size: 14px;
  color: var(--color-text);
}

.item-price {
  color: var(--color-price);
  font-weight: 600;
  font-size: 13px;
}

.delete-btn {
  width: 28px;
  height: 28px;
  border: 1px solid var(--color-border);
  background: var(--color-bg-container);
  color: var(--color-text-tertiary);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: var(--transition);
}

.delete-btn:hover {
  border-color: var(--color-error);
  color: var(--color-error);
  background: var(--color-error-bg);
}

.empty-message {
  text-align: center;
  color: var(--color-text-quaternary);
  padding: var(--space-xl) var(--space-lg);
  font-size: 14px;
}

.empty-message::before {
  content: '';
  display: block;
  width: 40px;
  height: 40px;
  border: 2px dashed var(--color-border);
  border-radius: 50%;
  margin: 0 auto var(--space-sm);
}

.layout-buttons {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-xs);
}

.layout-btn {
  padding: 5px var(--space-sm);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  background: var(--color-bg-container);
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text-secondary);
  cursor: pointer;
  font-family: inherit;
  transition: var(--transition);
}

.layout-btn:hover {
  border-color: var(--color-primary-hover);
  color: var(--color-primary-hover);
}

.layout-btn.active {
  border-color: var(--color-primary);
  color: var(--color-primary);
  background: var(--color-primary-bg);
}

.preview-area {
  background: var(--color-bg-layout);
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  padding: var(--space-sm);
  margin-bottom: var(--space-md);
}

.preview-grid {
  display: grid;
  gap: 4px;
  aspect-ratio: 210 / 297;
}

.pop-card {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px;
  background: #fffef8;
  overflow: hidden;
  text-align: center;
}

.pop-name {
  font-weight: 600;
  color: #2d5a1e;
  line-height: 1.2;
  margin-bottom: 4px;
  word-break: break-all;
}

.pop-price {
  font-weight: 700;
  color: var(--color-price);
  line-height: 1.1;
}

.pop-tax {
  font-size: 0.5em;
  color: var(--color-text-tertiary);
}

.print-btn {
  width: 100%;
  height: 40px;
  background: var(--color-primary);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: var(--transition);
  box-shadow: 0 2px 8px rgba(82,196,26,0.25);
}

.print-btn:hover {
  background: var(--color-primary-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(82,196,26,0.35);
}

.print-btn:active {
  background: var(--color-primary-active);
  transform: translateY(0);
}

.print-btn:disabled {
  background: var(--color-border);
  color: var(--color-text-quaternary);
  box-shadow: none;
  cursor: not-allowed;
  transform: none;
}

.design-buttons {
  display: flex;
  gap: var(--space-xs);
}

.design-btn {
  flex: 1;
  height: 40px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius);
  background: var(--color-bg-container);
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text-secondary);
  cursor: pointer;
  font-family: inherit;
  transition: var(--transition);
}

.design-btn:hover {
  border-color: var(--color-primary-hover);
  color: var(--color-primary-hover);
}

.design-btn.active {
  border-color: var(--color-primary);
  color: var(--color-primary);
  background: var(--color-primary-bg);
}

#print-area { display: none; }

@media print {
  body { background: white; padding: 0; margin: 0; }
  .header, .container { display: none !important; }
  #print-area {
    display: grid !important;
    width: 100%;
    height: 100vh;
    padding: 5mm;
  }
  #print-area .pop-card {
    border: 1px solid #ccc;
    break-inside: avoid;
  }
}
</style>
</head>

<body>

<div class="header">値段POP作成ツール</div>

<div class="container">

  <div class="section">
    <div class="section-title">商品を追加</div>

    <div class="field">
      <label>商品名</label>
      <input type="text" id="name-input" placeholder="例: ポトス">
    </div>

    <div class="field">
      <label>税抜価格（円）</label>
      <input type="number" id="price-input" placeholder="例: 980">
    </div>

    <div class="field">
      <label>税率</label>
      <div class="tax-buttons">
        <button class="tax-btn" data-rate="0.08" onclick="selectTax(this)">8%</button>
        <button class="tax-btn active" data-rate="0.10" onclick="selectTax(this)">10%</button>
      </div>
    </div>

    <div class="price-display">
      <span class="price-label">税込価格</span>
      <span class="price-value" id="tax-price">¥0</span>
    </div>

    <button class="add-btn" onclick="addItem()">+ 追加する</button>
  </div>

  <div class="section">
    <div class="section-title">追加済みリスト（<span id="item-count">0</span>件）</div>
    <div id="item-list">
      <div class="empty-message">商品を追加してください</div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">印刷設定</div>

    <div class="field">
      <label>レイアウト（A4用紙に何面入れるか）</label>
      <div class="layout-buttons" id="layout-buttons">
        <button class="layout-btn" data-cols="1" data-rows="1" onclick="selectLayout(this)">1面</button>
        <button class="layout-btn" data-cols="1" data-rows="2" onclick="selectLayout(this)">2面</button>
        <button class="layout-btn active" data-cols="2" data-rows="2" onclick="selectLayout(this)">4面</button>
        <button class="layout-btn" data-cols="2" data-rows="3" onclick="selectLayout(this)">6面</button>
        <button class="layout-btn" data-cols="3" data-rows="3" onclick="selectLayout(this)">9面</button>
        <button class="layout-btn" data-cols="4" data-rows="4" onclick="selectLayout(this)">16面</button>
      </div>
    </div>

    <div class="field">
      <label>デザイン</label>
      <div class="design-buttons" id="design-buttons">
        <button class="design-btn active" data-design="simple" onclick="selectDesign(this)">シンプル</button>
        <button class="design-btn" data-design="frame" onclick="selectDesign(this)">枠あり</button>
        <button class="design-btn" data-design="leaf" onclick="selectDesign(this)">リーフ</button>
      </div>
    </div>

    <div class="preview-area">
      <div class="preview-grid" id="preview-grid"></div>
    </div>

    <button class="print-btn" id="print-btn" onclick="printPops()" disabled>
      印刷する
    </button>
  </div>

</div>

<div id="print-area"></div>

<script>
var items = [];
var currentTaxRate = 0.10;
var layoutCols = 2;
var layoutRows = 2;
var currentDesign = 'simple';
var errorTimers = {};

function selectTax(button) {
  document.querySelectorAll('.tax-btn').forEach(function(b) { b.classList.remove('active'); });
  button.classList.add('active');
  currentTaxRate = parseFloat(button.dataset.rate);
  updateTaxPrice();
}

function updateTaxPrice() {
  var price = parseInt(document.getElementById('price-input').value) || 0;
  var taxPrice = Math.floor(price * (1 + currentTaxRate));
  document.getElementById('tax-price').textContent = '¥' + taxPrice.toLocaleString();
}

function addItem() {
  var nameInput = document.getElementById('name-input');
  var priceInput = document.getElementById('price-input');
  var name = nameInput.value.trim();
  var price = parseInt(priceInput.value) || 0;

  if (!name) {
    nameInput.classList.add('error');
    clearTimeout(errorTimers['name']);
    errorTimers['name'] = setTimeout(function() { nameInput.classList.remove('error'); }, 1500);
    return;
  }
  if (price <= 0) {
    priceInput.classList.add('error');
    clearTimeout(errorTimers['price']);
    errorTimers['price'] = setTimeout(function() { priceInput.classList.remove('error'); }, 1500);
    return;
  }

  items.push({ name: name, price: price, taxRate: currentTaxRate, taxPrice: Math.floor(price * (1 + currentTaxRate)) });
  nameInput.value = '';
  priceInput.value = '';
  document.getElementById('tax-price').textContent = '¥0';
  nameInput.focus();
  renderList();
  renderPreview();
}

function renderList() {
  var listEl = document.getElementById('item-list');
  document.getElementById('item-count').textContent = items.length;
  document.getElementById('print-btn').disabled = items.length === 0;

  if (items.length === 0) {
    listEl.innerHTML = '<div class="empty-message">商品を追加してください</div>';
    return;
  }

  var html = '';
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    html += '<div class="list-item">';
    html += '<div><div class="item-name">' + escapeHtml(item.name) + '</div>';
    html += '<div class="item-price">¥' + item.taxPrice.toLocaleString() + '（税込）</div></div>';
    html += '<button class="delete-btn" onclick="removeItem(' + i + ')">✕</button>';
    html += '</div>';
  }
  listEl.innerHTML = html;
}

function removeItem(index) {
  items.splice(index, 1);
  renderList();
  renderPreview();
}

function selectLayout(button) {
  document.querySelectorAll('.layout-btn').forEach(function(b) { b.classList.remove('active'); });
  button.classList.add('active');
  layoutCols = parseInt(button.dataset.cols);
  layoutRows = parseInt(button.dataset.rows);
  renderPreview();
}

function selectDesign(button) {
  document.querySelectorAll('.design-btn').forEach(function(b) { b.classList.remove('active'); });
  button.classList.add('active');
  currentDesign = button.dataset.design;
  renderPreview();
}

function createPopCardHtml(item, fontSize) {
  var nameSize = fontSize;
  var priceSize = fontSize * 1.6;
  var cardStyle = '';

  if (currentDesign === 'simple') {
    cardStyle = 'background:#fffef8;';
  } else if (currentDesign === 'frame') {
    cardStyle = 'background:#fffef8; border:3px solid #2d7a4f;';
  } else if (currentDesign === 'leaf') {
    cardStyle = 'background:linear-gradient(135deg, #f0f7f0 0%, #e8f5e0 100%); border:1px solid #b5d6a7;';
  }

  return '<div class="pop-card" style="' + cardStyle + '">'
    + '<div class="pop-name" style="font-size:' + nameSize + 'px;">' + escapeHtml(item.name) + '</div>'
    + '<div class="pop-price" style="font-size:' + priceSize + 'px;">¥' + item.taxPrice.toLocaleString()
    + '<span class="pop-tax">（税込）</span></div>'
    + '</div>';
}

function getFontSize(totalCells) {
  if (totalCells <= 1) return 22;
  if (totalCells <= 2) return 18;
  if (totalCells <= 4) return 14;
  if (totalCells <= 6) return 11;
  if (totalCells <= 9) return 9;
  return 7;
}

function renderPreview() {
  var grid = document.getElementById('preview-grid');
  grid.style.gridTemplateColumns = 'repeat(' + layoutCols + ', 1fr)';
  grid.style.gridTemplateRows = 'repeat(' + layoutRows + ', 1fr)';
  var totalCells = layoutCols * layoutRows;
  var fontSize = getFontSize(totalCells);
  var html = '';
  for (var i = 0; i < totalCells; i++) {
    if (i < items.length) {
      html += createPopCardHtml(items[i], fontSize);
    } else {
      html += '<div class="pop-card" style="border-style:dashed;color:#ccc;font-size:' + fontSize + 'px;">空き</div>';
    }
  }
  grid.innerHTML = html;
}

function printPops() {
  var printArea = document.getElementById('print-area');
  var totalCells = layoutCols * layoutRows;
  var fontSizeMap = [0, 48, 36, 28, 28, 22, 22, 18, 18, 18, 14, 14, 14, 14, 14, 14, 14];
  var fontSize = fontSizeMap[totalCells] || 14;

  printArea.style.gridTemplateColumns = 'repeat(' + layoutCols + ', 1fr)';
  printArea.style.gridTemplateRows = 'repeat(' + layoutRows + ', 1fr)';
  printArea.style.gap = '2mm';

  var html = '';
  for (var i = 0; i < totalCells; i++) {
    if (i < items.length) {
      html += createPopCardHtml(items[i], fontSize);
    } else {
      html += '<div class="pop-card" style="border-style:dashed;color:#ccc;">空き</div>';
    }
  }
  printArea.innerHTML = html;
  window.print();
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(text));
  return div.innerHTML;
}

document.getElementById('price-input').addEventListener('input', updateTaxPrice);
document.getElementById('name-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('price-input').focus();
});
document.getElementById('price-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') addItem();
});

renderPreview();
</script>
</body>
</html>
