<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>植物のある暮らし — まもなくオープン</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #2d6a2d;
  --primary-dark: #1b5e20;
  --primary-light: #4CAF50;
  --accent: #a5d6a7;
  --bg: #f6faf6;
  --surface: #ffffff;
  --border: #c8e6c9;
  --text: #0f1f0f;
  --text-sub: #5a7a5a;
  --radius: 12px;
  --shadow: 0 4px 16px rgba(45,106,45,0.13);
}

html { font-size: 16px; -webkit-text-size-adjust: 100%; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Meiryo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== ヒーローセクション ===== */
.hero {
  background: linear-gradient(160deg, var(--primary-dark) 0%, var(--primary) 55%, var(--primary-light) 100%);
  color: #ffffff;
  text-align: center;
  padding: 60px 20px 48px;
  position: relative;
  overflow: hidden;
}

/* 背景装飾（葉のシルエット風の円） */
.hero::before {
  content: '';
  position: absolute;
  top: -60px;
  right: -60px;
  width: 240px;
  height: 240px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  pointer-events: none;
}
.hero::after {
  content: '';
  position: absolute;
  bottom: -80px;
  left: -40px;
  width: 200px;
  height: 200px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  pointer-events: none;
}

.hero-icon {
  font-size: 3.5rem;
  margin-bottom: 16px;
  display: block;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.18));
}

.shop-name {
  font-size: 1.9rem;
  font-weight: 800;
  letter-spacing: 0.04em;
  margin-bottom: 10px;
  line-height: 1.25;
  text-shadow: 0 1px 4px rgba(0,0,0,0.15);
}

.catchcopy {
  font-size: 1rem;
  opacity: 0.9;
  letter-spacing: 0.05em;
  line-height: 1.6;
  margin-bottom: 0;
}

/* ===== 「まもなくオープン」バナー ===== */
.open-banner {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: #ffffff;
  color: var(--primary-dark);
  margin: -1px 0 0;
  padding: 14px 20px;
  border-bottom: 3px solid var(--primary-light);
}

.open-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  color: #ffffff;
  font-size: 0.95rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  padding: 8px 20px;
  border-radius: 100px;
  box-shadow: 0 3px 10px rgba(45,106,45,0.30);
  animation: pulse 2.4s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 3px 10px rgba(45,106,45,0.30); }
  50%       { box-shadow: 0 3px 18px rgba(45,106,45,0.50); }
}

.open-badge-dot {
  width: 8px;
  height: 8px;
  background: #ffffff;
  border-radius: 50%;
  display: inline-block;
  opacity: 0.85;
}

/* ===== 母の日カウントダウン ===== */
.countdown-banner {
  background: linear-gradient(135deg, #fff8f0 0%, #fff0f5 100%);
  border-bottom: 2px solid #f8bbd0;
  padding: 14px 20px;
  text-align: center;
}

.countdown-inner {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-size: 0.93rem;
  color: #c2185b;
  font-weight: 700;
}

.countdown-icon {
  font-size: 1.15rem;
}

.countdown-days {
  font-size: 1.5rem;
  font-weight: 900;
  color: #ad1457;
  line-height: 1;
}

/* ===== メインコンテンツ ===== */
.main {
  flex: 1;
  max-width: 540px;
  margin: 0 auto;
  padding: 28px 16px 40px;
  display: flex;
  flex-direction: column;
  gap: 24px;
  width: 100%;
}

/* メッセージカード */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 20px;
  box-shadow: var(--shadow);
}

.card-title {
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--primary);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.message-text {
  font-size: 0.97rem;
  line-height: 1.75;
  color: var(--text);
}

/* ===== SNSフォローエリア ===== */
.cta-heading {
  text-align: center;
  font-size: 0.88rem;
  color: var(--text-sub);
  line-height: 1.65;
  padding: 0 4px;
}

.cta-heading strong {
  display: block;
  font-size: 1.05rem;
  color: var(--text);
  margin-bottom: 4px;
}

.sns-buttons {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 15px 20px;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  text-decoration: none;
  cursor: pointer;
  border: none;
  transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
  box-shadow: 0 3px 10px rgba(0,0,0,0.10);
}
.btn:active {
  transform: scale(0.97);
}

/* Instagramボタン */
.btn-instagram {
  background: linear-gradient(135deg, #833ab4 0%, #c13584 40%, #e1306c 70%, #fd1d1d 100%);
  color: #ffffff;
}
.btn-instagram:hover {
  filter: brightness(1.08);
  box-shadow: 0 5px 16px rgba(193,53,132,0.35);
}

/* Xボタン */
.btn-twitter {
  background: #000000;
  color: #ffffff;
}
.btn-twitter:hover {
  filter: brightness(1.22);
  box-shadow: 0 5px 14px rgba(0,0,0,0.25);
}

/* SNSアイコン（SVGインライン） */
.sns-icon {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  fill: currentColor;
}

/* ===== 区切り線 ===== */
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 0;
}

/* ===== フッター ===== */
footer {
  text-align: center;
  padding: 20px 16px;
  font-size: 0.78rem;
  color: var(--text-sub);
  background: var(--surface);
  border-top: 1px solid var(--border);
  letter-spacing: 0.03em;
}

/* ===== レスポンシブ調整（管理者パネル削除済み） ===== */

/* ===== レスポンシブ調整 ===== */
@media (max-width: 400px) {
  .shop-name { font-size: 1.55rem; }
  .hero { padding: 44px 16px 36px; }
  .card { padding: 18px 14px; }
}
@media (min-width: 600px) {
  .sns-buttons {
    flex-direction: row;
  }
  .btn {
    flex: 1;
  }
  .admin-fields {
    flex-direction: row;
    align-items: flex-end;
  }
  .admin-field {
    flex: 1;
  }
}
</style>
</head>
<body>

<!-- ヒーローセクション -->
<section class="hero">
  <span class="hero-icon">🌿</span>
  <h1 class="shop-name">植物のある暮らし</h1>
  <p class="catchcopy">植物を通じて、暮らしと心を豊かにする</p>
</section>

<!-- まもなくオープンバナー -->
<div class="open-banner">
  <div class="open-badge">
    <span class="open-badge-dot"></span>
    まもなくオープン
  </div>
</div>

<!-- 母の日カウントダウンバナー -->
<div class="countdown-banner" id="countdownBanner">
  <div class="countdown-inner" id="countdownInner">
    <!-- JSで動的に挿入 -->
  </div>
</div>

<!-- メインコンテンツ -->
<main class="main">

  <!-- メッセージカード -->
  <div class="card">
    <div class="card-title">お知らせ</div>
    <p class="message-text">
      メルカリShopsにて母の日ギフト向け植物を販売予定です。<br>
      開店まで今しばらくお待ちください。
    </p>
  </div>

  <hr class="divider">

  <!-- CTAセクション -->
  <p class="cta-heading">
    <strong>販売開始をいち早く知りたい方はSNSをフォローしてください</strong>
    開店のお知らせ・新着植物の情報をいち早くお届けします
  </p>

  <!-- SNSボタン -->
  <div class="sns-buttons">

    <!-- Instagramボタン（URLをここに直接記入してください: href="https://www.instagram.com/あなたのアカウント名"） -->
    <a id="btn-instagram" href="https://www.instagram.com/" class="btn btn-instagram">
      <svg class="sns-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M12 2.163c3.204 0 3.584.012 4.85.07 1.366.062 2.633.334 3.608 1.31.975.975 1.248 2.242 1.31 3.608.058 1.266.07 1.646.07 4.85s-.012 3.584-.07 4.85c-.062 1.366-.335 2.633-1.31 3.608-.975.975-2.242 1.248-3.608 1.31-1.266.058-1.646.07-4.85.07s-3.584-.012-4.85-.07c-1.366-.062-2.633-.335-3.608-1.31-.975-.975-1.248-2.242-1.31-3.608C2.175 15.584 2.163 15.204 2.163 12s.012-3.584.07-4.85c.062-1.366.335-2.633 1.31-3.608.975-.975 2.242-1.248 3.608-1.31C8.416 2.175 8.796 2.163 12 2.163zm0-2.163C8.741 0 8.333.013 7.053.072 5.197.157 3.355.673 2.014 2.014.673 3.355.157 5.197.072 7.053.013 8.333 0 8.741 0 12c0 3.259.013 3.667.072 4.947.085 1.856.601 3.698 1.942 5.039 1.341 1.341 3.183 1.857 5.039 1.942C8.333 23.987 8.741 24 12 24c3.259 0 3.667-.013 4.947-.072 1.856-.085 3.698-.601 5.039-1.942 1.341-1.341 1.857-3.183 1.942-5.039.059-1.28.072-1.688.072-4.947s-.013-3.667-.072-4.947c-.085-1.856-.601-3.698-1.942-5.039C20.645.673 18.803.157 16.947.072 15.667.013 15.259 0 12 0zm0 5.838a6.162 6.162 0 1 0 0 12.324 6.162 6.162 0 0 0 0-12.324zm0 10.162a4 4 0 1 1 0-8 4 4 0 0 1 0 8zm6.406-11.845a1.44 1.44 0 1 0 0 2.881 1.44 1.44 0 0 0 0-2.881z"/>
      </svg>
      Instagramをフォローする
    </a>

    <!-- Xボタン（URLをここに直接記入してください: href="https://x.com/あなたのアカウント名"） -->
    <a id="btn-twitter" href="https://twitter.com/" class="btn btn-twitter">
      <svg class="sns-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.63 5.905-5.63zm-1.161 17.52h1.833L7.084 4.126H5.117L17.083 19.77z"/>
      </svg>
      Xをフォローする
    </a>

  </div>

</main>

<!-- フッター -->
<footer>
  <p>© 2026 植物のある暮らし</p>
</footer>

<!-- 管理者設定パネルは削除済み（セキュリティ対応）。SNS URLはHTMLのhref属性に直接記入してください。 -->

<script>
// ===== 母の日カウントダウン =====
(function() {
  var today = new Date();
  var year = today.getFullYear();
  // 母の日: 5月10日
  var mothersDay = new Date(year, 4, 10); // month は0始まり
  // 今日が5/10を過ぎていたら翌年を対象にする
  if (today > mothersDay) {
    mothersDay = new Date(year + 1, 4, 10);
  }
  var diffMs = mothersDay - today;
  var diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

  var inner = document.getElementById('countdownInner');
  var html = '';

  if (diffDays >= 30) {
    html = '<span class="countdown-icon">🌸</span><span>まもなくオープン予定（母の日まで' + diffDays + '日）</span>';
  } else if (diffDays >= 14) {
    html = '<span class="countdown-icon">🌸</span><span>母の日ギフト、準備中です（あと' + diffDays + '日）</span>';
  } else if (diffDays >= 7) {
    html = '<span class="countdown-icon">🌸</span><span class="countdown-days">' + diffDays + '</span><span>日後は母の日！お早めにどうぞ</span>';
  } else if (diffDays > 0) {
    html = '<span class="countdown-icon">🌸</span><span>母の日まで残りわずか！お急ぎください（あと' + diffDays + '日）</span>';
  } else {
    // 当日または過ぎた場合
    document.getElementById('countdownBanner').style.display = 'none';
    return;
  }

  inner.innerHTML = html;
})();

// SNS URLはHTMLのhref属性に直接ハードコードされています。
// localStorage・管理者パネルは削除済み（セキュリティ対応）。
</script>

</body>
</html>
