<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PricePop</title>
<style>/* ─── Reset & Variables ─────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --ink:   #0f1410;
  --ink2:  #374a34;
  --ink3:  #7d9178;
  --bg:    #f0ede6;
  --bg2:   #e5e1d8;
  --sf:    #fafaf7;
  --wh:    #ffffff;
  --gr:    #1a5c32;
  --gr2:   #27794a;
  --gr3:   #4a9e68;
  --gt:    rgba(26,92,50,.10);
  --am:    #b55a18;
  --amt:   rgba(181,90,24,.09);
  --rd:    #c0392b;
  --rdt:   rgba(192,57,43,.08);
  --ln:    rgba(15,20,16,.09);
  --ln2:   rgba(15,20,16,.05);
  --sh:    0 1px 3px rgba(15,20,16,.07),0 4px 12px rgba(15,20,16,.05);
  --sh2:   0 2px 8px rgba(15,20,16,.10),0 8px 28px rgba(15,20,16,.07);
  --r:     14px;
  --r2:    10px;
  --r3:    7px;
  --col:   480px;
  --nav:   58px;
  --safe:  env(safe-area-inset-bottom,0px);
}
html{font-size:16px;-webkit-text-size-adjust:100%;overflow-x:hidden;}
body{
  font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Meiryo','Yu Gothic',sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  padding-bottom:calc(var(--nav) + var(--safe));
}
@media(min-width:680px){body{padding-bottom:0;}}

/* ── Header ── */
.hdr{background:var(--ink);height:50px;padding:0 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;width:100%;}
.hdr-logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px;color:#fff;letter-spacing:.06em;}
.hdr-dot{width:7px;height:7px;background:var(--gr3);border-radius:50%;}

/* ── Top Nav (PC) ── */
.topnav{display:none;background:var(--ink2);padding:0 18px;gap:0;width:100%;}
.tnb{height:38px;padding:0 16px;border:none;background:none;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.08em;color:rgba(255,255,255,.42);cursor:pointer;border-bottom:2px solid transparent;text-transform:uppercase;transition:all .15s;}
.tnb.active{color:#fff;border-bottom-color:var(--gr3);}
@media(min-width:680px){body{padding-bottom:0;}.bnav{display:none!important;}.topnav{display:flex;}}

/* ── Bottom Nav ── */
.bnav{position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav) + var(--safe));background:rgba(250,250,247,.94);border-top:1px solid var(--ln);backdrop-filter:saturate(200%) blur(20px);-webkit-backdrop-filter:saturate(200%) blur(20px);display:flex;align-items:flex-start;padding-top:5px;z-index:200;width:100%;}
.bnb{flex:1;height:50px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;font-family:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.bnb-i{font-size:21px;line-height:1;transition:transform .2s cubic-bezier(.34,1.56,.64,1);}
.bnb.active .bnb-i{transform:scale(1.2);}
.bnb-l{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.05em;text-transform:uppercase;}
.bnb.active .bnb-l{color:var(--gr);}

/* ── Main ── */
.main{width:100%;max-width:100%;padding:16px 14px 20px;overflow-x:hidden;}
@media(min-width:680px){.main{padding:20px 24px 28px;}}
.panel{display:none;}.panel.on{display:block;}

/* ════════════════════════════════════
   EFO入力フィールド（JS動的生成用）
   ════════════════════════════════════ */

/* ── 各フィールド行（縦ライン統一） ── */
.efo-field{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--ln2);
  min-height:56px;
  transition:background .1s;
  position:relative;
}
.efo-field:last-of-type{border-bottom:none;}
.efo-field:focus-within{background:rgba(26,92,50,.025);}
.efo-field.disabled-row{opacity:.5;}

/* 左端インジケータ（ポイント2：縦ライン統一） */
.efo-field-lead{
  width:40px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-right:1px solid var(--ln2);
}
.efo-field-lead input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--gr);}
/* 必須インジケータバー */
.efo-field-req{width:4px;height:60%;min-height:28px;background:var(--gr);border-radius:2px;}

/* ラベル列（固定幅・縦ライン統一） */
.efo-field-lbl{
  width:84px;flex-shrink:0;
  padding:10px 10px 10px 13px;
  display:flex;flex-direction:column;justify-content:center;gap:4px;
  border-right:1px solid var(--ln2);
}
.efo-lbl-text{font-size:12px;font-weight:700;color:var(--ink2);line-height:1.3;}
/* 必須バッジ（ポイント8：赤・コンパクト） */
.efo-req-badge{
  font-size:9px;font-weight:700;color:#fff;
  background:var(--rd);border-radius:3px;
  padding:1px 5px;display:inline-block;
  width:fit-content;letter-spacing:.05em;
}
/* 任意バッジ（ポイント8：グレー） */
.efo-opt-badge{
  font-size:9px;font-weight:700;color:var(--ink3);
  background:var(--bg2);border-radius:3px;
  padding:1px 5px;display:inline-block;width:fit-content;
}

/* 入力フィールド列 */
.efo-field-inp{flex:1;min-width:0;display:flex;align-items:center;}
/* 入力欄本体（ポイント5・10：16px以上でiOS拡大防止） */
.efo-inp{
  width:100%;height:56px;padding:0 14px;
  border:none;outline:none;
  font-family:inherit;font-size:16px;color:var(--ink);
  background:transparent;-webkit-appearance:none;
}
.efo-inp::placeholder{color:rgba(15,20,16,.28);font-size:14px;}
.efo-inp:disabled{cursor:not-allowed;}

/* 価格入力 */
.efo-price-inp{text-align:right;font-weight:700;color:var(--am);font-size:18px;padding-right:5px;}
.efo-price-unit{font-size:11px;color:var(--ink3);padding-right:12px;flex-shrink:0;font-weight:600;white-space:nowrap;}

/* ── 追加済みリスト（ミニポップグリッド） ── */

/* ミニポップグリッド */
.pop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:7px;}
.pop-item{position:relative;border-radius:var(--r3);overflow:hidden;}
.pop-item canvas{width:100%;display:block;border-radius:var(--r3);box-shadow:var(--sh);transition:transform .18s;}
.pop-item:hover canvas{transform:translateY(-2px);}
.pop-del{position:absolute;top:5px;right:5px;width:26px;height:26px;background:rgba(15,20,16,.55);border:none;border-radius:50%;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:1;-webkit-tap-highlight-color:transparent;}
@media(min-width:680px){.pop-del{opacity:0;}.pop-item:hover .pop-del{opacity:1;}}
.pop-del:active,.pop-del:hover{background:var(--rd);}
.pop-confirm{position:absolute;inset:0;border-radius:var(--r3);background:rgba(10,14,10,.82);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;opacity:0;pointer-events:none;transition:opacity .18s;}
.pop-confirm.show{opacity:1;pointer-events:all;}
.pop-confirm-msg{color:#fff;font-size:11px;font-weight:700;text-align:center;line-height:1.5;padding:0 8px;}
.pop-confirm-btns{display:flex;gap:6px;}
.pop-confirm-yes{height:28px;padding:0 12px;border:none;border-radius:7px;background:var(--rd);color:#fff;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;}
.pop-confirm-no{height:28px;padding:0 10px;border:1.5px solid rgba(255,255,255,.35);border-radius:7px;background:transparent;color:#fff;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;}
.pop-confirm-bar{width:66%;height:3px;background:rgba(255,255,255,.14);border-radius:2px;overflow:hidden;}
.pop-confirm-bar-inner{height:100%;background:var(--rd);border-radius:2px;}

/* ── プロパティパネル（テンプレート編集用・JS生成） ── */

.prop-sec{margin-top:-1px;}
.prop-body{padding:10px 13px 13px;}
.prop-row{margin-bottom:9px;}
.prop-row:last-child{margin-bottom:0;}
.prop-lbl{font-size:9px;font-weight:700;color:var(--ink3);margin-bottom:4px;letter-spacing:.07em;text-transform:uppercase;}
.prop-inp{width:100%;height:34px;padding:0 10px;border:1.5px solid var(--ln);border-radius:var(--r3);font-family:inherit;font-size:14px;color:var(--ink);background:var(--bg);outline:none;-webkit-appearance:none;}
.prop-inp:focus{border-color:var(--gr);}
.prop-h{display:flex;align-items:center;gap:5px;}
.prop-btn{flex:1;height:32px;padding:0 6px;border:1.5px solid var(--ln);border-radius:var(--r3);background:var(--bg);font-family:inherit;font-size:11px;font-weight:700;color:var(--ink2);cursor:pointer;transition:all .1s;}
.prop-btn:active,.prop-btn:hover,.prop-btn.on{border-color:var(--gr);color:var(--gr);background:var(--gt);}
.prop-btn-row{display:flex;gap:4px;flex-wrap:wrap;}
input[type=range]{width:100%;accent-color:var(--gr);height:20px;}
input[type=color]{width:100%;height:36px;border:1.5px solid var(--ln);border-radius:var(--r3);padding:3px;cursor:pointer;-webkit-appearance:none;}

/* 設定パネル */
.card{background:var(--sf);border:1px solid var(--ln);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--sh);}
.card-hdr{padding:11px 15px;border-bottom:1px solid var(--ln2);font-size:12px;font-weight:700;background:var(--bg);}
.card-body{padding:14px 15px;}
.grid-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
@media(max-width:360px){.grid-wrap{grid-template-columns:repeat(3,1fr);}}
.gc{display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 5px 7px;border:1.5px solid var(--ln);border-radius:var(--r2);background:var(--bg);cursor:pointer;transition:all .12s;position:relative;}
.gc:active{border-color:var(--gr);}
.gc.sel{border-color:var(--gr);background:var(--gt);}
.gc-vis{display:grid;gap:2px;margin-bottom:1px;}
.gc-cell{background:var(--bg2);border-radius:2px;}
.gc.sel .gc-cell{background:var(--gr);}
.gc-lbl{font-size:11px;font-weight:700;color:var(--ink);}
.gc.sel .gc-lbl{color:var(--gr);}
.gc-sub{font-size:9px;color:var(--ink3);text-align:center;}
.def-tag{position:absolute;top:-1px;right:-1px;font-size:8px;font-weight:700;background:var(--gr);color:#fff;border-radius:0 var(--r2) 0 5px;padding:2px 6px;}
.orient-info{font-size:12px;color:var(--ink2);background:var(--gt);border-radius:var(--r3);padding:9px 12px;margin-top:10px;line-height:1.9;}
.tax-hint{font-size:12px;color:var(--ink2);line-height:1.8;background:var(--bg);border-radius:var(--r3);padding:9px 12px;margin-top:8px;}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(8,12,8,.45);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:0;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(4px);}
@media(min-width:480px){.modal-ov{align-items:center;padding:16px;}}
.modal-ov.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--wh);border-radius:18px 18px 0 0;width:100%;max-width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.2);transform:translateY(30px);transition:transform .24s cubic-bezier(.34,1.2,.64,1);}
@media(min-width:480px){.modal-box{border-radius:16px;max-width:480px;max-height:none;transform:translateY(14px) scale(.98);}}
.modal-ov.open .modal-box{transform:translateY(0) scale(1);}
.modal-drag{width:30px;height:4px;background:var(--bg2);border-radius:2px;margin:10px auto 0;}
@media(min-width:480px){.modal-drag{display:none;}}
.modal-hdr{padding:13px 16px 11px;border-bottom:1px solid var(--ln2);display:flex;align-items:center;justify-content:space-between;background:var(--bg);}
.modal-title{font-size:14px;font-weight:700;}
.modal-close{width:28px;height:28px;border:none;background:var(--bg2);cursor:pointer;font-size:14px;color:var(--ink2);display:flex;align-items:center;justify-content:center;border-radius:7px;}
.modal-body{padding:14px 16px;}
.modal-foot{padding:10px 16px 16px;display:flex;gap:7px;justify-content:flex-end;}
.m-btn{height:40px;padding:0 16px;border:none;border-radius:var(--r3);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
.m-btn-p{background:var(--gr);color:#fff;}
.m-btn-p:disabled{background:var(--bg2);color:var(--ink3);}
.m-btn-g{background:var(--bg);color:var(--ink2);border:1.5px solid var(--ln);}
.col-sel-wrap{display:flex;gap:9px;margin-top:10px;}
.col-sel{flex:1;}
.col-sel label{display:block;font-size:10px;font-weight:700;color:var(--ink2);margin-bottom:5px;letter-spacing:.05em;}
.col-sel select{width:100%;height:40px;padding:0 10px;border:1.5px solid var(--ln);border-radius:var(--r3);font-family:inherit;font-size:16px;color:var(--ink);background:var(--bg);outline:none;-webkit-appearance:none;}
.preview-rows{margin-top:10px;border:1px solid var(--ln);border-radius:var(--r3);overflow:hidden;max-height:140px;overflow-y:auto;}
.preview-row{display:flex;align-items:center;gap:7px;padding:7px 11px;border-bottom:1px solid var(--ln2);font-size:13px;}
.preview-row:last-child{border-bottom:none;}
.preview-row-nm{flex:1;font-weight:600;color:var(--ink);}
.preview-row-p{color:var(--am);font-weight:700;white-space:nowrap;}

/* Toast */
.toast{position:fixed;bottom:calc(var(--nav) + var(--safe) + 8px);left:50%;transform:translateX(-50%) translateY(12px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:100px;font-size:13px;font-weight:600;opacity:0;transition:all .22s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:999;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.22);}
@media(min-width:680px){.toast{bottom:20px;}}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* ════ 新入力パネル ════ */
.ip-wrap{display:flex;flex-direction:column;gap:0;max-width:540px;margin:0 auto;}
@media(min-width:960px){.ip-wrap{display:grid;grid-template-columns:540px 1fr;max-width:none;gap:0 32px;align-items:start;}}
.ip-col{display:flex;flex-direction:column;gap:14px;}
.ip-preview{display:none;}
@media(min-width:960px){.ip-preview{display:block;position:sticky;top:90px;}}
.prev-lbl{font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.1em;margin-bottom:7px;text-transform:uppercase;}
.prev-box{background:var(--sf);border:1px solid var(--ln);border-radius:var(--r2);padding:10px;box-shadow:var(--sh);}
#prev-canvas{width:100%;border-radius:var(--r3);display:block;box-shadow:var(--sh);}

/* Excel 2ボタン */
.xl-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.xl-card{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  padding:14px 10px;
  background:var(--sf);border:1.5px solid var(--ln);border-radius:var(--r2);
  cursor:pointer;transition:all .15s;text-align:center;
  box-shadow:var(--sh);
  -webkit-tap-highlight-color:transparent;
}
.xl-card:hover,.xl-card:active{border-color:var(--gr2);background:var(--gt);}
.xl-card-icon{font-size:22px;line-height:1;}
.xl-card-main{font-size:13px;font-weight:700;color:var(--ink);line-height:1.3;}
.xl-card-sub{font-size:10px;color:var(--ink3);line-height:1.4;}

/* 手入力セクション */
.inp-section{background:var(--sf);border:1px solid var(--ln);border-radius:var(--r);box-shadow:var(--sh);}

/* 植物名フィールド */
.inp-field{display:flex;flex-direction:column;padding:14px 16px 12px;border-bottom:1px solid var(--ln2);}
.inp-field:last-of-type{border-bottom:none;}
.inp-field-lbl{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.06em;margin-bottom:7px;text-transform:uppercase;}
.inp-field-lbl span{font-size:9px;font-weight:700;color:#fff;background:var(--rd);border-radius:3px;padding:1px 5px;margin-left:6px;letter-spacing:.04em;vertical-align:middle;}
.inp-text{
  width:100%;height:48px;padding:0 14px;
  border:1.5px solid var(--ln);border-radius:var(--r2);
  font-family:inherit;font-size:16px;color:var(--ink);
  background:var(--bg);outline:none;-webkit-appearance:none;
  transition:border-color .15s,background .15s;
}
.inp-text:focus{border-color:var(--gr);background:var(--sf);box-shadow:0 0 0 3px rgba(28,92,52,.09);}
.inp-text::placeholder{color:rgba(17,22,18,.28);}

/* 価格フィールド */
.price-field{padding:14px 16px 14px;border-bottom:1px solid var(--ln2);position:relative;}

/* 税込/税抜 トグルラベル */
.price-toggle{display:flex;gap:0;margin-bottom:9px;border-radius:var(--r2);overflow:hidden;border:1.5px solid var(--ln);align-self:flex-start;width:100%;}
.price-toggle-btn{
  flex:1;height:36px;border:none;background:var(--bg);
  font-family:inherit;font-size:12px;font-weight:700;color:var(--ink3);
  cursor:pointer;transition:all .15s;letter-spacing:.03em;
  border-right:1px solid var(--ln);
}
.price-toggle-btn:last-child{border-right:none;}
.price-toggle-btn.on{
  background:var(--gr);color:#fff;
}

/* 価格入力行：テキスト + 税率ボタン + 追加ボタン */
.price-row{display:flex;gap:8px;align-items:stretch;}
.price-inp{
  flex:1;min-width:0;
  height:52px;padding:0 14px;
  border:1.5px solid var(--ln);border-radius:var(--r2);
  font-family:inherit;font-size:20px;font-weight:700;color:var(--am);
  text-align:right;
  background:var(--bg);outline:none;-webkit-appearance:none;
  transition:border-color .15s,background .15s;
}
.price-inp:focus{border-color:var(--am);background:var(--sf);box-shadow:0 0 0 3px rgba(184,92,26,.09);}
.price-inp::placeholder{color:rgba(17,22,18,.22);font-size:14px;font-weight:400;}

/* 税率ボタン */
.tax-rate-btn{
  width:54px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  background:var(--sf);border:1.5px solid var(--ln);border-radius:var(--r2);
  cursor:pointer;transition:all .15s;padding:4px 2px;
  -webkit-tap-highlight-color:transparent;
}
.tax-rate-btn:hover,.tax-rate-btn:active{border-color:var(--gr2);background:var(--gt);}
.tax-rate-btn-lbl{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.04em;line-height:1;}
.tax-rate-btn-val{font-size:16px;font-weight:800;color:var(--gr);line-height:1.2;}
.tax-rate-btn-pct{font-size:9px;font-weight:700;color:var(--gr);line-height:1;}

/* 税率ポップオーバー */
.tax-popover{
  display:none;
  position:absolute;
  top:calc(100% + 6px);right:0;
  z-index:200;
  background:var(--sf);border:1px solid var(--ln);border-radius:var(--r2);
  box-shadow:0 4px 24px rgba(17,22,18,.18);
  padding:14px;width:220px;
  flex-direction:column;gap:10px;
}
.tax-popover.open{display:flex;}
.tax-pop-title{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;}
.tax-pop-btns{display:flex;gap:6px;}
.tax-pop-btn{
  flex:1;height:36px;border:1.5px solid var(--ln);border-radius:var(--r3);
  background:var(--bg);font-family:inherit;font-size:13px;font-weight:700;
  color:var(--ink2);cursor:pointer;transition:all .12s;
}
.tax-pop-btn.on{border-color:var(--gr);color:var(--gr);background:var(--gt);}
.tax-pop-custom{display:flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--ln);border-radius:var(--r3);padding:0 10px 0 4px;transition:border-color .15s;}
.tax-pop-custom:focus-within{border-color:var(--am);}
.tax-pop-inp{width:52px;height:36px;border:none;outline:none;font-family:inherit;font-size:16px;font-weight:700;text-align:center;color:var(--ink);background:transparent;-webkit-appearance:none;}
.tax-pop-unit{font-size:12px;font-weight:700;color:var(--ink3);}

/* 追加ボタン */
.add-item-btn{
  width:54px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  background:var(--gr);border:none;border-radius:var(--r2);
  color:#fff;cursor:pointer;transition:all .15s;padding:4px 2px;
  -webkit-tap-highlight-color:transparent;
}
.add-item-btn:hover,.add-item-btn:active{background:var(--gr2);}
.add-item-btn:active{transform:scale(.96);}
.add-item-btn-icon{font-size:20px;line-height:1;}
.add-item-btn-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.8);letter-spacing:.02em;line-height:1;}

/* カスタム入力フィールド（テンプレート追加分） */
.custom-fields{border-top:1px solid var(--ln2);}
.custom-field{display:flex;flex-direction:column;padding:12px 16px 10px;border-bottom:1px solid var(--ln2);}
.custom-field:last-child{border-bottom:none;}
.custom-field-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.custom-field-lbl{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;}
.custom-field-opt{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3);cursor:pointer;}
.custom-field-opt input[type=checkbox]{width:16px;height:16px;accent-color:var(--gr);}

/* 追加済みリスト */
.list-section{background:var(--sf);border:1px solid var(--ln);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh);}
.list-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--ln2);background:var(--bg);}
.list-hdr-t{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;}
.list-cnt{font-size:11px;font-weight:700;color:var(--gr);background:var(--gt);padding:2px 9px;border-radius:20px;}
.list-body{max-height:34vh;min-height:72px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px;}
@media(min-width:680px){.list-body{max-height:calc(100vh - 380px);}}
.list-body::-webkit-scrollbar{width:3px;}
.list-body::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:3px;}
.list-empty{padding:20px 16px;text-align:center;font-size:13px;color:var(--ink3);line-height:2.2;}

/* 印刷CTA */
.pdf-btn{
  width:100%;height:54px;display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--gr);border:none;border-radius:var(--r2);
  color:#fff;font-family:inherit;font-size:15px;font-weight:700;
  cursor:pointer;letter-spacing:.05em;
  box-shadow:0 2px 16px rgba(28,92,52,.28);transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
.pdf-btn:hover{background:var(--gr2);}
.pdf-btn:active{transform:scale(.99);}
.bdg{background:rgba(255,255,255,.2);padding:2px 9px;border-radius:20px;font-size:12px;font-weight:700;}
/* tax-popover anchor */
.price-row-wrap{position:relative;z-index:10;}

/* ════ テンプレートパネル 新デザイン ════ */
.tmpl-layout{
  display:flex;flex-direction:column;gap:14px;
}
@media(min-width:680px){
  .tmpl-layout{
    display:grid;
    grid-template-columns:minmax(180px,46%) 1fr;
    gap:14px;align-items:start;
  }
}

/* 左列 */
.tmpl-left-col{
  display:flex;flex-direction:column;gap:10px;
}
@media(min-width:680px){
  .tmpl-left-col{position:sticky;top:90px;max-height:calc(100vh - 105px);overflow-y:auto;}
  .tmpl-left-col::-webkit-scrollbar{width:3px;}
  .tmpl-left-col::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:3px;}
}

/* Canvas エリア */
.tmpl-cvs-wrap{background:var(--sf);border:1px solid var(--ln);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh);}
.cvs-lbl-bar{padding:8px 12px;font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;background:var(--bg);border-bottom:1px solid var(--ln2);display:flex;align-items:center;justify-content:space-between;}
.cvs-reset-btn{height:22px;padding:0 8px;border:1px solid var(--ln);border-radius:5px;background:var(--sf);font-family:inherit;font-size:10px;font-weight:700;color:var(--ink3);cursor:pointer;}
.cvs-reset-btn:hover{border-color:var(--gr);color:var(--gr);}
#pop-canvas{width:100%;display:block;cursor:grab;touch-action:none;}

/* テンプレート管理 */
.tmpl-mgr{background:var(--sf);border:1px solid var(--ln);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh);}
.tmpl-mgr-hdr{padding:9px 13px;font-size:10px;font-weight:700;color:var(--ink2);background:var(--bg);border-bottom:1px solid var(--ln2);letter-spacing:.07em;text-transform:uppercase;}
.tmpl-list-inner{display:flex;flex-direction:column;gap:0;max-height:200px;overflow-y:auto;}
.tmpl-list-inner::-webkit-scrollbar{width:3px;}
.tmpl-list-inner::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:3px;}

/* テンプレートアイテム */
.tmpl-item{display:flex;align-items:center;gap:8px;padding:10px 13px;border-bottom:1px solid var(--ln2);cursor:pointer;transition:background .1s;}
.tmpl-item:last-child{border-bottom:none;}
.tmpl-item:hover{background:var(--bg);}
.tmpl-item.act{background:var(--gt);}
.tmpl-item-dot{width:6px;height:6px;border-radius:50%;background:var(--ln);flex-shrink:0;transition:background .15s;}
.tmpl-item.act .tmpl-item-dot{background:var(--gr);}
.tmpl-item-info{flex:1;min-width:0;}
.tmpl-item-nm{font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tmpl-item-meta{font-size:10px;color:var(--ink3);margin-top:1px;}
.tmpl-item.editing .tmpl-item-nm{color:var(--am);}
.tmpl-item.editing .tmpl-item-dot{background:var(--am);}
.tmpl-item-del{width:28px;height:28px;border:none;background:none;border-radius:5px;cursor:pointer;font-size:13px;color:var(--ink3);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.tmpl-item-del:hover{background:var(--rdt);color:var(--rd);}

/* 保存フォーム */
.tmpl-save-area{padding:12px 13px;border-top:1px solid var(--ln2);display:flex;flex-direction:column;gap:7px;}
.tmpl-save-inp{width:100%;height:40px;padding:0 11px;border:1.5px solid var(--ln);border-radius:var(--r3);font-family:inherit;font-size:16px;color:var(--ink);background:var(--bg);outline:none;-webkit-appearance:none;transition:border-color .15s;}
.tmpl-save-inp:focus{border-color:var(--gr);background:var(--sf);}
.tmpl-save-inp.err{border-color:var(--rd);}
.tmpl-save-btn{height:40px;background:var(--gr);border:none;border-radius:var(--r3);color:#fff;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.04em;}
.tmpl-save-btn:hover{background:var(--gr2);}

/* 右列 */
.tmpl-right-col{
  display:flex;flex-direction:column;gap:10px;
}
@media(min-width:680px){
  .tmpl-right-col{max-height:calc(100vh - 90px);overflow-y:auto;padding-bottom:20px;}
  .tmpl-right-col::-webkit-scrollbar{width:3px;}
  .tmpl-right-col::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:3px;}
}

/* 項目セクション */
.items-section{background:var(--sf);border:1px solid var(--ln);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh);}
.items-hdr{padding:9px 13px;font-size:10px;font-weight:700;color:var(--ink2);background:var(--bg);border-bottom:1px solid var(--ln2);letter-spacing:.07em;text-transform:uppercase;display:flex;align-items:center;justify-content:space-between;}
.items-add-btn{height:24px;padding:0 9px;border:1px solid var(--ln);border-radius:5px;background:var(--sf);font-family:inherit;font-size:10px;font-weight:700;color:var(--ink3);cursor:pointer;}
.items-add-btn:hover{border-color:var(--gr);color:var(--gr);background:var(--gt);}

/* 項目行 */
.item-row{
  border-bottom:1px solid var(--ln2);
  transition:background .1s;
}
.item-row:last-child{border-bottom:none;}
.item-row-main{
  display:flex;align-items:center;gap:9px;
  padding:10px 13px;min-height:46px;
  cursor:pointer;
}
.item-row:hover .item-row-main{background:rgba(17,22,18,.02);}
.item-row.open .item-row-main{background:var(--gt);}
.item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.item-nm{flex:1;font-size:13px;font-weight:700;color:var(--ink);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-row.open .item-nm{font-size:11px;color:var(--gr);}
.item-acts{display:flex;gap:2px;flex-shrink:0;}
.item-act{width:28px;height:28px;border:none;background:none;border-radius:5px;cursor:pointer;font-size:13px;color:var(--ink3);display:flex;align-items:center;justify-content:center;}
.item-act:hover{background:var(--rdt);color:var(--rd);}

/* インラインプロパティパネル */
.item-props{
  display:none;
  padding:10px 13px 13px;
  border-top:1px solid var(--ln2);
  background:rgba(28,92,52,.03);
  flex-direction:column;gap:8px;
}
.item-row.open .item-props{display:flex;}

.iprop-row{display:flex;align-items:center;gap:6px;}
.iprop-lbl{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;min-width:30px;}
/* フォントサイズステッパー */
.fsz-ctrl{display:flex;align-items:center;gap:3px;}
.fsz-btn{width:26px;height:28px;border:1.5px solid var(--ln);border-radius:5px;background:var(--bg);font-family:inherit;font-size:14px;font-weight:700;color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.fsz-btn:hover{border-color:var(--gr);color:var(--gr);}
.fsz-val{width:36px;height:28px;border:1.5px solid var(--ln);border-radius:5px;text-align:center;font-family:inherit;font-size:13px;font-weight:700;color:var(--ink);background:var(--bg);outline:none;-webkit-appearance:none;}
.fsz-val:focus{border-color:var(--gr);}
/* 文字色 */
.clr-btn{width:32px;height:28px;border:1.5px solid var(--ln);border-radius:5px;padding:2px;cursor:pointer;-webkit-appearance:none;}
/* スタイル・揃えボタン */
.style-btns{display:flex;gap:3px;flex-wrap:wrap;}
.s-btn{
  height:30px;padding:0 8px;min-width:30px;
  border:1.5px solid var(--ln);border-radius:5px;
  background:var(--bg);font-family:inherit;font-size:12px;font-weight:700;
  color:var(--ink2);cursor:pointer;transition:all .1s;
}
.s-btn:hover{border-color:var(--gr2);color:var(--gr);}
.s-btn.on{border-color:var(--gr);background:var(--gt);color:var(--gr);}

/* 背景追加セクション */
.bg-section{background:var(--sf);border:1px solid var(--ln);border-radius:var(--r2);overflow:hidden;box-shadow:var(--sh);}
.bg-hdr{padding:9px 13px;font-size:10px;font-weight:700;color:var(--ink2);background:var(--bg);border-bottom:1px solid var(--ln2);letter-spacing:.07em;text-transform:uppercase;}
.bg-body{padding:12px 13px;display:flex;flex-direction:column;gap:9px;}
.bg-note{font-size:11px;color:var(--ink3);line-height:1.7;}
.bg-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bg-btn{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:12px 8px;
  background:var(--bg);border:1.5px solid var(--ln);border-radius:var(--r2);
  font-family:inherit;cursor:pointer;transition:all .15s;text-align:center;
}
.bg-btn:hover{border-color:var(--gr2);background:var(--gt);}
.bg-btn-icon{font-size:20px;line-height:1;}
.bg-btn-lbl{font-size:12px;font-weight:700;color:var(--ink);}
.bg-btn-sub{font-size:10px;color:var(--ink3);}
/* 背景プレビュー */
.bg-preview{display:none;margin-top:4px;position:relative;}
.bg-preview img{width:100%;border-radius:var(--r3);display:block;box-shadow:var(--sh);}
.bg-preview-clr{position:absolute;top:5px;right:5px;width:24px;height:24px;border:none;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dstyle-sel{width:100%;height:38px;padding:0 10px;border:1.5px solid var(--ln);border-radius:var(--r3);font-family:inherit;font-size:14px;color:var(--ink);background:var(--bg);outline:none;-webkit-appearance:none;}
.dstyle-sel:focus{border-color:var(--gr);}
.clr-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--ln2);}
.clr-row:last-child{border-bottom:none;}
.clr-lbl{flex:1;font-size:13px;color:var(--ink2);font-weight:500;}

input:focus,button:focus{outline:none;}

/* ── 印刷プレビューオーバーレイ ── */
#print-overlay{display:none;position:fixed;inset:0;z-index:800;background:#555;flex-direction:column;}
#print-toolbar{flex-shrink:0;height:50px;background:#1c5c34;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.25);}
#print-title{color:#fff;font-size:13px;font-weight:600;}
.print-btn-do{height:34px;padding:0 18px;border:none;border-radius:7px;background:#fff;color:#1c5c34;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;}
.print-btn-close{height:34px;padding:0 14px;border:1.5px solid rgba(255,255,255,.4);border-radius:7px;background:transparent;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
#print-pages{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;display:flex;flex-direction:column;align-items:center;gap:14px;}
</style>
</head>
<body>

<!-- Header -->
<header class="hdr">
  <div class="hdr-logo">
    <span class="hdr-dot"></span>
    PRICEPOP
  </div>
</header>

<!-- PC Top Nav -->
<nav class="topnav" id="topnav">
  <button class="tnb active" onclick="switchTab('input',this)">入力・生成</button>
  <button class="tnb" onclick="switchTab('template',this)">テンプレート</button>
  <button class="tnb" onclick="switchTab('settings',this)">設定</button>
</nav>

<!-- Phone Bottom Nav -->
<nav class="bnav" id="bnav">
  <button class="bnb active" id="bnav-input" onclick="switchTab('input',this)">
    <span class="bnb-i">✏️</span><span class="bnb-l">入力</span>
  </button>
  <button class="bnb" id="bnav-template" onclick="switchTab('template',this)">
    <span class="bnb-i">🎨</span><span class="bnb-l">テンプレ</span>
  </button>
  <button class="bnb" id="bnav-settings" onclick="switchTab('settings',this)">
    <span class="bnb-i">⚙️</span><span class="bnb-l">設定</span>
  </button>
</nav>

<main class="main">

<!-- ─── INPUT ─────────────────────────────── -->
<div class="panel on" id="panel-input">
  <div class="ip-wrap">

    <div class="ip-col">

      <!-- Excel 一括挿入 2ボタン -->
      <div class="xl-btns">
        <button class="xl-card" onclick="onXlToyoake()">
          <span class="xl-card-icon">🌸</span>
          <span class="xl-card-main">豊明花き専用</span>
          <span class="xl-card-sub">専用フォーマットで<br>自動読み込み</span>
        </button>
        <button class="xl-card" onclick="document.getElementById('xl-file').click()">
          <span class="xl-card-icon">📊</span>
          <span class="xl-card-main">任意のExcelファイル</span>
          <span class="xl-card-sub">.xlsx / .xls / .csv<br>列を手動で指定</span>
        </button>
        <input type="file" id="xl-file" accept=".xlsx,.xls,.csv" style="display:none" onchange="onXlFile(event)">
        <input type="file" id="xl-toyoake-file" accept=".xlsx,.xls,.csv" style="display:none" onchange="onXlToyoakeFile(event)">
      </div>

      <!-- 手入力フォーム -->
      <div class="inp-section" id="inp-card">

        <!-- 植物名 -->
        <div class="inp-field" id="inp-field-name">
          <div class="inp-field-lbl">植物名<span>必須</span></div>
          <input class="inp-text" type="text" id="inp-name"
            placeholder="例：モンステラ デリシオーサ"
            autocomplete="off" autocorrect="off" enterkeyhint="next"
            oninput="redrawPrev()" onkeydown="nameKey(event)">
        </div>

        <!-- カスタムフィールド（テンプレート連動） -->
        <div class="custom-fields" id="inp-custom-fields"></div>

        <!-- 価格フィールド -->
        <div class="price-field">
          <!-- 税込/税抜 トグル -->
          <div class="price-toggle">
            <button class="price-toggle-btn on" id="ptab-excl" onclick="setPriceMode('excl')">税抜価格</button>
            <button class="price-toggle-btn" id="ptab-incl" onclick="setPriceMode('incl')">税込価格</button>
          </div>
          <!-- 価格入力行 -->
          <div class="price-row-wrap">
            <div class="price-row">
              <input class="price-inp" type="number" id="inp-price"
                placeholder="0" inputmode="decimal" enterkeyhint="done"
                oninput="redrawPrev()" onkeydown="priceKey(event)">
              <!-- 税率ボタン -->
              <button class="tax-rate-btn" id="tax-rate-toggle-btn" onclick="toggleTaxPopover()" aria-label="税率設定">
                <span class="tax-rate-btn-lbl">税率</span>
                <span class="tax-rate-btn-val" id="tax-rate-val">10</span>
                <span class="tax-rate-btn-pct">%</span>
              </button>
              <!-- 追加ボタン -->
              <button class="add-item-btn" onclick="addItem()">
                <span class="add-item-btn-icon">＋</span>
                <span class="add-item-btn-lbl">追加</span>
              </button>
            </div>
            <!-- 税率ポップオーバー -->
            <div class="tax-popover" id="tax-popover">
              <div class="tax-pop-title">消費税率を設定</div>
              <div class="tax-pop-btns">
                <button class="tax-pop-btn" id="tpop-8" onclick="setTaxRate(8,'btn')">8%</button>
                <button class="tax-pop-btn on" id="tpop-10" onclick="setTaxRate(10,'btn')">10%</button>
              </div>
              <div class="tax-pop-custom">
                <input class="tax-pop-inp" type="number" id="tax-rate-inp"
                  value="10" min="0" max="99" step="1" placeholder="独自"
                  oninput="setTaxRateCustom(this.value)">
                <span class="tax-pop-unit">%</span>
              </div>
            </div>
          </div>
        </div>

      </div><!-- /inp-section -->

      <!-- 追加済みリスト -->
      <div class="list-section">
        <div class="list-hdr">
          <span class="list-hdr-t">追加済みリスト</span>
          <span class="list-cnt" id="list-cnt">0件</span>
        </div>
        <div class="list-body" id="list-body">
          <div class="list-empty" id="list-empty">植物名と価格を入力して＋を押してください</div>
          <div class="pop-grid" id="list-items"></div>
        </div>
      </div>

      <!-- 印刷 CTA -->
      <button class="pdf-btn" onclick="generatePDF()">
        🖨 印刷プレビューを開く
        <span class="bdg" id="pdf-bdg" style="display:none"></span>
      </button>

    </div>

    <!-- PC右カラム：プレビュー -->
    <div class="ip-preview">
      <div class="prev-lbl">リアルタイムプレビュー</div>
      <div class="prev-box"><canvas id="prev-canvas"></canvas></div>
    </div>

  </div>
</div>
<!-- ─── TEMPLATE ──────────────────────────── -->
<div class="panel" id="panel-template">
  <div class="tmpl-layout">

    <!-- 左列：Canvas + テンプレート管理 -->
    <div class="tmpl-left-col">

      <!-- 編集プレビュー -->
      <div class="tmpl-cvs-wrap">
        <div class="cvs-lbl-bar">
          編集プレビュー（ドラッグで移動）
          <button class="cvs-reset-btn" onclick="resetEl()">↩ 初期値</button>
        </div>
        <canvas id="pop-canvas"></canvas>
      </div>

      <!-- テンプレート管理 -->
      <div class="tmpl-mgr">
        <div class="tmpl-mgr-hdr">テンプレート管理</div>
        <div class="tmpl-list-inner" id="tmpl-list"></div>
        <div class="tmpl-save-area">
          <input class="tmpl-save-inp" type="text" id="tmpl-author" placeholder="作成者名" maxlength="20">
          <input class="tmpl-save-inp" type="text" id="tmpl-inp" placeholder="テンプレート名" maxlength="30">
          <button class="tmpl-save-btn" onclick="saveTmpl()">保存する</button>
        </div>
      </div>

    </div>

    <!-- 右列：項目 + 背景 -->
    <div class="tmpl-right-col">

      <!-- 項目リスト -->
      <div class="items-section">
        <div class="items-hdr">
          <span>項目</span>
          <button class="items-add-btn" onclick="addEl()">＋ テキスト追加</button>
        </div>
        <div id="ellist"></div>
      </div>

      <!-- 背景追加 -->
      <div class="bg-section">
        <div class="bg-hdr">背景追加</div>
        <div class="bg-body">
          <div class="bg-note">デザインソフトで作成した背景画像を読み込むか、アプリで直接作成できます。</div>
          <div class="clr-row"><span class="clr-lbl">枠・アクセント色</span><input type="color" id="caccent" value="#2d7a4f" onchange="markEdited();redrawAll()"></div>

              <span class="bg-btn-icon">🎨</span>
              <span class="bg-btn-lbl">アプリから</span>
              <span class="bg-btn-sub">Canva / Figma 他</span>
            </button>

// テンプレートのELSを参照して入力フォームを動的生成
function rebuildInpFields(){
  // テンプレート名
  var tmplName=document.getElementById('inp-tmpl-name');
  var activeTmpl=getActiveTmpl();
  if(tmplName)tmplName.textContent=activeTmpl?activeTmpl.name:'';
  // カスタムフィールドのみ動的生成（植物名・価格は固定HTML）
  var cf=document.getElementById('inp-custom-fields');
  if(!cf)return;
  cf.innerHTML='';
  ELS.forEach(function(el){
    if(el.id==='name'||el.id==='price'||el.id==='tax'||el.id==='shop') return;
    if(el.type==='text'&&el.inputField){
      cf.appendChild(makeCustomRow(el));
    }
  });
  if(cf.children.length===0)cf.style.display='none';
  else cf.style.display='block';
}

  // ラベル

// ━━ CANVAS UTILITIES ━━
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function h2rgba(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')';}
function h2rgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}
function wrapWords(ctx,text,maxW){
  // スペース（半角・全角）で単語分割を試みる
  var hasSpace=/[\s\u3000]/.test(text);
  if(hasSpace){
    var words=text.split(/[\s\u3000]+/).filter(function(w){return w.length>0;});
    var result=[],line='';
    words.forEach(function(w){
      var test=line?line+' '+w:w;
      if(ctx.measureText(test).width>maxW&&line){result.push(line);line=w;}
      else line=test;
    });
    if(line)result.push(line);
    if(result.length>1)return result;
  }
  // スペースなし or 1行に収まった → 文字単位で折り返し
  var result2=[],line2='';
  for(var i=0;i<text.length;i++){
    var t=line2+text[i];
    if(ctx.measureText(t).width>maxW&&line2){result2.push(line2);line2=text[i];}
    else line2=t;
  }
  if(line2)result2.push(line2);
  return result2.length?result2:[text];
}
function drawFrame(ctx, cx, cy, cw, ch, ca, st) {
  var lw = cw * .012;
  // カスタム背景：枠線は描画しない（背景画像が枠を持つため）
  if(st === 'custom') { return; }
  if(st === 'natural') {
    ctx.strokeStyle = ca; ctx.lineWidth = lw*1.3;
    rrect(ctx, cx+lw, cy+lw, cw-lw*2, ch-lw*2, cw*.034); ctx.stroke();
    var p2 = cw*.04;
    ctx.lineWidth = lw*.4; ctx.strokeStyle = h2rgba(ca,.4);
    rrect(ctx, cx+p2, cy+p2, cw-p2*2, ch-p2*2, cw*.024); ctx.stroke();
    ctx.fillStyle = h2rgba(ca,.07);
    ctx.fillRect(cx+p2, cy+p2, cw-p2*2, ch*.12);
  } else if(st === 'ikea') {
    // IKEAスタイル：角なし・太い黒枠
    ctx.strokeStyle = '#111'; ctx.lineWidth = lw*1.6;
    ctx.strokeRect(cx+lw, cy+lw, cw-lw*2, ch-lw*2);
  }
}

// Fit font size so that `lines` rendered at LINE_GAP fits within maxH px.
// Returns the fitted fs (>= minFs).
function fitFs(ctx, text, fontStyle, startFs, maxW, maxH, minFs) {
  var LINE_GAP = 1.28;
  var fs = startFs;
  for(var i = 0; i < 30; i++) {
    ctx.font = fontStyle.replace('__FS__', fs);
    var lines = wrapWords(ctx, text, maxW);
    if(lines.length * fs * LINE_GAP <= maxH || fs <= minFs) {
      return {fs: Math.max(minFs, fs), lines: lines};
    }
    fs *= 0.88;
  }
  ctx.font = fontStyle.replace('__FS__', fs);
  return {fs: Math.max(minFs, fs), lines: wrapWords(ctx, text, maxW)};
}

function drawPop(ctx, cx, cy, cw, ch, sample, cfg) {
  var ca=cfg.ca, cb=cfg.cb, st=cfg.st, sn=cfg.sn;
  var LINE_GAP = 1.28;

  // Background
  if(st==='custom' && customBgImg && customBgImg.complete && customBgImg.naturalWidth>0){
    ctx.save(); rrect(ctx,cx,cy,cw,ch,cw*.02); ctx.clip();
    ctx.drawImage(customBgImg,cx,cy,cw,ch); ctx.restore();
  } else {
    ctx.fillStyle=cb; rrect(ctx,cx,cy,cw,ch,cw*.04); ctx.fill();
  }
  // Frame
  drawFrame(ctx, cx, cy, cw, ch, ca, st);

  if(!sample) {
    ctx.fillStyle='rgba(155,155,150,.45)'; ctx.font=(cw*.05)+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('空き', cx+cw/2, cy+ch/2); return;
  }

  var pad   = cw * .06;
  var aW    = cw - pad*2;
  var aH    = ch - pad*2;
  var topD  = (st==='natural') ? ch*.12 : (st==='minimal' ? ch*.03 : 0);

  // Content area after top decoration
  var contentY = cy + pad + topD;
  var contentH = ch - pad - topD - pad*.5;

  var SCALE = cw / 105;
  var nameEl  = ELS.find(function(e){return e.id==='name';});
  var priceEl = ELS.find(function(e){return e.id==='price';});
  var taxEl   = ELS.find(function(e){return e.id==='tax';});
  var shopEl  = ELS.find(function(e){return e.id==='shop';});

  // 価格計算
  var prices = sample.price ? calcPrices(sample.price) : {base:0, incl:0};
  var isExcl = PRICE_MODE==='excl';

  // ── IKEAスタイル専用レイアウト ──
  if(st==='ikea'){
    var SC = cw/105;
    var pad2 = cw*0.05;
    var aW2  = cw - pad2*2;

    // 黄色ヘッダー帯（上30%）
    var hdrH = ch * 0.32;
    ctx.fillStyle = '#FFDA1A';
    ctx.fillRect(cx, cy, cw, hdrH);

    // ヘッダー帯と本体の境界線
    ctx.fillStyle = '#111';
    ctx.fillRect(cx, cy+hdrH, cw, cw*0.013);

    // 植物名（黄帯内・黒・大）
    var nameText2 = sample.name||'';
    if(nameText2){
      var nFs2 = 20*SC;
      var nFit2 = fitFs(ctx,nameText2,'700 __FS__px sans-serif',nFs2,aW2*0.92,hdrH*0.72,7);
      ctx.font='700 '+nFit2.fs+'px sans-serif';
      ctx.fillStyle='#111'; ctx.textAlign='center'; ctx.textBaseline='middle';
      var nBH=nFit2.lines.length*nFit2.fs*1.25;
      var nSY=cy+(hdrH-nBH)*0.5;
      nFit2.lines.forEach(function(ln,li){
        ctx.fillText(ln,cx+cw/2,nSY+nFit2.fs*1.25*(li+0.5));
      });
    }

    // 価格エリア（下70%・白背景）
    var priceAreaY2 = cy + hdrH + cw*0.013;
    var priceAreaH2 = ch - hdrH - cw*0.013;

    var prices2 = sample.price ? calcPrices(sample.price) : {base:0,incl:0};
    var isExcl2 = PRICE_MODE==='excl';
    var mainPrice = isExcl2 ? prices2.base : prices2.incl;
    var subPrice  = isExcl2 ? prices2.incl : null;

    if(mainPrice){
      // 価格ラベル（小・左寄り）
      var lblFs = 7*SC;
      ctx.font='500 '+lblFs+'px sans-serif';
      ctx.fillStyle='#555'; ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.fillText(isExcl2?'税抜価格':'税込価格', cx+pad2, priceAreaY2+priceAreaH2*0.08);

      // 価格数字（極大・左寄り・黒）
      var pTxt = mainPrice.toLocaleString();
      var pFs  = 34*SC;
      ctx.font='900 '+pFs+'px sans-serif';
      while(ctx.measureText(pTxt+'円').width>aW2*0.82&&pFs>10){pFs*=0.91;ctx.font='900 '+pFs+'px sans-serif';}
      ctx.fillStyle='#111'; ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(pTxt, cx+pad2, priceAreaY2+priceAreaH2*(subPrice?0.42:0.50));
      // 「円」を小さく右に
      ctx.font='700 '+(pFs*0.38)+'px sans-serif'; ctx.textBaseline='middle';
      var pw=ctx.measureText(pTxt).width;
      ctx.font='900 '+pFs+'px sans-serif'; // 測定用に戻す
      pw=ctx.measureText(pTxt).width;
      ctx.font='700 '+(pFs*0.38)+'px sans-serif';
      ctx.fillText('円', cx+pad2+pw+2, priceAreaY2+priceAreaH2*(subPrice?0.42:0.50));

      if(subPrice&&isExcl2){
        // 税込区切り線
        ctx.strokeStyle='rgba(0,0,0,.12)'; ctx.lineWidth=0.7;
        ctx.beginPath();
        ctx.moveTo(cx+pad2,priceAreaY2+priceAreaH2*0.66);
        ctx.lineTo(cx+cw-pad2,priceAreaY2+priceAreaH2*0.66);
        ctx.stroke();
        // 税込ラベル
        ctx.font='500 '+lblFs+'px sans-serif';
        ctx.fillStyle='#888'; ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText('税込価格', cx+pad2, priceAreaY2+priceAreaH2*0.69);
        // 税込価格（中）
        var iTxt=subPrice.toLocaleString()+'円';
        var iFs=pFs*0.55;
        ctx.font='700 '+iFs+'px sans-serif';
        ctx.fillStyle='#444'; ctx.textBaseline='middle';
        ctx.fillText(iTxt,cx+pad2,priceAreaY2+priceAreaH2*0.86);
      }
    }
    return;
  }

  // ── 通常レイアウト（natural）──
  // Zone split: top 48% = name, bottom 52% = price zone
  var nameZoneH  = contentH * 0.48;
  var priceZoneH = contentH * 0.52;

  // NAME zone: fit name text
  var nameText = sample.name || '';
  var nameFit = {fs:8, lines:[nameText]};
  if(nameText){
    var nameBaseFs = (nameEl?nameEl.size:20)*SCALE;
    nameFit = fitFs(ctx, nameText,
      (nameEl&&nameEl.bold?'700':'400')+' __FS__px "Noto Sans JP",sans-serif',
      nameBaseFs, aW*.92, nameZoneH, 8);
  }

  // PRICE zone texts（税率計算済み）
  var displayPrice = prices.incl;
  var priceText = displayPrice ? '¥ '+displayPrice.toLocaleString() : '';
  var taxText   = '（税込）';
  var shopText  = sn || '';

  // Price font: start from el.size, but clamp so it's no more than 2× name fs
  var priceBaseFs = (priceEl ? priceEl.size : 26) * SCALE;
  var priceMaxFs  = nameFit.fs * 2.0;
  var priceStartFs = Math.min(priceBaseFs, priceMaxFs);

  // Allocate heights within price zone
  var taxFs   = (taxEl  ? taxEl.size  :  9) * SCALE;
  var shopFs  = (shopEl ? shopEl.size :  8) * SCALE;
  var taxH    = taxText  ? taxFs  * LINE_GAP : 0;
  var shopH   = shopText ? shopFs * LINE_GAP : 0;
  var priceZoneForPrice = priceZoneH - taxH - shopH - (taxH||shopH ? cw*.012 : 0);

  var priceFit = {fs: 8, lines: [priceText]};
  if(priceText) {
    priceFit = fitFs(ctx, priceText,
      (priceEl&&priceEl.bold?'700':'400')+' __FS__px "Noto Sans JP",sans-serif',
      priceStartFs, aW * .92, Math.max(priceZoneForPrice, priceZoneH * 0.55), 8);
  }

  // ── Draw name zone (vertically centred within its zone) ──
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if(nameText) {
    ctx.font = (nameEl&&nameEl.bold?'700':'400')+' '+nameFit.fs+'px "Noto Sans JP",sans-serif';
    ctx.fillStyle = nameEl ? nameEl.color : '#2d5a1e';
    var nameBlockH = nameFit.lines.length * nameFit.fs * LINE_GAP;
    var nameStartY = contentY + (nameZoneH - nameBlockH) / 2;
    nameFit.lines.forEach(function(ln, li) {
      ctx.fillText(ln, cx+cw/2, nameStartY + nameFit.fs*LINE_GAP*(li+0.5));
    });
  }

  // ── Divider line between zones ──
  var divY = contentY + nameZoneH;
  ctx.strokeStyle = h2rgba(ca, 0.20);
  ctx.lineWidth = 0.6;
  ctx.setLineDash && ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(cx + pad*1.2, divY);
  ctx.lineTo(cx + cw - pad*1.2, divY);
  ctx.stroke();

  // ── Draw price zone ──
  var priceZoneTop = divY;
  var priceBlockH  = priceFit.lines.length * priceFit.fs * LINE_GAP;
  var taxLineH     = taxH + (taxText && priceText ? cw*.008 : 0);
  var shopLineH    = shopH + (shopText ? cw*.006 : 0);
  var totalPriceContent = priceBlockH + taxLineH + shopLineH;
  var priceStartY  = priceZoneTop + (priceZoneH - totalPriceContent) / 2;

  if(priceText) {
    ctx.font = (priceEl&&priceEl.bold?'700':'400')+' '+priceFit.fs+'px "Noto Sans JP",sans-serif';
    ctx.fillStyle = priceEl ? priceEl.color : '#b45309';
    priceFit.lines.forEach(function(ln, li) {
      ctx.fillText(ln, cx+cw/2, priceStartY + priceFit.fs*LINE_GAP*(li+0.5));
    });
    priceStartY += priceBlockH + cw*.008;
  }
  if(taxText) {
    ctx.font = (taxEl&&taxEl.bold?'700':'400')+' '+taxFs+'px "Noto Sans JP",sans-serif';
    ctx.fillStyle = taxEl ? taxEl.color : '#9ca3af';
    ctx.fillText(taxText, cx+cw/2, priceStartY + taxFs*0.6);
    priceStartY += taxLineH;
  }
  if(shopText) {
    ctx.font = (shopEl&&shopEl.bold?'700':'400')+' '+shopFs+'px "Noto Sans JP",sans-serif';
    ctx.fillStyle = shopEl ? shopEl.color : '#6b7280';
    ctx.fillText(shopText, cx+cw/2, priceStartY + shopFs*0.6);
  }

  // ── カスタム要素（固定4要素以外）を描画 ──
  var FIXED_IDS={name:1,price:1,tax:1,shop:1};
  var customEls=ELS.filter(function(e){return !FIXED_IDS[e.id];});
  if(customEls.length){
    var aWc=cw-pad*2,aHc=ch-pad*2;
    customEls.forEach(function(cel){
      var ex2=cx+pad+cel.x*aWc, ey2=cy+pad+cel.y*aHc;
      var cfs=cel.size*SCALE;
      ctx.font=(cel.bold?'700':'400')+' '+cfs+'px "Noto Sans JP",sans-serif';
      ctx.fillStyle=cel.color||'#333';
      ctx.textAlign=cel.align||'center';
      ctx.textBaseline='middle';
      ctx.fillText(cel.text||cel.label,ex2,ey2);
    });
  }

  // ── Logo: bottom-right corner ──
  if(logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
    var logoSize = cw * 0.18; // 18% of pop width
    var margin   = cw * 0.03;
    var lx = cx + cw - margin - logoSize;
    var ly = cy + ch - margin - logoSize;
    ctx.save();
    ctx.drawImage(logoImg, lx, ly, logoSize, logoSize);
    ctx.restore();
  }
}

// ━━ EDITOR CANVAS ━━
var _resizeHandle=null;
function initEdCvs(){
  var c=document.getElementById('pop-canvas');if(!c)return;
  var sz=function(){
    var p=curPreset(),W=c.clientWidth||240,ar=p.cw/p.ch;
    c.width=W*2;c.height=Math.round(W/ar)*2;redrawEd();
  };
  sz();
  window.addEventListener('resize',function(){if(document.getElementById('panel-template').classList.contains('on'))sz();});
  c.addEventListener('mousedown',edDn);c.addEventListener('mousemove',edMv);c.addEventListener('mouseup',edUp);c.addEventListener('mouseleave',edUp);
  c.addEventListener('touchstart',function(e){e.preventDefault();edDn(e.touches[0]);},{passive:false});
  c.addEventListener('touchmove', function(e){e.preventDefault();edMv(e.touches[0]);},{passive:false});
  c.addEventListener('touchend',  function(e){e.preventDefault();edUp();},{passive:false});
}
function epos(cx,cy){var c=document.getElementById('pop-canvas'),r=c.getBoundingClientRect();return{x:(cx-r.left)*(c.width/c.clientWidth),y:(cy-r.top)*(c.height/c.clientHeight)};}
function edDn(e){
  var c=document.getElementById('pop-canvas'),p=epos(e.clientX,e.clientY);
  var W=c.width,H=c.height,pd=W*.07,aW=W-pd*2,aH=H-pd*2;
  _resizeHandle=null;
  if(!EL_BOXES.length)redrawEd();

  // 選択中の項目がある場合のみドラッグ開始
  if(!selEl){
    toast('右の「項目」リストから移動したい項目を選択してください');
    return;
  }
  var el=gEl(selEl);
  if(!el){return;}
  if(el.locked){toast('ロックを解除してください');return;}

  var selBox=EL_BOXES.find(function(b){return b.id===selEl;});
  if(selBox&&p.x>=selBox.bx-14&&p.x<=selBox.bx+selBox.bw+14&&p.y>=selBox.by-14&&p.y<=selBox.by+selBox.bh+14){
    dragging={id:selEl,ox:p.x-selBox.ex,oy:p.y-selBox.ey};
    c.style.cursor='grabbing';
    redrawEd();
  }
}
function edMv(e){
  var c=document.getElementById('pop-canvas'),p=epos(e.clientX,e.clientY);
  var W=c.width,H=c.height,pd=W*.07,aW=W-pd*2,aH=H-pd*2;

  // ドラッグ中
  if(dragging&&selEl){
    var el=gEl(dragging.id);if(!el||el.locked){dragging=null;return;}
    markEdited();
    el.x=Math.max(0,Math.min(1,(p.x-dragging.ox-pd)/aW));
    el.y=Math.max(0,Math.min(1,(p.y-dragging.oy-pd)/aH));
    updateQP(el);redrawEd();
    c.style.cursor='grabbing';
    return;
  }

  // ホバー：選択中ボックス上かどうかでカーソル変更
  if(!selEl){c.style.cursor='default';return;}
  var selBox=EL_BOXES.find(function(b){return b.id===selEl;});
  if(selBox&&p.x>=selBox.bx-14&&p.x<=selBox.bx+selBox.bw+14&&p.y>=selBox.by-14&&p.y<=selBox.by+selBox.bh+14){
    c.style.cursor='grab';
  } else {
    c.style.cursor='default';
  }
}
function edUp(){dragging=null;_resizeHandle=null;}

function redrawEd(){
  var c=document.getElementById('pop-canvas');if(!c||!c.width)return;
  var ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  var sample=items[0]||{name:'コルクチューブ SS',price:5000};
  var cfg=gst();
  // 背景
  ctx.fillStyle=cfg.cb;rrect(ctx,0,0,W,H,W*.04);ctx.fill();
  drawFrame(ctx,0,0,W,H,cfg.ca,cfg.st);
var pd=W*.07,aW=W-pd*2,aH=H-pd*2;
  EL_BOXES=[];
  var EL_COLORS={name:'#e67e22',price:'#2980b9',tax:'#8e44ad',shop:'#27ae60'};
  var texts={
    name:sample.name||'植物名',
    price:'¥ '+(sample.price||0).toLocaleString(),
    tax:'（税込）'
  };
  ELS.forEach(function(el){if(!texts[el.id])texts[el.id]=el.text||el.label;});
  var sorted=[].concat(ELS).sort(function(a,b){return(a.zIndex||0)-(b.zIndex||0);});
  var SCALE=W/105;
  sorted.forEach(function(el){
    if(el.locked&&el.id!=='name'&&el.id!=='price'&&el.id!=='tax')return;
    var isSel=selEl===el.id;
    var dotColor=EL_COLORS[el.id]||el.color||'#888';
    var ex=pd+el.x*aW,ey=pd+el.y*aH;
    var text=texts[el.id]||el.text||'';
    if(!text)return;
    ctx.save();
    ctx.globalAlpha=el.opacity||1;
    var fs=(el.size||12)*SCALE;
    ctx.font=(el.bold?'700':'400')+' '+fs+'px sans-serif';
    var tw=ctx.measureText(text).width;
    var bw=tw+14,bh=fs*1.5;
    var bx=el.align==='center'?ex-tw/2-7:el.align==='right'?ex-tw-7:ex-7;
    var by=ey-fs*.95;
    EL_BOXES.push({id:el.id,bx:bx,by:by,bw:bw,bh:bh,ex:ex,ey:ey});
    ctx.globalAlpha=1;
    if(isSel){
      ctx.fillStyle='rgba('+parseInt(dotColor.slice(1,3),16)+','+parseInt(dotColor.slice(3,5),16)+','+parseInt(dotColor.slice(5,7),16)+',.13)';
      rrect(ctx,bx,by,bw,bh,5);ctx.fill();
      ctx.strokeStyle=dotColor;ctx.lineWidth=2;rrect(ctx,bx,by,bw,bh,5);ctx.stroke();
    } else {
      ctx.strokeStyle=dotColor;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      rrect(ctx,bx,by,bw,bh,5);ctx.stroke();ctx.setLineDash([]);
    }
    ctx.font='10px sans-serif';ctx.fillStyle=dotColor;ctx.globalAlpha=.75;
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(el.label,bx+4,by+2);
    ctx.restore();
  });
  // カーソル：項目未選択はデフォルト、選択中はgrab
  if(!selEl){
    c.style.cursor='default';
  } else if(dragging){
    c.style.cursor='grabbing';
  } else {
    // マウス位置が選択中ボックス上かどうかはmousemoveで更新するのでここはgrab固定
    c.style.cursor='grab';
  }
}

function resetEl(){ELS=DEF_ELS.map(function(e){return Object.assign({},e);});selEl=null;buildElList();redrawEd();}

// ━━ ELEMENT MANAGEMENT ━━
function gEl(id){return ELS.find(function(e){return e.id===id;});}
function addEl(){
  var newId='custom_'+Date.now();
  ELS.push({id:newId,label:'テキスト',text:'テキスト',type:'text',
    color:'#333333',x:.5,y:.5,size:12,align:'center',bold:false,
    opacity:1,zIndex:ELS.length,inputField:true,optional:true});
  markEdited();selEl=newId;buildElList();redrawEd();rebuildInpFields();toast('テキスト要素を追加しました');
}
function delEl(id){
  markEdited();ELS=ELS.filter(function(e){return e.id!==id;});
  if(selEl===id)selEl=null;
  buildElList();redrawEd();rebuildInpFields();
}
function addImage(event){
  var file=event.target.files[0];if(!file)return;event.target.value='';
  var reader=new FileReader();
  reader.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      var newId='img_'+Date.now();
      ELS.push({id:newId,label:'画像',type:'image',x:.5,y:.5,size:30,
        imgData:ev.target.result,imgEl:img,keepAspect:true,opacity:1,zIndex:ELS.length});
      selEl=newId;buildElList();redrawEd();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}
function duplicateEl(){
  if(!selEl)return;var e=gEl(selEl);if(!e)return;
  var copy=JSON.parse(JSON.stringify(e));
  copy.id='copy_'+Date.now();copy.x=Math.min(1,(copy.x||.5)+.03);copy.y=Math.min(1,(copy.y||.5)+.03);
  copy.zIndex=(copy.zIndex||0)+1;copy.label=copy.label+'（コピー）';
  ELS.push(copy);selEl=copy.id;buildElList();redrawEd();rebuildInpFields();
}
function changeZ(delta){
  if(!selEl)return;var e=gEl(selEl);if(!e)return;
  if(delta===999)e.zIndex=ELS.length+1;else if(delta===-999)e.zIndex=-1;else e.zIndex=(e.zIndex||0)+delta;
  buildElList();redrawEd();
}
function toggleLock(id){
  var e=gEl(id);if(!e)return;e.locked=!e.locked;buildElList();toast(e.locked?'ロック':'ロック解除');
}

function snapY(id,pos){var e=gEl(id);if(!e)return;if(pos==='top')e.y=0.12;else if(pos==='mid')e.y=0.50;else e.y=0.88;buildElList();redrawEd();}

// ━━ ELEMENT LIST (DOM操作) ━━
function buildElList(){
  var wrap=document.getElementById('ellist');if(!wrap)return;
  wrap.innerHTML='';
  var EL_COLORS={name:'#e67e22',price:'#2980b9',tax:'#8e44ad',shop:'#27ae60'};
  var FIXED={name:1,price:1,tax:1,shop:1};
  [].concat(ELS).sort(function(a,b){return(b.zIndex||0)-(a.zIndex||0);}).forEach(function(el){
    var isFixed=!!FIXED[el.id];
    var dotColor=EL_COLORS[el.id]||el.color||'#888';
    var isOpen=selEl===el.id;

    var row=document.createElement('div');
    row.className='item-row'+(isOpen?' open':'');

    // ── メイン行 ──
    var main=document.createElement('div');main.className='item-row-main';

    var dot=document.createElement('div');
    dot.className='item-dot';
    dot.style.background=dotColor+(el.locked?'66':'');
    main.appendChild(dot);

    var nm=document.createElement('div');nm.className='item-nm';
    nm.textContent=(el.locked?'🔒 ':'')+el.label;
    main.appendChild(nm);

    var acts=document.createElement('div');acts.className='item-acts';
    var lockBtn=document.createElement('button');
    lockBtn.className='item-act';
    lockBtn.textContent=el.locked?'🔒':'🔓';
    lockBtn.title=el.locked?'ロック解除':'ロック';
    lockBtn.addEventListener('click',function(e){e.stopPropagation();toggleLock(el.id);});

function parseCSV(text){
    // BOM除去
    if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
    var rows=[], row=[], cur='', inQ=false;
    for(var i=0;i<text.length;i++){
      var c=text[i],n=text[i+1];
      if(inQ){
        if(c==='"'&&n==='"'){cur+='"';i++;}
        else if(c==='"'){inQ=false;}
        else cur+=c;
      } else {
        if(c==='"'){inQ=true;}
        else if(c===','||c==='\t'){row.push(cur);cur='';}
        else if(c==='\r'&&n==='\n'){rows.push(row);row=[];cur='';i++;}
        else if(c==='\r'||c==='\n'){rows.push(row);row=[];cur='';}
        else cur+=c;
      }
    }
    row.push(cur);rows.push(row);
    return rows.filter(function(r){return r.some(function(c){return c!=='';});});
  }

  // ── XLSXパーサー（ZIP+XML） ──
  // pako不要：DecompressionStream（Chrome93+/Edge93+対応）を使用
  function u8toStr(u8){
    var d=new TextDecoder('utf-8');return d.decode(u8);
  }

  // ZIP local file header parser
  function parseZip(ab){
    var dv=new DataView(ab), u8=new Uint8Array(ab), files={};
    var i=0, len=u8.length;
    while(i<len-4){
      if(dv.getUint32(i,true)!==0x04034b50){i++;continue;}
      var fnLen=dv.getUint16(i+26,true);
      var exLen=dv.getUint16(i+28,true);
      var compSz=dv.getUint32(i+18,true);
      var uncompSz=dv.getUint32(i+22,true);
      var method=dv.getUint16(i+8,true);
      var fn=u8toStr(u8.slice(i+30,i+30+fnLen));
      var dataStart=i+30+fnLen+exLen;
      var compData=u8.slice(dataStart,dataStart+compSz);
      files[fn]={method:method,comp:compData,size:uncompSz};
      i=dataStart+compSz;
    }
    return files;
  }

  // DEFLATE解凍（DecompressionStream使用・同期エミュレーション用にXMLSyncは別途）
  function decompressAsync(data, cb){
    try{
      var ds=new DecompressionStream('deflate-raw');
      var writer=ds.writable.getWriter();
      var reader=ds.readable.getReader();
      var chunks=[];
      function pump(){
        reader.read().then(function(r){
          if(r.done){
            var total=chunks.reduce(function(a,c){return a+c.length;},0);
            var out=new Uint8Array(total),off=0;
            chunks.forEach(function(c){out.set(c,off);off+=c.length;});
            cb(null,out);
          } else {chunks.push(r.value);pump();}
        }).catch(function(e){cb(e,null);});
      }
      pump();
      writer.write(data);
      writer.close();
    } catch(e){cb(e,null);}
  }

  // XLSX内のsharedStrings.xmlとsheet1.xmlを解析
  function parseSheetXml(xml){
    var rows=[];
    // 行を取得
    var rPattern=/<row[^>]*>([\s\S]*?)<\/row>/g;
    var cPattern=/<c\s([^>]*)>([\s\S]*?)<\/c>/g;
    var vPattern=/<v>([\s\S]*?)<\/v>/;
    var rMatch;
    while((rMatch=rPattern.exec(xml))!==null){
      var rowXml=rMatch[1], row=[], cMatch;
      cPattern.lastIndex=0;
      var cells={};
      while((cMatch=cPattern.exec(rowXml))!==null){
        var attrs=cMatch[1], cellXml=cMatch[2];
        var refM=attrs.match(/r="([A-Z]+)(\d+)"/);
        var typeM=attrs.match(/t="([^"]+)"/);
        var vM=vPattern.exec(cellXml);
        var colStr=refM?refM[1]:'A';
        var colIdx=0;
        for(var ci=0;ci<colStr.length;ci++) colIdx=colIdx*26+(colStr.charCodeAt(ci)-64);
        colIdx--;
        cells[colIdx]={type:typeM?typeM[1]:'',val:vM?vM[1]:''};
      }
      if(Object.keys(cells).length){
        var maxCol=Math.max.apply(null,Object.keys(cells).map(Number));
        for(var ci=0;ci<=maxCol;ci++) row.push(cells[ci]||{type:'',val:''});
        rows.push(row);
      }
    }
    return rows;
  }

  function parseSST(xml){
    var sst=[];
    var siPattern=/<si>([\s\S]*?)<\/si>/g;
    var tPattern=/<t[^>]*>([\s\S]*?)<\/t>/g;
    var m;
    while((m=siPattern.exec(xml))!==null){
      var siXml=m[1], text='', tm;
      tPattern.lastIndex=0;
      while((tm=tPattern.exec(siXml))!==null) text+=tm[1];
      sst.push(text.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#(\d+);/g,function(x,n){return String.fromCharCode(+n);}));
    }
    return sst;
  }

  function xlsxToRows(sst, sheetRows){
    return sheetRows.map(function(row){
      return row.map(function(cell){
        if(cell.type==='s') return sst[parseInt(cell.val)]||'';
        if(cell.type==='b') return cell.val==='1'?'TRUE':'FALSE';
        return cell.val;
      });
    });
  }

  // 公開API
  function readAsync(arrayBuffer, cb){
    var u8=new Uint8Array(arrayBuffer);
    // CSV判定（先頭がBOMまたはASCII印字可能文字）
    var isProbablyText=(u8[0]===0xEF&&u8[1]===0xBB&&u8[2]===0xBF)||
      (u8[0]===0xFE&&u8[1]===0xFF)||
      (u8[0]<128&&u8[0]>7);
    if(isProbablyText){
      var text=new TextDecoder('utf-8').decode(u8);
      cb(null,parseCSV(text));return;
    }
    // ZIPシグネチャ確認（xlsx）
    if(u8[0]===0x50&&u8[1]===0x4B){
      try{
        var files=parseZip(arrayBuffer);
        var sstFile=files['xl/sharedStrings.xml'];
        var sheetFile=files['xl/worksheets/sheet1.xml'];
        if(!sheetFile){cb(new Error('sheet1.xmlが見つかりません'),null);return;}

        function getFileContent(fileEntry, done){
          if(!fileEntry){done('');return;}
          if(fileEntry.method===0){done(u8toStr(fileEntry.comp));return;}
          // method=8: deflate
          decompressAsync(fileEntry.comp,function(err,data){
            if(err){done('');}else{done(u8toStr(data));}
          });
        }

        getFileContent(sstFile,function(sstXml){
          var sst=sstXml?parseSST(sstXml):[];
          getFileContent(sheetFile,function(sheetXml){
            var sheetRows=parseSheetXml(sheetXml);
            cb(null,xlsxToRows(sst,sheetRows));
          });
        });
      }catch(e){cb(e,null);}
      return;
    }
    cb(new Error('未対応のファイル形式です(.csv/.xlsxのみ対応)'),null);
  }
function onXlFile(event){
  var file=event.target.files[0];
  if(!file)return;
  event.target.value=''; // reset so same file can be re-selected
  document.getElementById('xl-filename').textContent=file.name;
  document.getElementById('xl-col-sel').style.display='none';
  document.getElementById('xl-preview').style.display='none';
  document.getElementById('xl-import-btn').disabled=true;
  document.getElementById('xl-msg').textContent='読み込み中...';
  document.getElementById('xl-modal').classList.add('open');

  var reader=new FileReader();
  reader.onload=function(e){
    OfflineXLSX.readAsync(e.target.result, function(err, data){
      if(err||!data){document.getElementById('xl-msg').textContent='読み込みエラー: '+(err?err.message:'データなし');return;}
      if(data.length<2){document.getElementById('xl-msg').textContent='データが見つかりませんでした';return;}
      xlHeaders=data[0].map(function(h,i){return String(h||'列'+(i+1));});
      xlRows=data.slice(1).filter(function(r){return r.some(function(c){return String(c||'')!=='';});});
      // 列セレクタを作成
      var nameCol=document.getElementById('xl-name-col');
      var priceCol=document.getElementById('xl-price-col');
      nameCol.innerHTML=''; priceCol.innerHTML='';
      xlHeaders.forEach(function(h,i){
        nameCol.innerHTML+='<option value="'+i+'">'+escXl(h)+'</option>';
        priceCol.innerHTML+='<option value="'+i+'">'+escXl(h)+'</option>';
      });
      // 列自動推測
      var nameGuess=0, priceGuess=1;
      xlHeaders.forEach(function(h,i){
        var lh=String(h).toLowerCase();
        if(/名|plant|name/.test(lh))nameGuess=i;
        if(/価格|price|値段|円|tax|税/.test(lh))priceGuess=i;
      });
      nameCol.value=nameGuess; priceCol.value=priceGuess;
      document.getElementById('xl-col-sel').style.display='flex';
      document.getElementById('xl-import-btn').disabled=false;
      document.getElementById('xl-msg').textContent=xlRows.length+'行のデータが見つかりました';
      updateXlPreview();
    });
  };
  reader.readAsArrayBuffer(file);
}

function escXl(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function updateXlPreview(){
  var nc=parseInt(document.getElementById('xl-name-col').value);
  var pc=parseInt(document.getElementById('xl-price-col').value);
  var preview=document.getElementById('xl-preview');
  var rows=xlRows.slice(0,5);
  if(!rows.length){preview.style.display='none';return;}
  preview.style.display='block';
  preview.innerHTML=rows.map(function(r){
    var name=escXl(r[nc]||'');
    var price=escXl(r[pc]||'');
    return '<div class="preview-row"><span class="preview-row-name">'+name+'</span><span class="preview-row-price">¥'+price+'</span></div>';
  }).join('') + (xlRows.length>5?'<div class="preview-row" style="color:var(--hint);font-size:11px;justify-content:center">…他 '+(xlRows.length-5)+'件</div>':'');
}

document.addEventListener('DOMContentLoaded',function(){
  var nc=document.getElementById('xl-name-col');
  var pc=document.getElementById('xl-price-col');
  if(nc)nc.addEventListener('change',updateXlPreview);
  if(pc)pc.addEventListener('change',updateXlPreview);
});

function doXlImport(){
  var nc=parseInt(document.getElementById('xl-name-col').value);
  var pc=parseInt(document.getElementById('xl-price-col').value);
  var added=0;
  xlRows.forEach(function(r){
    var name=String(r[nc]||'').trim();
    var price=parseInt(String(r[pc]||'').replace(/[^\d]/g,''))||0;
    if(name&&price){items.push({id:Date.now()+Math.random(),name:name,price:price});added++;}
  });
  closeXlModal();
  renderList();updateBadge();redrawPrev();
  toast(added+'件を挿入しました');
}

function closeXlModal(){

function generatePDF(){
  if(!items.length){toast('植物を追加してください');return;}
  toast('プレビューを生成中...');

  var p=curPreset(),cfg=gst();
  var perPage=p.c*p.r,totalPages=Math.ceil(items.length/perPage);
  var MM=3.7795,scale=2;
  var A4W=Math.round(297*MM),A4H=Math.round(210*MM);
  var mg=Math.round(7*MM),gap=Math.round(4*MM);
  var popW=Math.round(p.cw*MM),popH=Math.round(p.ch*MM);

  _printDataUrls=[];
  for(var pg=0;pg<totalPages;pg++){
    var cvs=document.createElement('canvas');
    cvs.width=A4W*scale;cvs.height=A4H*scale;
    var ctx=cvs.getContext('2d');
    var bgRgb=h2rgb(cfg.cb);
    ctx.fillStyle='rgb('+bgRgb[0]+','+bgRgb[1]+','+bgRgb[2]+')';
    ctx.fillRect(0,0,cvs.width,cvs.height);
    for(var i=0;i<perPage;i++){
      var item=items[pg*perPage+i]||null;
      var col=i%p.c,row=Math.floor(i/p.c);
      drawPop(ctx,(mg+col*(popW+gap))*scale,(mg+row*(popH+gap))*scale,popW*scale,popH*scale,item,cfg);
    }
    ctx.strokeStyle='rgba(150,145,140,.7)';ctx.lineWidth=scale;ctx.setLineDash([5*scale,4*scale]);
    for(var ci=1;ci<p.c;ci++){var lx=(mg+ci*(popW+gap)-gap/2)*scale;ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,cvs.height);ctx.stroke();}
    for(var ri=1;ri<p.r;ri++){var ly=(mg+ri*(popH+gap)-gap/2)*scale;ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(cvs.width,ly);ctx.stroke();}
    ctx.setLineDash([]);
    _printDataUrls.push(cvs.toDataURL('image/png'));
  }

  var pagesDiv=document.getElementById('print-pages');
  pagesDiv.innerHTML='';
  _printDataUrls.forEach(function(url){
    var img=document.createElement('img');
    img.src=url;
    img.style.cssText='width:100%;max-width:100%;display:block;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.3);';
    pagesDiv.appendChild(img);
  });

  document.getElementById('print-title').textContent='\uD83C\uDF3F 値段ポップ \u2014 '+items.length+'件 / '+totalPages+'ページ';

  document.getElementById('print-style').textContent=[
    '@page{size:A4 landscape;margin:0;}',
    '@media print{',
    '  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}',
    '  html,body{width:297mm;height:210mm;margin:0!important;padding:0!important;background:none!important;overflow:hidden;}',
    '  #print-toolbar,nav,header,#toast,#xl-modal,.modal-overlay,main{display:none!important;}',
    '  #print-overlay{position:fixed!important;inset:0!important;background:none!important;display:block!important;overflow:hidden!important;}',
    '  #print-pages{display:block!important;overflow:visible!important;padding:0!important;gap:0!important;width:297mm!important;}',
    '  #print-pages img{display:block!important;width:297mm!important;height:210mm!important;box-shadow:none!important;margin:0!important;padding:0!important;page-break-after:always;page-break-inside:avoid;}',
    '  #print-pages img:last-child{page-break-after:auto;}',
    '}'
  ].join('\n');

  document.getElementById('print-overlay').style.display='flex';
  setTimeout(function(){toast('🖨 印刷ボタンで印刷 / PDFで保存できます');},400);
}

// 背景画像を読み込み
function loadBgImage(event){
  var file = event.target.files[0];
  if(!file) return;
  event.target.value = '';

  var reader = new FileReader();
  reader.onload = function(ev){
    var img = new Image();
    img.onload = function(){
      customBgImg  = img;
      customBgData = ev.target.result;

      // プレビュー表示
      var thumb = document.getElementById('bg-img-thumb');
      var preview = document.getElementById('bg-img-preview');
      var hint = document.getElementById('bg-text-hint');
      var uploadBtn = document.getElementById('bg-upload-btn');
      if(thumb)  thumb.src = ev.target.result;
      if(preview) preview.style.display = 'block';
      if(hint)    hint.style.display = 'block';
      if(uploadBtn) uploadBtn.textContent = '📁 別の画像に変更';

      // デザインスタイルを「カスタム」に切り替え
      var ds = document.getElementById('dstyle');
      if(ds) ds.value = 'custom';

      // localStorage に保存（テンプレート保存時に含める）
      redrawAll();
      toast('背景画像を設定しました');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

// 背景画像をクリア
function clearBgImage(){
  customBgImg  = null;
  customBgData = null;
  var preview   = document.getElementById('bg-img-preview');
  var hint      = document.getElementById('bg-text-hint');
  var uploadBtn = document.getElementById('bg-upload-btn');
  if(preview)   preview.style.display = 'none';
  if(hint)      hint.style.display = 'none';
  if(uploadBtn) uploadBtn.textContent = '📁 画像ファイルを選択';

  // スタイルをナチュラルに戻す
  var ds = document.getElementById('dstyle');
  if(ds && ds.value === 'custom') ds.value = 'natural';
  redrawAll();
  toast('背景画像を削除しました');
}

// ━━ TOAST ━━
function toast(msg,dur){
  var el=document.getElementById('toast');if(!el)return;
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toast._t);
  toast._t=setTimeout(function(){el.classList.remove('show');},dur||2200);
}

// 税率ポップオーバー開閉
function toggleTaxPopover(){
  var pop=document.getElementById('tax-popover');
  if(!pop)return;
  var isOpen=pop.classList.contains('open');
  pop.classList.toggle('open',!isOpen);
  if(!isOpen){
    // 外クリックで閉じる
    setTimeout(function(){
      document.addEventListener('click',function handler(e){
        if(!pop.contains(e.target)&&e.target.id!=='tax-rate-toggle-btn'){
          pop.classList.remove('open');
          document.removeEventListener('click',handler);
        }
      });
    },10);
  }
}
