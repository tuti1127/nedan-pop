// ━━ GST ━━
function gst(){
  return{
    ca:(document.getElementById('caccent')||{value:'#2d7a4f'}).value,
    cb:(document.getElementById('cbg')||{value:'#fffef8'}).value,
    st:(document.getElementById('dstyle')||{value:'natural'}).value
  };
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ━━ CANVAS UTILITIES ━━
function rrect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function h2rgba(hex,a){var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return'rgba('+r+','+g+','+b+','+a+')';}
function h2rgb(hex){return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};}
function wrapWords(ctx,text,maxW){
  // スペース（半角・全角）で単語分割を試みる
  var hasSpace=/[\s\u3000]/.test(text);
  if(hasSpace){
    var words=text.split(/[\s\u3000]+/).filter(function(w){return w.length>0;});
    var result=[],line='';
    words.forEach(function(w){
      var test=line?line+' '+w:w;
      if(ctx.measureText(test).width>maxW&&line){result.push(line);line=w;}
      else line=test;
    });
    if(line)result.push(line);
    if(result.length>1)return result;
  }
  // スペースなし or 1行に収まった → 文字単位で折り返し
  var result2=[],line2='';
  for(var i=0;i<text.length;i++){
    var t=line2+text[i];
    if(ctx.measureText(t).width>maxW&&line2){result2.push(line2);line2=text[i];}
    else line2=t;
  }
  if(line2)result2.push(line2);
  return result2.length?result2:[text];
}
function drawFrame(ctx, cx, cy, cw, ch, ca, st) {
  var lw = cw * .012;
  // カスタム背景：枠線は描画しない（背景画像が枠を持つため）
  if(st === 'custom') { return; }
  if(st === 'natural') {
    ctx.strokeStyle = ca; ctx.lineWidth = lw*1.3;
    rrect(ctx, cx+lw, cy+lw, cw-lw*2, ch-lw*2, cw*.034); ctx.stroke();
    var p2 = cw*.04;
    ctx.lineWidth = lw*.4; ctx.strokeStyle = h2rgba(ca,.4);
    rrect(ctx, cx+p2, cy+p2, cw-p2*2, ch-p2*2, cw*.024); ctx.stroke();
    ctx.fillStyle = h2rgba(ca,.07);
    ctx.fillRect(cx+p2, cy+p2, cw-p2*2, ch*.12);
  } else if(st === 'ikea') {
    // IKEAスタイル：角なし・太い黒枠
    ctx.strokeStyle = '#111'; ctx.lineWidth = lw*1.6;
    ctx.strokeRect(cx+lw, cy+lw, cw-lw*2, ch-lw*2);
  }
}

// Fit font size so that `lines` rendered at LINE_GAP fits within maxH px.
// Returns the fitted fs (>= minFs).
function fitFs(ctx, text, fontStyle, startFs, maxW, maxH, minFs) {
  var LINE_GAP = 1.28;
  var fs = startFs;
  for(var i = 0; i < 30; i++) {
    ctx.font = fontStyle.replace('__FS__', fs);
    var lines = wrapWords(ctx, text, maxW);
    if(lines.length * fs * LINE_GAP <= maxH || fs <= minFs) {
      return {fs: Math.max(minFs, fs), lines: lines};
    }
    fs *= 0.88;
  }
  ctx.font = fontStyle.replace('__FS__', fs);
  return {fs: Math.max(minFs, fs), lines: wrapWords(ctx, text, maxW)};
}

function drawPop(ctx, cx, cy, cw, ch, sample, cfg) {
  var ca=cfg.ca, cb=cfg.cb, st=cfg.st, sn=cfg.sn;
  var LINE_GAP = 1.28;

  // Background
  if(st==='custom' && customBgImg && customBgImg.complete && customBgImg.naturalWidth>0){
    ctx.save(); rrect(ctx,cx,cy,cw,ch,cw*.02); ctx.clip();
    ctx.drawImage(customBgImg,cx,cy,cw,ch); ctx.restore();
  } else {
    ctx.fillStyle=cb; rrect(ctx,cx,cy,cw,ch,cw*.04); ctx.fill();
  }
  // Frame
  drawFrame(ctx, cx, cy, cw, ch, ca, st);

  if(!sample) {
    ctx.fillStyle='rgba(155,155,150,.45)'; ctx.font=(cw*.05)+'px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('空き', cx+cw/2, cy+ch/2); return;
  }

  var pad   = cw * .06;
  var aW    = cw - pad*2;
  var aH    = ch - pad*2;
  var topD  = (st==='natural') ? ch*.12 : (st==='minimal' ? ch*.03 : 0);

  // Content area after top decoration
  var contentY = cy + pad + topD;
  var contentH = ch - pad - topD - pad*.5;

  var SCALE = cw / 105;
  var nameEl  = ELS.find(function(e){return e.id==='name';});
  var priceEl = ELS.find(function(e){return e.id==='price';});
  var taxEl   = ELS.find(function(e){return e.id==='tax';});
  var shopEl  = ELS.find(function(e){return e.id==='shop';});

  // 価格計算
  var prices = sample.price ? calcPrices(sample.price) : {base:0, incl:0};
  var isExcl = PRICE_MODE==='excl';

  // ── IKEAスタイル専用レイアウト ──
  if(st==='ikea'){
    var SC = cw/105;
    var pad2 = cw*0.05;
    var aW2  = cw - pad2*2;

    // 黄色ヘッダー帯（上30%）
    var hdrH = ch * 0.32;
    ctx.fillStyle = '#FFDA1A';
    ctx.fillRect(cx, cy, cw, hdrH);

    // ヘッダー帯と本体の境界線
    ctx.fillStyle = '#111';
    ctx.fillRect(cx, cy+hdrH, cw, cw*0.013);

    // 植物名（黄帯内・黒・大）
    var nameText2 = sample.name||'';
    if(nameText2){
      var nFs2 = 20*SC;
      var nFit2 = fitFs(ctx,nameText2,'700 __FS__px sans-serif',nFs2,aW2*0.92,hdrH*0.72,7);
      ctx.font='700 '+nFit2.fs+'px sans-serif';
      ctx.fillStyle='#111'; ctx.textAlign='center'; ctx.textBaseline='middle';
      var nBH=nFit2.lines.length*nFit2.fs*1.25;
      var nSY=cy+(hdrH-nBH)*0.5;
      nFit2.lines.forEach(function(ln,li){
        ctx.fillText(ln,cx+cw/2,nSY+nFit2.fs*1.25*(li+0.5));
      });
    }

    // 価格エリア（下70%・白背景）
    var priceAreaY2 = cy + hdrH + cw*0.013;
    var priceAreaH2 = ch - hdrH - cw*0.013;

    var prices2 = sample.price ? calcPrices(sample.price) : {base:0,incl:0};
    var isExcl2 = PRICE_MODE==='excl';
    var mainPrice = isExcl2 ? prices2.base : prices2.incl;
    var subPrice  = isExcl2 ? prices2.incl : null;

    if(mainPrice){
      // 価格ラベル（小・左寄り）
      var lblFs = 7*SC;
      ctx.font='500 '+lblFs+'px sans-serif';
      ctx.fillStyle='#555'; ctx.textAlign='left'; ctx.textBaseline='top';
      ctx.fillText(isExcl2?'税抜価格':'税込価格', cx+pad2, priceAreaY2+priceAreaH2*0.08);

      // 価格数字（極大・左寄り・黒）
      var pTxt = mainPrice.toLocaleString();
      var pFs  = 34*SC;
      ctx.font='900 '+pFs+'px sans-serif';
      while(ctx.measureText(pTxt+'円').width>aW2*0.82&&pFs>10){pFs*=0.91;ctx.font='900 '+pFs+'px sans-serif';}
      ctx.fillStyle='#111'; ctx.textAlign='left'; ctx.textBaseline='middle';
      ctx.fillText(pTxt, cx+pad2, priceAreaY2+priceAreaH2*(subPrice?0.42:0.50));
      // 「円」を小さく右に
      ctx.font='700 '+(pFs*0.38)+'px sans-serif'; ctx.textBaseline='middle';
      var pw=ctx.measureText(pTxt).width;
      ctx.font='900 '+pFs+'px sans-serif'; // 測定用に戻す
      pw=ctx.measureText(pTxt).width;
      ctx.font='700 '+(pFs*0.38)+'px sans-serif';
      ctx.fillText('円', cx+pad2+pw+2, priceAreaY2+priceAreaH2*(subPrice?0.42:0.50));

      if(subPrice&&isExcl2){
        // 税込区切り線
        ctx.strokeStyle='rgba(0,0,0,.12)'; ctx.lineWidth=0.7;
        ctx.beginPath();
        ctx.moveTo(cx+pad2,priceAreaY2+priceAreaH2*0.66);
        ctx.lineTo(cx+cw-pad2,priceAreaY2+priceAreaH2*0.66);
        ctx.stroke();
        // 税込ラベル
        ctx.font='500 '+lblFs+'px sans-serif';
        ctx.fillStyle='#888'; ctx.textAlign='left'; ctx.textBaseline='top';
        ctx.fillText('税込価格', cx+pad2, priceAreaY2+priceAreaH2*0.69);
        // 税込価格（中）
        var iTxt=subPrice.toLocaleString()+'円';
        var iFs=pFs*0.55;
        ctx.font='700 '+iFs+'px sans-serif';
        ctx.fillStyle='#444'; ctx.textBaseline='middle';
        ctx.fillText(iTxt,cx+pad2,priceAreaY2+priceAreaH2*0.86);
      }
    }
    return;
  }

  // ── 通常レイアウト（natural）──
  // Zone split: top 48% = name, bottom 52% = price zone
  var nameZoneH  = contentH * 0.48;
  var priceZoneH = contentH * 0.52;

  // NAME zone: fit name text
  var nameText = sample.name || '';
  var nameFit = {fs:8, lines:[nameText]};
  if(nameText){
    var nameBaseFs = (nameEl?nameEl.size:20)*SCALE;
    nameFit = fitFs(ctx, nameText,
      (nameEl&&nameEl.bold?'700':'400')+' __FS__px "Noto Sans JP",sans-serif',
      nameBaseFs, aW*.92, nameZoneH, 8);
  }

  // PRICE zone texts（税率計算済み）
  var displayPrice = prices.incl;
  var priceText = displayPrice ? '¥ '+displayPrice.toLocaleString() : '';
  var taxText   = '（税込）';
  var shopText  = sn || '';

  // Price font: start from el.size, but clamp so it's no more than 2× name fs
  var priceBaseFs = (priceEl ? priceEl.size : 26) * SCALE;
  var priceMaxFs  = nameFit.fs * 2.0;
  var priceStartFs = Math.min(priceBaseFs, priceMaxFs);

  // Allocate heights within price zone
  var taxFs   = (taxEl  ? taxEl.size  :  9) * SCALE;
  var shopFs  = (shopEl ? shopEl.size :  8) * SCALE;
  var taxH    = taxText  ? taxFs  * LINE_GAP : 0;
  var shopH   = shopText ? shopFs * LINE_GAP : 0;
  var priceZoneForPrice = priceZoneH - taxH - shopH - (taxH||shopH ? cw*.012 : 0);

  var priceFit = {fs: 8, lines: [priceText]};
  if(priceText) {
    priceFit = fitFs(ctx, priceText,
      (priceEl&&priceEl.bold?'700':'400')+' __FS__px "Noto Sans JP",sans-serif',
      priceStartFs, aW * .92, Math.max(priceZoneForPrice, priceZoneH * 0.55), 8);
  }

  // ── Draw name zone (vertically centred within its zone) ──
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  if(nameText) {
    ctx.font = (nameEl&&nameEl.bold?'700':'400')+' '+nameFit.fs+'px "Noto Sans JP",sans-serif';
    ctx.fillStyle = nameEl ? nameEl.color : '#2d5a1e';
    var nameBlockH = nameFit.lines.length * nameFit.fs * LINE_GAP;
    var nameStartY = contentY + (nameZoneH - nameBlockH) / 2;
    nameFit.lines.forEach(function(ln, li) {
      ctx.fillText(ln, cx+cw/2, nameStartY + nameFit.fs*LINE_GAP*(li+0.5));
    });
  }

  // ── Divider line between zones ──
  var divY = contentY + nameZoneH;
  ctx.strokeStyle = h2rgba(ca, 0.20);
  ctx.lineWidth = 0.6;
  ctx.setLineDash && ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(cx + pad*1.2, divY);
  ctx.lineTo(cx + cw - pad*1.2, divY);
  ctx.stroke();

  // ── Draw price zone ──
  var priceZoneTop = divY;
  var priceBlockH  = priceFit.lines.length * priceFit.fs * LINE_GAP;
  var taxLineH     = taxH + (taxText && priceText ? cw*.008 : 0);
  var shopLineH    = shopH + (shopText ? cw*.006 : 0);
  var totalPriceContent = priceBlockH + taxLineH + shopLineH;
  var priceStartY  = priceZoneTop + (priceZoneH - totalPriceContent) / 2;

  if(priceText) {
    ctx.font = (priceEl&&priceEl.bold?'700':'400')+' '+priceFit.fs+'px "Noto Sans JP",sans-serif';
    ctx.fillStyle = priceEl ? priceEl.color : '#b45309';
    priceFit.lines.forEach(function(ln, li) {
      ctx.fillText(ln, cx+cw/2, priceStartY + priceFit.fs*LINE_GAP*(li+0.5));
    });
    priceStartY += priceBlockH + cw*.008;
  }
  if(taxText) {
    ctx.font = (taxEl&&taxEl.bold?'700':'400')+' '+taxFs+'px "Noto Sans JP",sans-serif';
    ctx.fillStyle = taxEl ? taxEl.color : '#9ca3af';
    ctx.fillText(taxText, cx+cw/2, priceStartY + taxFs*0.6);
    priceStartY += taxLineH;
  }
  if(shopText) {
    ctx.font = (shopEl&&shopEl.bold?'700':'400')+' '+shopFs+'px "Noto Sans JP",sans-serif';
    ctx.fillStyle = shopEl ? shopEl.color : '#6b7280';
    ctx.fillText(shopText, cx+cw/2, priceStartY + shopFs*0.6);
  }

  // ── カスタム要素（固定4要素以外）を描画 ──
  var FIXED_IDS={name:1,price:1,tax:1,shop:1};
  var customEls=ELS.filter(function(e){return !FIXED_IDS[e.id];});
  if(customEls.length){
    var aWc=cw-pad*2,aHc=ch-pad*2;
    customEls.forEach(function(cel){
      var ex2=cx+pad+cel.x*aWc, ey2=cy+pad+cel.y*aHc;
      var cfs=cel.size*SCALE;
      ctx.font=(cel.bold?'700':'400')+' '+cfs+'px "Noto Sans JP",sans-serif';
      ctx.fillStyle=cel.color||'#333';
      ctx.textAlign=cel.align||'center';
      ctx.textBaseline='middle';
      ctx.fillText(cel.text||cel.label,ex2,ey2);
    });
  }

  // ── Logo: bottom-right corner ──
  if(logoImg && logoImg.complete && logoImg.naturalWidth > 0) {
    var logoSize = cw * 0.18; // 18% of pop width
    var margin   = cw * 0.03;
    var lx = cx + cw - margin - logoSize;
    var ly = cy + ch - margin - logoSize;
    ctx.save();
    ctx.drawImage(logoImg, lx, ly, logoSize, logoSize);
    ctx.restore();
  }
}

// ━━ EDITOR CANVAS ━━
var _resizeHandle=null;
function initEdCvs(){
  var c=document.getElementById('pop-canvas');if(!c)return;
  var sz=function(){
    var p=curPreset(),W=c.clientWidth||240,ar=p.cw/p.ch;
    c.width=W*2;c.height=Math.round(W/ar)*2;redrawEd();
  };
  sz();
  window.addEventListener('resize',function(){if(document.getElementById('panel-template').classList.contains('on'))sz();});
  c.addEventListener('mousedown',edDn);c.addEventListener('mousemove',edMv);c.addEventListener('mouseup',edUp);c.addEventListener('mouseleave',edUp);
  c.addEventListener('touchstart',function(e){e.preventDefault();edDn(e.touches[0]);},{passive:false});
  c.addEventListener('touchmove', function(e){e.preventDefault();edMv(e.touches[0]);},{passive:false});
  c.addEventListener('touchend',  function(e){e.preventDefault();edUp();},{passive:false});
}
function epos(cx,cy){var c=document.getElementById('pop-canvas'),r=c.getBoundingClientRect();return{x:(cx-r.left)*(c.width/c.clientWidth),y:(cy-r.top)*(c.height/c.clientHeight)};}
function edDn(e){
  var c=document.getElementById('pop-canvas'),p=epos(e.clientX,e.clientY);
  var W=c.width,H=c.height,pd=W*.07,aW=W-pd*2,aH=H-pd*2;
  _resizeHandle=null;
  if(!EL_BOXES.length)redrawEd();

  // 選択中の項目がある場合のみドラッグ開始
  if(!selEl){
    toast('右の「項目」リストから移動したい項目を選択してください');
    return;
  }
  var el=gEl(selEl);
  if(!el){return;}
  if(el.locked){toast('ロックを解除してください');return;}

  var selBox=EL_BOXES.find(function(b){return b.id===selEl;});
  if(selBox&&p.x>=selBox.bx-14&&p.x<=selBox.bx+selBox.bw+14&&p.y>=selBox.by-14&&p.y<=selBox.by+selBox.bh+14){
    dragging={id:selEl,ox:p.x-selBox.ex,oy:p.y-selBox.ey};
    c.style.cursor='grabbing';
    redrawEd();
  }
}
function edMv(e){
  var c=document.getElementById('pop-canvas'),p=epos(e.clientX,e.clientY);
  var W=c.width,H=c.height,pd=W*.07,aW=W-pd*2,aH=H-pd*2;

  // ドラッグ中
  if(dragging&&selEl){
    var el=gEl(dragging.id);if(!el||el.locked){dragging=null;return;}
    markEdited();
    el.x=Math.max(0,Math.min(1,(p.x-dragging.ox-pd)/aW));
    el.y=Math.max(0,Math.min(1,(p.y-dragging.oy-pd)/aH));
    updateQP(el);redrawEd();
    c.style.cursor='grabbing';
    return;
  }

  // ホバー：選択中ボックス上かどうかでカーソル変更
  if(!selEl){c.style.cursor='default';return;}
  var selBox=EL_BOXES.find(function(b){return b.id===selEl;});
  if(selBox&&p.x>=selBox.bx-14&&p.x<=selBox.bx+selBox.bw+14&&p.y>=selBox.by-14&&p.y<=selBox.by+selBox.bh+14){
    c.style.cursor='grab';
  } else {
    c.style.cursor='default';
  }
}
function edUp(){dragging=null;_resizeHandle=null;}

function redrawEd(){
  var c=document.getElementById('pop-canvas');if(!c||!c.width)return;
  var ctx=c.getContext('2d'),W=c.width,H=c.height;
  ctx.clearRect(0,0,W,H);
  var sample=items[0]||{name:'コルクチューブ SS',price:5000};
  var cfg=gst();
  // 背景
  ctx.fillStyle=cfg.cb;rrect(ctx,0,0,W,H,W*.04);ctx.fill();
  drawFrame(ctx,0,0,W,H,cfg.ca,cfg.st);
var pd=W*.07,aW=W-pd*2,aH=H-pd*2;
  EL_BOXES=[];
  var EL_COLORS={name:'#e67e22',price:'#2980b9',tax:'#8e44ad',shop:'#27ae60'};
  var texts={
    name:sample.name||'植物名',
    price:'¥ '+(sample.price||0).toLocaleString(),
    tax:'（税込）'
  };
  ELS.forEach(function(el){if(!texts[el.id])texts[el.id]=el.text||el.label;});
  var sorted=[].concat(ELS).sort(function(a,b){return(a.zIndex||0)-(b.zIndex||0);});
  var SCALE=W/105;
  sorted.forEach(function(el){
    if(el.locked&&el.id!=='name'&&el.id!=='price'&&el.id!=='tax')return;
    var isSel=selEl===el.id;
    var dotColor=EL_COLORS[el.id]||el.color||'#888';
    var ex=pd+el.x*aW,ey=pd+el.y*aH;
    var text=texts[el.id]||el.text||'';
    if(!text)return;
    ctx.save();
    ctx.globalAlpha=el.opacity||1;
    var fs=(el.size||12)*SCALE;
    ctx.font=(el.bold?'700':'400')+' '+fs+'px sans-serif';
    var tw=ctx.measureText(text).width;
    var bw=tw+14,bh=fs*1.5;
    var bx=el.align==='center'?ex-tw/2-7:el.align==='right'?ex-tw-7:ex-7;
    var by=ey-fs*.95;
    EL_BOXES.push({id:el.id,bx:bx,by:by,bw:bw,bh:bh,ex:ex,ey:ey});
    ctx.globalAlpha=1;
    if(isSel){
      ctx.fillStyle='rgba('+parseInt(dotColor.slice(1,3),16)+','+parseInt(dotColor.slice(3,5),16)+','+parseInt(dotColor.slice(5,7),16)+',.13)';
      rrect(ctx,bx,by,bw,bh,5);ctx.fill();
      ctx.strokeStyle=dotColor;ctx.lineWidth=2;rrect(ctx,bx,by,bw,bh,5);ctx.stroke();
    } else {
      ctx.strokeStyle=dotColor;ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      rrect(ctx,bx,by,bw,bh,5);ctx.stroke();ctx.setLineDash([]);
    }
    ctx.font='10px sans-serif';ctx.fillStyle=dotColor;ctx.globalAlpha=.75;
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(el.label,bx+4,by+2);
    ctx.restore();
  });
  // カーソル：項目未選択はデフォルト、選択中はgrab
  if(!selEl){
    c.style.cursor='default';
  } else if(dragging){
    c.style.cursor='grabbing';
  } else {
    // マウス位置が選択中ボックス上かどうかはmousemoveで更新するのでここはgrab固定
    c.style.cursor='grab';
  }
}

function addImage(event){

  [].concat(ELS).sort(function(a,b){return(b.zIndex||0)-(a.zIndex||0);}).forEach(function(el){
    var isFixed=!!FIXED[el.id];
    var dotColor=EL_COLORS[el.id]||el.color||'#888';
    var isOpen=selEl===el.id;

    var row=document.createElement('div');
    row.className='item-row'+(isOpen?' open':'');

    // ── メイン行 ──
    var main=document.createElement('div');main.className='item-row-main';

    main.addEventListener('click',function(){
      if(el.locked){toast('ロックを解除してください');return;}

    // ── インラインプロパティ（開いた時のみ表示） ──

      r1.appendChild(clrLabel);

// ━━ PROPS PANEL (DOM操作) ━━
function buildPropsPanel(el){
  var sec=document.getElementById('el-props-section');
  var titleEl=document.getElementById('el-props-title');
  var body=document.getElementById('el-props-body');
  if(!sec||!body)return;
  sec.style.display='block';
  if(titleEl)titleEl.textContent=(el.label||'要素')+'のプロパティ';
  body.innerHTML='';
  var FIXED={name:1,price:1,tax:1,shop:1};
  var isFixed=!!FIXED[el.id];
  var type=el.type||'text';
  function row(lbl){var d=document.createElement('div');d.className='prop-row';var l=document.createElement('div');l.className='prop-lbl';l.textContent=lbl;d.appendChild(l);return d;}
  function ph(){var d=document.createElement('div');d.className='prop-h';return d;}
  function pbtn(txt,cls){var b=document.createElement('button');b.className='prop-btn'+(cls?' '+cls:'');b.textContent=txt;return b;}
  function cinp(val,cb){var i=document.createElement('input');i.type='color';i.value=val||'#000';i.style.cssText='width:100%;height:36px;border:1.5px solid var(--ln);border-radius:var(--r3);padding:3px;-webkit-appearance:none;';i.addEventListener('change',function(){cb(this.value);});return i;}
  function rinp(mn,mx,val,cb){var i=document.createElement('input');i.type='range';i.min=mn;i.max=mx;i.value=val;i.addEventListener('input',function(){cb(this.value);});return i;}
  function unit(t){var s=document.createElement('span');s.className='qp-u';s.textContent=t;return s;}

  if(type==='text'){
    if(!isFixed){
      var r1=row('テキスト');var ti=document.createElement('input');ti.className='prop-inp';ti.type='text';ti.value=el.text||el.label||'';ti.addEventListener('input',function(){sText(el.id,this.value);});r1.appendChild(ti);body.appendChild(r1);
      // 入力フォームに表示チェック
      var r1b=row('入力フォームに表示');

      var ckb=document.createElement('input');ckb.type='checkbox';ckb.style.cssText='width:18px;height:18px;accent-color:var(--gr);';ckb.checked=!!el.inputField;
      ckb.addEventListener('change',function(){el.inputField=this.checked;rebuildInpFields();});
      lck.appendChild(ckb);lck.appendChild(document.createTextNode('入力タブに表示する'));r1b.appendChild(lck);body.appendChild(r1b);
      // 任意チェック
      var r1c=row('必須/任意');
      var lck2=document.createElement('label');lck2.style.cssText='display:flex;align-items:center;gap:8px;font-size:13px;';
      var ckb2=document.createElement('input');ckb2.type='checkbox';ckb2.style.cssText='width:18px;height:18px;accent-color:var(--gr);';ckb2.checked=!!el.optional;
      ckb2.addEventListener('change',function(){el.optional=this.checked;rebuildInpFields();});
      lck2.appendChild(ckb2);lck2.appendChild(document.createTextNode('任意入力（チェックボックス付き）'));r1c.appendChild(lck2);body.appendChild(r1c);
    }
    var r2=row('フォントサイズ');var h2=ph();
    var bm=pbtn('−');bm.style.cssText='flex:none;width:36px;';bm.addEventListener('click',function(){nudge(el.id,'size',-1);});
    var si=document.createElement('input');si.className='prop-inp';si.type='number';si.min=6;si.max=120;si.value=el.size||12;si.style.cssText='text-align:center;flex:1;';si.addEventListener('input',function(){sSz(el.id,this.value);});
    var bp=pbtn('＋');bp.style.cssText='flex:none;width:36px;';bp.addEventListener('click',function(){nudge(el.id,'size',1);});
    h2.appendChild(bm);h2.appendChild(si);h2.appendChild(bp);r2.appendChild(h2);body.appendChild(r2);
    var r3=row('文字色');r3.appendChild(cinp(el.color||'#333',function(v){sClr(el.id,v);}));body.appendChild(r3);
    var r4=row('スタイル・揃え');var br=document.createElement('div');br.className='prop-btn-row';
    var bb=pbtn('B 太字',el.bold?'on':'');bb.addEventListener('click',function(){toggleBold(el.id);});
    var bl=pbtn('◁左',el.align==='left'?'on':'');bl.addEventListener('click',function(){sAln(el.id,'left');});
    var bc=pbtn('中央',el.align==='center'?'on':'');bc.addEventListener('click',function(){sAln(el.id,'center');});
    var brg=pbtn('右▷',el.align==='right'?'on':'');brg.addEventListener('click',function(){sAln(el.id,'right');});
    br.appendChild(bb);br.appendChild(bl);br.appendChild(bc);br.appendChild(brg);r4.appendChild(br);body.appendChild(r4);
  }
  // 共通：透明度

  var btop=pbtn('⤒ 最前面');btop.style.flex='1';btop.addEventListener('click',function(){changeZ(999);});
  var bbot=pbtn('⤓ 最背面');bbot.style.flex='1';bbot.addEventListener('click',function(){changeZ(-999);});
  brow.appendChild(bdup);brow.appendChild(btop);brow.appendChild(bbot);rops.appendChild(brow);body.appendChild(rops);

// ━━ TEMPLATES ━━
function loadT(){try{return JSON.parse(localStorage.getItem('popT'))||[];}catch(ex){return[];}}
function saveT(a){try{var json=JSON.stringify(a);if(json.length>4*1024*1024){toast('テンプレートデータが大きすぎます（4MB超）。不要なテンプレートを削除してください');return false;}localStorage.setItem('popT',json);return true;}catch(ex){if(ex.name==='QuotaExceededError'){toast('ブラウザのストレージ容量を超えました。不要なテンプレートを削除してください');}else{toast('保存失敗: '+ex.message);}return false;}}

function saveTmpl(){
  var author=(document.getElementById('tmpl-author')||{value:''}).value.trim();
  var name=(document.getElementById('tmpl-inp')||{value:''}).value.trim();
  var ai=document.getElementById('tmpl-author');
  if(!author){if(ai)ai.classList.add('err');setTimeout(function(){if(ai)ai.classList.remove('err');},1200);toast('作成者名を入力してください');return;}
  var cfg=gst();
  var id='t_'+Date.now();
  var arr=loadT();
  arr.push({id:id,name:name||'テンプレート',author:author,
    date:new Date().toLocaleDateString('ja-JP'),
    ca:cfg.ca,cb:cfg.cb,st:cfg.st,
    bgData: cfg.st==='custom' ? customBgData : null,
    els:JSON.parse(JSON.stringify(ELS))});
  saveT(arr);renderTmplList();
  if(document.getElementById('tmpl-inp'))document.getElementById('tmpl-inp').value='';
  _isEdited=false;
  toast('保存しました');
}
function loadTmpl(id){
  var arr=loadT(),tmpl=arr.find(function(t){return t.id===id;});if(!tmpl)return;
  ELS=JSON.parse(JSON.stringify(tmpl.els));
  var ca=document.getElementById('caccent'),cb=document.getElementById('cbg'),ds=document.getElementById('dstyle');
  if(ca)ca.value=tmpl.ca;if(cb)cb.value=tmpl.cb;if(ds)ds.value=tmpl.st;
  // カスタム背景画像を復元
  if(tmpl.st==='custom' && tmpl.bgData){
    var img=new Image();
    img.onload=function(){
      customBgImg=img; customBgData=tmpl.bgData;
      var thumb=document.getElementById('bg-img-thumb');
      var preview=document.getElementById('bg-img-preview');
      var hint=document.getElementById('bg-text-hint');
      var ubtn=document.getElementById('bg-upload-btn');
      if(thumb)thumb.src=tmpl.bgData;
      if(preview)preview.style.display='block';
      if(hint)hint.style.display='block';
      if(ubtn)ubtn.textContent='📁 別の画像に変更';
      redrawAll();
    };
    img.src=tmpl.bgData;
  } else {
    // カスタム背景をクリア
    customBgImg=null;customBgData=null;
    var preview=document.getElementById('bg-img-preview');
    var hint=document.getElementById('bg-text-hint');
    var ubtn=document.getElementById('bg-upload-btn');
    if(preview)preview.style.display='none';
    if(hint)hint.style.display='none';
    if(ubtn)ubtn.textContent='📁 画像ファイルを選択';
  }
  selTmplId=tmpl.id;_isEdited=false;selEl=null;buildElList();redrawEd();rebuildInpFields();renderTmplList();toast(tmpl.name+'を適用しました');
}
function delTmpl(id){saveT(loadT().filter(function(t){return t.id!==id;}));renderTmplList();}
function renderTmplList(){
  var wrap=document.getElementById('tmpl-list');if(!wrap)return;
  wrap.innerHTML='';
  var arr=loadT();

  // 編集中エントリ（先頭に表示）
  if(_isEdited){
    var editDiv=document.createElement('div');
    editDiv.className='tmpl-item editing act';
    editDiv.innerHTML='<div class="tmpl-item-dot"></div>'+
      '<div class="tmpl-item-info">'+
        '<div class="tmpl-item-nm">編集中</div>'+
        '<div class="tmpl-item-meta">未保存の変更があります</div>'+
      '</div>';
    wrap.appendChild(editDiv);
  }

  if(!arr.length){
    var empty=document.createElement('div');
    empty.style.cssText='font-size:12px;color:var(--ink3);padding:8px 13px;';
    empty.textContent='保存済みテンプレートがありません';
    wrap.appendChild(empty);return;
  }

  arr.forEach(function(t){
    var item=document.createElement('div');
    item.className='tmpl-item'+(selTmplId===t.id?' act':'');
    item.dataset.id=t.id;
    var dot=document.createElement('div');dot.className='tmpl-item-dot';item.appendChild(dot);
    var info=document.createElement('div');info.className='tmpl-item-info';
    var nm=document.createElement('div');nm.className='tmpl-item-nm';nm.textContent=t.name;info.appendChild(nm);
    var meta=document.createElement('div');meta.className='tmpl-item-meta';meta.textContent=t.author+' · '+t.date;info.appendChild(meta);
    item.appendChild(info);
    var delBtn=document.createElement('button');delBtn.className='tmpl-item-del';delBtn.textContent='🗑';delBtn.title='削除';
    delBtn.addEventListener('click',function(e){
      e.stopPropagation();
      if(confirm(t.name+'を削除しますか？')){delTmpl(t.id);}
    });
    item.appendChild(delBtn);
    item.addEventListener('click',function(){
      selTmplId=t.id;_isEdited=false;
      loadTmpl(t.id);
    });
    wrap.appendChild(item);
  });
}

// ━━ INIT PRESET TEMPLATES ━━
function initPresetTemplates(){

function parseCSV(text){
    // BOM除去
    if(text.charCodeAt(0)===0xFEFF) text=text.slice(1);
    var rows=[], row=[], cur='', inQ=false;
    for(var i=0;i<text.length;i++){
      var c=text[i],n=text[i+1];
      if(inQ){
        if(c==='"'&&n==='"'){cur+='"';i++;}
        else if(c==='"'){inQ=false;}
        else cur+=c;
      } else {
        if(c==='"'){inQ=true;}
        else if(c===','||c==='\t'){row.push(cur);cur='';}
        else if(c==='\r'&&n==='\n'){rows.push(row);row=[];cur='';i++;}
        else if(c==='\r'||c==='\n'){rows.push(row);row=[];cur='';}
        else cur+=c;
      }
    }
    row.push(cur);rows.push(row);
    return rows.filter(function(r){return r.some(function(c){return c!=='';});});
  }

  // ── XLSXパーサー（ZIP+XML） ──
  // pako不要：DecompressionStream（Chrome93+/Edge93+対応）を使用
  function u8toStr(u8){
    var d=new TextDecoder('utf-8');return d.decode(u8);
  }

  // ZIP local file header parser
  function parseZip(ab){
    var dv=new DataView(ab), u8=new Uint8Array(ab), files={};
    var i=0, len=u8.length;
    while(i<len-4){
      if(dv.getUint32(i,true)!==0x04034b50){i++;continue;}
      var fnLen=dv.getUint16(i+26,true);
      var exLen=dv.getUint16(i+28,true);
      var compSz=dv.getUint32(i+18,true);
      var uncompSz=dv.getUint32(i+22,true);
      var method=dv.getUint16(i+8,true);
      var fn=u8toStr(u8.slice(i+30,i+30+fnLen));
      var dataStart=i+30+fnLen+exLen;
      var compData=u8.slice(dataStart,dataStart+compSz);
      files[fn]={method:method,comp:compData,size:uncompSz};
      i=dataStart+compSz;
    }
    return files;
  }

  // DEFLATE解凍（DecompressionStream使用・同期エミュレーション用にXMLSyncは別途）
  function decompressAsync(data, cb){
    try{
      var ds=new DecompressionStream('deflate-raw');
      var writer=ds.writable.getWriter();
      var reader=ds.readable.getReader();
      var chunks=[];
      function pump(){
        reader.read().then(function(r){
          if(r.done){
            var total=chunks.reduce(function(a,c){return a+c.length;},0);
            var out=new Uint8Array(total),off=0;
            chunks.forEach(function(c){out.set(c,off);off+=c.length;});
            cb(null,out);
          } else {chunks.push(r.value);pump();}
        }).catch(function(e){cb(e,null);});
      }
      pump();
      writer.write(data);
      writer.close();
    } catch(e){cb(e,null);}
  }

  // XLSX内のsharedStrings.xmlとsheet1.xmlを解析
  function parseSheetXml(xml){
    var rows=[];
    // 行を取得
    var rPattern=/<row[^>]*>([\s\S]*?)<\/row>/g;
    var cPattern=/<c\s([^>]*)>([\s\S]*?)<\/c>/g;
    var vPattern=/<v>([\s\S]*?)<\/v>/;
    var rMatch;
    while((rMatch=rPattern.exec(xml))!==null){
      var rowXml=rMatch[1], row=[], cMatch;
      cPattern.lastIndex=0;
      var cells={};
      while((cMatch=cPattern.exec(rowXml))!==null){
        var attrs=cMatch[1], cellXml=cMatch[2];
        var refM=attrs.match(/r="([A-Z]+)(\d+)"/);
        var typeM=attrs.match(/t="([^"]+)"/);
        var vM=vPattern.exec(cellXml);
        var colStr=refM?refM[1]:'A';
        var colIdx=0;
        for(var ci=0;ci<colStr.length;ci++) colIdx=colIdx*26+(colStr.charCodeAt(ci)-64);
        colIdx--;
        cells[colIdx]={type:typeM?typeM[1]:'',val:vM?vM[1]:''};
      }
      if(Object.keys(cells).length){
        var maxCol=Math.max.apply(null,Object.keys(cells).map(Number));
        for(var ci=0;ci<=maxCol;ci++) row.push(cells[ci]||{type:'',val:''});
        rows.push(row);
      }
    }
    return rows;
  }

  function parseSST(xml){
    var sst=[];
    var siPattern=/<si>([\s\S]*?)<\/si>/g;
    var tPattern=/<t[^>]*>([\s\S]*?)<\/t>/g;
    var m;
    while((m=siPattern.exec(xml))!==null){
      var siXml=m[1], text='', tm;
      tPattern.lastIndex=0;
      while((tm=tPattern.exec(siXml))!==null) text+=tm[1];
      sst.push(text.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#(\d+);/g,function(x,n){return String.fromCharCode(+n);}));
    }
    return sst;
  }

  function xlsxToRows(sst, sheetRows){
    return sheetRows.map(function(row){
      return row.map(function(cell){
        if(cell.type==='s') return sst[parseInt(cell.val)]||'';
        if(cell.type==='b') return cell.val==='1'?'TRUE':'FALSE';
        return cell.val;
      });
    });
  }

  // 公開API
  function readAsync(arrayBuffer, cb){
    var u8=new Uint8Array(arrayBuffer);
    // CSV判定（先頭がBOMまたはASCII印字可能文字）
    var isProbablyText=(u8[0]===0xEF&&u8[1]===0xBB&&u8[2]===0xBF)||
      (u8[0]===0xFE&&u8[1]===0xFF)||
      (u8[0]<128&&u8[0]>7);
    if(isProbablyText){
      var text=new TextDecoder('utf-8').decode(u8);
      cb(null,parseCSV(text));return;
    }
    // ZIPシグネチャ確認（xlsx）
    if(u8[0]===0x50&&u8[1]===0x4B){
      try{
        var files=parseZip(arrayBuffer);
        var sstFile=files['xl/sharedStrings.xml'];
        var sheetFile=files['xl/worksheets/sheet1.xml'];
        if(!sheetFile){cb(new Error('sheet1.xmlが見つかりません'),null);return;}

        function getFileContent(fileEntry, done){
          if(!fileEntry){done('');return;}
          if(fileEntry.method===0){done(u8toStr(fileEntry.comp));return;}
          // method=8: deflate
          decompressAsync(fileEntry.comp,function(err,data){
            if(err){done('');}else{done(u8toStr(data));}
          });
        }

        getFileContent(sstFile,function(sstXml){
          var sst=sstXml?parseSST(sstXml):[];
          getFileContent(sheetFile,function(sheetXml){
            var sheetRows=parseSheetXml(sheetXml);
            cb(null,xlsxToRows(sst,sheetRows));
          });
        });
      }catch(e){cb(e,null);}
      return;
    }
    cb(new Error('未対応のファイル形式です(.csv/.xlsxのみ対応)'),null);
  }
function onXlFile(event){
  var file=event.target.files[0];
  if(!file)return;
  event.target.value=''; // reset so same file can be re-selected
  document.getElementById('xl-filename').textContent=file.name;
  document.getElementById('xl-col-sel').style.display='none';
  document.getElementById('xl-preview').style.display='none';
  document.getElementById('xl-import-btn').disabled=true;
  document.getElementById('xl-msg').textContent='読み込み中...';
  document.getElementById('xl-modal').classList.add('open');

  var reader=new FileReader();
  reader.onload=function(e){
    readAsync(e.target.result, function(err, data){
      if(err||!data){document.getElementById('xl-msg').textContent='読み込みエラー: '+(err?err.message:'データなし');return;}
      if(data.length<2){document.getElementById('xl-msg').textContent='データが見つかりませんでした';return;}
      xlHeaders=data[0].map(function(h,i){return String(h||'列'+(i+1));});
      xlRows=data.slice(1).filter(function(r){return r.some(function(c){return String(c||'')!=='';});});
      // 列セレクタを作成
      var nameCol=document.getElementById('xl-name-col');
      var priceCol=document.getElementById('xl-price-col');
      nameCol.innerHTML=''; priceCol.innerHTML='';
      xlHeaders.forEach(function(h,i){
        var o1=document.createElement('option');o1.value=i;o1.textContent=h;nameCol.appendChild(o1);
        var o2=document.createElement('option');o2.value=i;o2.textContent=h;priceCol.appendChild(o2);
      });
      // 列自動推測
      var nameGuess=0, priceGuess=1;
      xlHeaders.forEach(function(h,i){
        var lh=String(h).toLowerCase();
        if(/名|plant|name/.test(lh))nameGuess=i;
        if(/価格|price|値段|円|tax|税/.test(lh))priceGuess=i;
      });
      nameCol.value=nameGuess; priceCol.value=priceGuess;
      document.getElementById('xl-col-sel').style.display='flex';
      document.getElementById('xl-import-btn').disabled=false;
      document.getElementById('xl-msg').textContent=xlRows.length+'行のデータが見つかりました';
      updateXlPreview();
    });
  };
  reader.onerror = function(){ document.getElementById('xl-msg').textContent = 'ファイルの読み込みに失敗しました。'; };
  reader.readAsArrayBuffer(file);
}

function generatePDF(){
  if(!items.length){toast('植物を追加してください');return;}
  toast('プレビューを生成中...');

  var p=curPreset(),cfg=gst();
  var perPage=p.c*p.r,totalPages=Math.ceil(items.length/perPage);
  var MM=3.7795,scale=2;
  var A4W=Math.round(297*MM),A4H=Math.round(210*MM);
  var mg=Math.round(7*MM),gap=Math.round(4*MM);
  var popW=Math.round(p.cw*MM),popH=Math.round(p.ch*MM);

  var _printDataUrls=[];
  for(var pg=0;pg<totalPages;pg++){
    var cvs=document.createElement('canvas');
    cvs.width=A4W*scale;cvs.height=A4H*scale;
    var ctx=cvs.getContext('2d');
    var bgRgb=h2rgb(cfg.cb);
    ctx.fillStyle='rgb('+bgRgb.r+','+bgRgb.g+','+bgRgb.b+')';
    ctx.fillRect(0,0,cvs.width,cvs.height);
    for(var i=0;i<perPage;i++){
      var item=items[pg*perPage+i]||null;
      var col=i%p.c,row=Math.floor(i/p.c);
      drawPop(ctx,(mg+col*(popW+gap))*scale,(mg+row*(popH+gap))*scale,popW*scale,popH*scale,item,cfg);
    }
    ctx.strokeStyle='rgba(150,145,140,.7)';ctx.lineWidth=scale;ctx.setLineDash([5*scale,4*scale]);
    for(var ci=1;ci<p.c;ci++){var lx=(mg+ci*(popW+gap)-gap/2)*scale;ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,cvs.height);ctx.stroke();}
    for(var ri=1;ri<p.r;ri++){var ly=(mg+ri*(popH+gap)-gap/2)*scale;ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(cvs.width,ly);ctx.stroke();}
    ctx.setLineDash([]);
    _printDataUrls.push(cvs.toDataURL('image/png'));
  }

  var pagesDiv=document.getElementById('print-pages');
  pagesDiv.innerHTML='';
  _printDataUrls.forEach(function(url){
    var img=document.createElement('img');
    img.src=url;
    img.style.cssText='width:100%;max-width:100%;display:block;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.3);';
    pagesDiv.appendChild(img);
  });

  document.getElementById('print-title').textContent='\uD83C\uDF3F 値段ポップ \u2014 '+items.length+'件 / '+totalPages+'ページ';

  document.getElementById('print-style').textContent=[
    '@page{size:A4 landscape;margin:0;}',
    '@media print{',
    '  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}',
    '  html,body{width:297mm;height:210mm;margin:0!important;padding:0!important;background:none!important;overflow:hidden;}',
    '  #print-toolbar,nav,header,#toast,#xl-modal,.modal-overlay,main{display:none!important;}',
    '  #print-overlay{position:fixed!important;inset:0!important;background:none!important;display:block!important;overflow:hidden!important;}',
    '  #print-pages{display:block!important;overflow:visible!important;padding:0!important;gap:0!important;width:297mm!important;}',
    '  #print-pages img{display:block!important;width:297mm!important;height:210mm!important;box-shadow:none!important;margin:0!important;padding:0!important;page-break-after:always;page-break-inside:avoid;}',
    '  #print-pages img:last-child{page-break-after:auto;}',
    '}'
  ].join('\n');

  document.getElementById('print-overlay').style.display='flex';
  setTimeout(function(){toast('🖨 印刷ボタンで印刷 / PDFで保存できます');},400);
}

function onXlToyoakeFile(event){
  var file=event.target.files[0];if(!file)return;
  event.target.value='';
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var text=new TextDecoder('shift-jis').decode(e.target.result);
      var rows=parseCSV(text);
      if(!rows||rows.length<2){toast('データがありません');return;}
      var hdr=rows[0].map(function(h){return String(h).trim();});
      var nameIdx=hdr.indexOf('品名');
      var priceIdx=hdr.indexOf('ケース単価');
      if(nameIdx<0) nameIdx=9;
      if(priceIdx<0) priceIdx=18;

      // 1) POP用アイテム追加
      var added=0;
      for(var i=1;i<rows.length;i++){
        var row=rows[i];
        var name=row[nameIdx]?String(row[nameIdx]).trim():'';
        var price=parseInt(String(row[priceIdx]||'').replace(/[^\d]/g,''))||0;
        if(name&&price){items.push({id:Date.now()+Math.random(),name:name,price:price,extras:{}});added++;}
      }
      renderList();updateBadge();redrawPrev();

      // 2) Square変換用に生CSVデータを保持（sqParseCSV互換形式）
      var sqRows=[];
      for(var i=1;i<rows.length;i++){
        var vals=rows[i];
        if(vals.length<5)continue;
        var obj={};
        hdr.forEach(function(h,idx){obj[h]=(vals[idx]||'').toString().trim();});
        sqRows.push(obj);
      }
      toyoakeParsedCSV={headers:hdr,rows:sqRows};

      // 3) 結果表示
      var resultEl=document.getElementById('toyoake-result');
      if(resultEl)resultEl.style.display='block';
      var countEl=document.getElementById('toyoake-count');
      if(countEl)countEl.textContent=added;
      var dateEl=document.getElementById('toyoake-date');
      if(dateEl&&sqRows.length>0){
        var d=sqRows[0]['売立日']||'';
        dateEl.textContent=d.length===8?d.slice(0,4)+'/'+d.slice(4,6)+'/'+d.slice(6,8):d;
      }
      var statusEl=document.getElementById('toyoake-sq-status');
      if(statusEl)statusEl.textContent='Square Excel準備完了（'+sqRows.length+'件）';

      toast('豊明花き: '+added+'件を追加 + Square Excel準備完了');
    }catch(err){toast('読み込み失敗: '+err.message);}
  };
  reader.onerror=function(){toast('ファイル読み込みに失敗しました');};
  reader.readAsArrayBuffer(file);
}

function downloadSquareExcel(){
  if(!toyoakeParsedCSV||!toyoakeParsedCSV.rows.length){
    toast('先に豊明CSVを読み込んでください');return;
  }
  if(typeof XLSX==='undefined'){toast('XLSXライブラリが読み込まれていません');return;}
  var store=(document.getElementById('sq-storeName')||{value:'北山ナーセリー'}).value.trim()||'北山ナーセリー';
  var tax=(document.getElementById('sq-taxValue')||{value:'Y'}).value;
  var pmode=(document.getElementById('sq-priceMode')||{value:'case'}).value;
  var ptype=(document.getElementById('sq-productType')||{value:'有形商品'}).value;
  try{
    var wb=window.sqBuildXLSX(toyoakeParsedCSV.rows,store,tax,pmode,ptype);
    var date=(toyoakeParsedCSV.rows[0]?(toyoakeParsedCSV.rows[0]['売立日']||''):'').slice(0,8)||new Date().toISOString().slice(0,10).replace(/-/g,'');
    var fn='square_import_'+date+'.xlsx';
    XLSX.writeFile(wb,fn);
    var statusEl=document.getElementById('toyoake-sq-status');
    if(statusEl){statusEl.textContent=fn+' をダウンロードしました';statusEl.style.color='var(--accent)';}
    toast(fn+' をダウンロードしました');
  }catch(e){toast('Excel生成失敗: '+e.message);}
}

<!-- ════ Square変換ツール JavaScript ════ -->
<script>
(function(){
  'use strict';

  // ─── CSV (Shift-JIS) ─────────────────────────────────────
  function sqReadCSVShiftJIS(file) {
    return new Promise(function(res, rej) {
      var r = new FileReader();
      r.onload = function(e) {
        try { res(sqParseCSV(new TextDecoder('shift-jis').decode(e.target.result))); }
        catch(err){ rej(err); }
      };
      r.onerror = function(){ rej(new Error('ファイルを読み込めませんでした。ファイルが破損していないか確認してください。')); };
      r.readAsArrayBuffer(file);
    });
  }

  function sqParseCSV(text) {
    var lines = text.split(/\r?\n/).filter(function(l){ return l.trim(); });
    if (lines.length < 2) throw new Error('CSVファイルにデータ行が含まれていません。正しいファイルを選択してください。');
    var headers = sqParseCSVLine(lines[0]).map(function(h){ return h.trim(); });
    var rows = [];
    for (var i = 1; i < lines.length; i++) {
      var vals = sqParseCSVLine(lines[i]);
      if (vals.length < 5) continue;
      var obj = {};
      headers.forEach(function(h, idx){ obj[h] = (vals[idx] || '').trim(); });
      rows.push(obj);
    }
    return { headers: headers, rows: rows };
  }

  function sqParseCSVLine(line) {
    var res = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) { res.push(cur); cur = ''; }
      else cur += c;
    }
    res.push(cur);
    return res;
  }

  // ─── 数値パース ───────────────────────────────────────────
  function sqPn(v) { var n = parseInt((v||'').replace(/,/g,'').trim(), 10); return isNaN(n) ? 0 : n; }

  // ─── バリデーション ───────────────────────────────────────
  function sqValidate(rows) {
    var skuMap = {};
    rows.forEach(function(r){
      var k = r['売立日'] + '-' + r['荷受番号'];
      skuMap[k] = (skuMap[k] || 0) + 1;
    });
    var dupes   = Object.values(skuMap).filter(function(v){ return v > 1; }).length;
    var noName  = rows.filter(function(r){ return !r['品名'] || !r['品名'].trim(); }).length;
    var noPrice = rows.filter(function(r){ return sqPn(r['ケース単価']) === 0; }).length;
    var noJF    = rows.filter(function(r){ return (r['JFコード']||'').trim() === '00000'; }).length;
    return { dupes: dupes, noName: noName, noPrice: noPrice, noJF: noJF };
  }

  // ─── Square列ヘッダー ─────────────────────────────────────
  function sqHeaders(store) {
    return ['参照ハンドル','トークン','商品名','お客さま向けの名称','フリガナ','バリエーション名','商品番号（SKU）','説明','カテゴリ','レポートカテゴリ','SEOタイトル','SEOの説明','パーマリンク','GTIN','Square オンラインビジネスの商品の表示/非表示','商品タイプ','重量(キログラム)','ソーシャルメディアのリンクのタイトル','ソーシャルメディアのリンクの説明','配送有効化済み','セルフオーダー有効化済み','デリバリー有効化済み','受け取り有効化済み','価格','オンラインセール価格','アーカイブ済み','販売可能','アルコールを含む','在庫保有可能','POSレジで詳細画面をスキップする','オプション名1','オプション値1','オプション名2','オプション値2','既定の単位原価','既定の取引先名','既定の取引先コード','現在の数量 '+store,'新規の数量 '+store,'在庫アラート有効（'+store+'）','在庫アラート基準値（'+store+'）','税金 - 消費税内税10％ (10%)'];
  }

  // ─── 変換 ────────────────────────────────────────────────
  function sqConvertRows(rows, store, tax, priceMode, ptype) {
    var skuCount = {};
    return rows.map(function(r){
      var t = function(v){ return (v||'').trim(); };
      var refHandle = t(r['品名コード']) || t(r['JFコード']);
      var hinmei    = t(r['品名']);
      var baseKey   = t(r['売立日']) + '-' + t(r['荷受番号']);
      skuCount[baseKey] = (skuCount[baseKey] || 0) + 1;
      var sku = skuCount[baseKey] === 1 ? baseKey : baseKey + '-' + skuCount[baseKey];
      var cat  = [t(r['中分類名称']), t(r['小分類名称'])].filter(Boolean).join(' > ');
      var daib = t(r['大分類名称']);
      var shit = t(r['仕立略称']); var hachi = t(r['鉢サイズ']);
      var vari = [shit, hachi].filter(Boolean).join(' ') || '標準';
      var casePr = sqPn(r['ケース単価']); var nyu = sqPn(r['入数']) || 1;
      var price  = priceMode === 'per_unit' ? Math.round(casePr / nyu) : casePr;
      var kostRaw = sqPn(r['鉢単価']); var cost = kostRaw > 0 ? Math.round(kostRaw / 100) : '';
      var kuchi = sqPn(r['口数']) || 1; var stockQty = nyu * kuchi;
      var aname = t(r['荷主名称']); var acode = t(r['荷主コード']);
      var desc = [t(r['記事１']), t(r['記事２'])].filter(Boolean).join('　');
      return [refHandle,'',hinmei,hinmei,'',vari,sku,desc,cat,daib,'','','','','',ptype,'','','','','','','',price,'','N','Y','N','Y','N',shit?'仕立':'',shit,hachi?'サイズ':'',hachi,cost,aname,acode,'',stockQty,'','',tax];
    });
  }

  // ─── XLSX生成 ─────────────────────────────────────────────
  function sqBuildXLSX(rows, store, tax, priceMode, ptype) {
    var heads = sqHeaders(store);
    var data  = sqConvertRows(rows, store, tax, priceMode, ptype);
    var all   = [['指示・説明'],['各行に商品名が含まれていること、カテゴリ・説明が一致していること。'],[],heads].concat(data);
    var ws = XLSX.utils.aoa_to_sheet(all);
    ws['!cols'] = heads.map(function(_,i){ return { wch: i < 9 ? 22 : 16 }; });
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '商品');
    return wb;
  }

  // ─── マッピング定義 ───────────────────────────────────────
  var SQ_MAPPING = [
    {src:'品名コード（9列目・正規6桁）', dst:'参照ハンドル', note:'★修正'},
    {src:'売立日 + 荷受番号',           dst:'商品番号（SKU）', note:'★修正'},
    {src:'品名',                        dst:'商品名 / お客さま向けの名称', note:''},
    {src:'中分類名称 > 小分類名称',     dst:'カテゴリ', note:''},
    {src:'大分類名称',                  dst:'レポートカテゴリ', note:''},
    {src:'仕立略称 + 鉢サイズ',         dst:'バリエーション名', note:''},
    {src:'ケース単価（設定で変更可）',  dst:'価格', note:''},
    {src:'鉢単価 ÷ 100',               dst:'既定の単位原価', note:'★修正'},
    {src:'口数 × 入数',                dst:'新規の数量（在庫数）', note:'★修正'},
    {src:'荷主名称 / 荷主コード',       dst:'既定の取引先名 / コード', note:''},
    {src:'記事１ + 記事２',             dst:'説明', note:''},
  ];

  // ─── UI状態 ──────────────────────────────────────────────
  var sqParsedData = null;

  function sqShowStatus(type, icon, text) {
    var el = document.getElementById('sq-statusMsg');
    el.className = type;
    document.getElementById('sq-statusIcon').textContent = icon;
    document.getElementById('sq-statusText').textContent = text;
    el.style.display = 'flex';
  }

  function sqRenderPreview(data) {
    var rows  = data.rows;
    var v     = sqValidate(rows);
    var store = document.getElementById('sq-storeName').value || '北山ナーセリー';
    var pmode = document.getElementById('sq-priceMode').value;

    document.getElementById('sq-metaRows').textContent = rows.length + '件';
    var d = rows[0] ? (rows[0]['売立日'] || '') : '';
    if (d.length === 8) document.getElementById('sq-metaDate').textContent = d.slice(0,4)+'/'+d.slice(4,6)+'/'+d.slice(6,8);
    document.getElementById('sq-metaTotal').textContent = '¥' + rows.reduce(function(s,r){ return s + sqPn(r['金額']); }, 0).toLocaleString();
    var dupEl = document.getElementById('sq-metaDupes');
    dupEl.textContent = v.dupes === 0 ? '重複なし' : v.dupes + '件（自動補正）';
    dupEl.className = 'sq-meta-value' + (v.dupes > 0 ? ' sq-meta-warn' : '');

    var vbox = document.getElementById('sq-validationBox');
    vbox.innerHTML = '';
    if (v.noName > 0) {
      var d1 = document.createElement('div'); d1.className = 'sq-vbox sq-vwarn';
      d1.textContent = '⚠️ 品名が空の行が ' + v.noName + ' 件あります。確認してください。';
      vbox.appendChild(d1);
    }
    if (v.noPrice > 0) {
      var d2 = document.createElement('div'); d2.className = 'sq-vbox sq-vwarn';
      d2.textContent = '⚠️ ケース単価が0円の行が ' + v.noPrice + ' 件あります。変換前に確認してください。';
      vbox.appendChild(d2);
    }
    if (v.noJF > 0) {
      var d3 = document.createElement('div'); d3.className = 'sq-vbox sq-vwarn';
      d3.textContent = '⚠️ JFコード未設定の行が ' + v.noJF + ' 件あります。品名コードで代替済みです。';
      vbox.appendChild(d3);
    }
    var infos = [];
    if (v.dupes > 0) infos.push('荷受番号の重複 ' + v.dupes + ' 件を検出 → SKUに連番サフィックスを自動付与しました');
    if (infos.length > 0) {
      var d4 = document.createElement('div'); d4.className = 'sq-vbox sq-ok';
      d4.textContent = 'ℹ️ 自動対応済み・参考情報：' + infos.join('、');
      vbox.appendChild(d4);
    }
    if (!vbox.hasChildNodes()) {
      var d5 = document.createElement('div'); d5.className = 'sq-vbox sq-ok';
      d5.textContent = '✅ データに問題は検出されませんでした。変換可能です。';
      vbox.appendChild(d5);
    }

    // プレビューテーブル
    var cols = ['商品名','参照ハンドル','SKU','カテゴリ','バリエーション','価格','原価(÷100)','在庫数'];
    var thead = document.getElementById('sq-previewHead');
    thead.innerHTML = '';
    var htr = document.createElement('tr');
    cols.forEach(function(c){ var th = document.createElement('th'); th.textContent = c; htr.appendChild(th); });
    thead.appendChild(htr);
    var skuCount = {};
    var tbodyEl = document.getElementById('sq-previewBody');
    tbodyEl.innerHTML = '';
    rows.slice(0,5).forEach(function(r){
      var casePr = sqPn(r['ケース単価']); var nyu = sqPn(r['入数'])||1; var kuchi = sqPn(r['口数'])||1;
      var price  = pmode === 'per_unit' ? Math.round(casePr/nyu) : casePr;
      var cost   = sqPn(r['鉢単価']) > 0 ? Math.round(sqPn(r['鉢単価'])/100) : '—';
      var bk     = (r['売立日']||'') + '-' + (r['荷受番号']||'').trim();
      skuCount[bk] = (skuCount[bk]||0)+1;
      var sku    = skuCount[bk]===1 ? bk : bk+'-'+skuCount[bk];
      var cat    = [(r['中分類名称']||'').trim(),(r['小分類名称']||'').trim()].filter(Boolean).join('>');
      var vari   = [(r['仕立略称']||'').trim(),(r['鉢サイズ']||'').trim()].filter(Boolean).join(' ')||'標準';
      var ref    = (r['品名コード']||'').trim() || (r['JFコード']||'').trim();
      var cells  = [(r['品名']||'').trim().slice(0,18), ref, sku, cat.slice(0,20), vari, '¥'+price.toLocaleString(), typeof cost==='number'?'¥'+cost.toLocaleString():cost, (nyu*kuchi)+'本'];
      var tr = document.createElement('tr');
      cells.forEach(function(v,i){
        var td = document.createElement('td');
        td.className = i===2 ? 'sq-sku-col' : (i===5||i===6 ? 'sq-price-col' : '');
        td.title = v; td.textContent = v;
        tr.appendChild(td);
      });
      tbodyEl.appendChild(tr);
    });
    if (rows.length > 5) {
      var tr2=document.createElement('tr');var td2=document.createElement('td');
      td2.colSpan=cols.length;td2.style.cssText='text-align:center;color:#8a9e97;padding:0.6rem;font-size:0.74rem';
      td2.textContent='… 他 '+(rows.length-5)+' 件';tr2.appendChild(td2);tbodyEl.appendChild(tr2);
    }

    // マッピング
    var mg = document.getElementById('sq-mappingGrid');
    mg.innerHTML = '';
    SQ_MAPPING.forEach(function(m){
      var row = document.createElement('div'); row.className = 'sq-mapping-row';
      var src = document.createElement('span'); src.className = 'sq-mapping-src'; src.textContent = m.src;
      var arrow = document.createElement('span'); arrow.className = 'sq-mapping-arrow'; arrow.textContent = '▶';
      var dst = document.createElement('span'); dst.className = 'sq-mapping-dst'; dst.textContent = m.dst;
      if (m.note) {
        var note = document.createElement('span'); note.className = 'sq-mapping-note'; note.textContent = m.note;
        dst.appendChild(document.createTextNode(' ')); dst.appendChild(note);
      }
      row.appendChild(src); row.appendChild(arrow); row.appendChild(dst);
      mg.appendChild(row);
    });

    document.getElementById('sq-previewSection').style.display = 'block';
    document.getElementById('sq-mappingSection').style.display = 'block';
    document.getElementById('sq-convertBtn').disabled = v.noName > 0;
  }

  function sqHandleFile(file) {
    if (!file) return;
    document.getElementById('sq-statusMsg').style.display = 'none';
    document.getElementById('sq-convertBtn').disabled = true;
    document.getElementById('sq-previewSection').style.display = 'none';
    document.getElementById('sq-mappingSection').style.display = 'none';
    var dz = document.getElementById('sq-dropZone');
    dz.classList.add('sq-has-file');
    document.getElementById('sq-fileNameText').textContent = file.name;
    sqReadCSVShiftJIS(file).then(function(data){
      if (!data.rows.length) throw new Error('データ行が見つかりませんでした');
      sqParsedData = data;
      sqRenderPreview(sqParsedData);
      sqShowStatus('sq-success', '✓', data.rows.length + '件のデータを読み込みました。バリデーション結果を確認の上、ダウンロードしてください。');
    }).catch(function(e){
      sqParsedData = null; dz.classList.remove('sq-has-file');
      sqShowStatus('sq-error', '⚠', '読み込みエラー：' + e.message);
    });
  }

  // ─── イベント登録（DOMContentLoaded後） ──────────────────
  window.addEventListener('DOMContentLoaded', function(){
    var fileInput = document.getElementById('sq-fileInput');
    var dz = document.getElementById('sq-dropZone');
    var convertBtn = document.getElementById('sq-convertBtn');
    var priceModeEl = document.getElementById('sq-priceMode');

    if (fileInput) fileInput.addEventListener('change', function(e){ if(e.target.files[0]) sqHandleFile(e.target.files[0]); });
    if (dz) {
      dz.addEventListener('dragover', function(e){ e.preventDefault(); dz.classList.add('sq-drag-over'); });
      dz.addEventListener('dragleave', function(){ dz.classList.remove('sq-drag-over'); });
      dz.addEventListener('drop', function(e){ e.preventDefault(); dz.classList.remove('sq-drag-over'); if(e.dataTransfer.files[0]) sqHandleFile(e.dataTransfer.files[0]); });
    }
    if (priceModeEl) priceModeEl.addEventListener('change', function(){ if(sqParsedData) sqRenderPreview(sqParsedData); });

    if (convertBtn) convertBtn.addEventListener('click', function(){
      if (!sqParsedData) return;
      var v = sqValidate(sqParsedData.rows);
      if (v.noPrice > 0 || v.noJF > 0) {
        var msgs = [];
        if (v.noPrice > 0) msgs.push('ケース単価が0円の行が ' + v.noPrice + ' 件');
        if (v.noJF > 0) msgs.push('JFコード未設定の行が ' + v.noJF + ' 件');
        if (!confirm('以下の警告があります：\n' + msgs.join('\n') + '\n\nこのまま変換を続行しますか？')) return;
      }
      var store = document.getElementById('sq-storeName').value.trim() || '北山ナーセリー';
      var tax   = document.getElementById('sq-taxValue').value;
      var pmode = document.getElementById('sq-priceMode').value;
      var ptype = document.getElementById('sq-productType').value;
      try {
        if (typeof XLSX === 'undefined') { sqShowStatus('sq-error', '⚠', 'XLSXライブラリが読み込まれていません。オンライン環境で使用してください。'); return; }
        var wb = sqBuildXLSX(sqParsedData.rows, store, tax, pmode, ptype);
        var date = (sqParsedData.rows[0] ? (sqParsedData.rows[0]['売立日'] || '') : '').slice(0,8) || new Date().toISOString().slice(0,10).replace(/-/g,'');
        var fn   = 'square_import_' + date + '.xlsx';
        XLSX.writeFile(wb, fn);
        sqShowStatus('sq-success', '🎉', fn + ' をダウンロードしました。Squareの 商品管理 → インポート からファイルを読み込んでください。');
      } catch(e) {
        sqShowStatus('sq-error', '⚠', 'Excelファイルの生成に失敗しました。ブラウザの設定やディスク容量を確認してください。');
      }
    });

    // localStorage設定読み込み
    function sqLoadSettings() {
      var s  = localStorage.getItem('sq_storeName');
      var t  = localStorage.getItem('sq_taxValue');
      var p  = localStorage.getItem('sq_priceMode');
      var pt = localStorage.getItem('sq_productType');
      var storeEl = document.getElementById('sq-storeName');
      var taxEl   = document.getElementById('sq-taxValue');
      var pmEl    = document.getElementById('sq-priceMode');
      var ptEl    = document.getElementById('sq-productType');
      if (s !== null && storeEl) storeEl.value = s;
      if (t !== null && taxEl)   taxEl.value = t;
      if (p !== null && pmEl)    pmEl.value = p;
      if (pt !== null && ptEl)   ptEl.value = pt;
    }
    function sqSaveSettings() {
      try {
        var storeEl = document.getElementById('sq-storeName');
        var taxEl   = document.getElementById('sq-taxValue');
        var pmEl    = document.getElementById('sq-priceMode');
        var ptEl    = document.getElementById('sq-productType');
        if (storeEl) localStorage.setItem('sq_storeName', storeEl.value);
        if (taxEl)   localStorage.setItem('sq_taxValue',  taxEl.value);
        if (pmEl)    localStorage.setItem('sq_priceMode', pmEl.value);
        if (ptEl)    localStorage.setItem('sq_productType', ptEl.value);
      } catch(e) {}
    }
    sqLoadSettings();
    var storeEl = document.getElementById('sq-storeName');
    var taxEl   = document.getElementById('sq-taxValue');
    var pmEl2   = document.getElementById('sq-priceMode');
    var ptEl    = document.getElementById('sq-productType');
    if (storeEl) storeEl.addEventListener('input', sqSaveSettings);
    if (taxEl)   taxEl.addEventListener('change', sqSaveSettings);
    if (pmEl2)   pmEl2.addEventListener('change', sqSaveSettings);
    if (ptEl)    ptEl.addEventListener('change', sqSaveSettings);
  });

  // 入力タブから呼び出せるように公開
  window.sqBuildXLSX = sqBuildXLSX;
  window.sqValidate = sqValidate;
})();
</script>
