<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>PricePop</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
<script>
/* テーマ初期化（フラッシュ防止のため head 内に配置） */
(function(){
  var saved=localStorage.getItem('pp-theme');
  if(saved)document.documentElement.setAttribute('data-theme',saved);
  else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches)
    document.documentElement.setAttribute('data-theme','dark');
})();
</script>
<style>/* ─── Reset & Variables ─────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ─── カラーシステム（ライト） */
:root{
  /* モダンカラーシステム */
  --bg:    #f8f7f4;
  --sf:    #ffffff;
  --sf2:   #f0eee9;
  --accent:#16a34a;
  --accent-h:#15803d;
  --ink:   #1c1917;
  --ink2:  #57534e;
  --ink3:  #a8a29e;
  --border:rgba(0,0,0,.06);
  --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 16px rgba(0,0,0,.06);
  --shadow2:0 2px 8px rgba(0,0,0,.08),0 8px 32px rgba(0,0,0,.10);

  /* 後方互換エイリアス（JS/旧CSSが参照） */
  --ink2-old:#374a34;
  --bg2:   #e9e6df;
  --wh:    #ffffff;
  --gr:    var(--accent);
  --gr2:   var(--accent-h);
  --gr3:   #4a9e68;
  --gt:    rgba(22,163,74,.10);
  --am:    #b55a18;
  --amt:   rgba(181,90,24,.09);
  --rd:    #dc2626;
  --rdt:   rgba(220,38,38,.08);
  --ln:    rgba(0,0,0,.09);
  --ln2:   rgba(0,0,0,.05);
  --sh:    var(--shadow);
  --sh2:   var(--shadow2);
  --r:     16px;
  --r2:    12px;
  --r3:    8px;
  --col:   480px;
  --nav:   60px;
  --safe:  env(safe-area-inset-bottom,0px);

  /* グラスモーフィズム */
  --glass-bg:rgba(255,255,255,.72);
  --glass-dark:rgba(30,34,30,.78);
}

/* ─── ダークモード */
[data-theme="dark"]{
  --bg:    #1a1d1b;
  --sf:    #242824;
  --sf2:   #2d322d;
  --accent:#22c55e;
  --accent-h:#16a34a;
  --ink:   #e8ede9;
  --ink2:  #a8b4a9;
  --ink3:  #6b7a6c;
  --border:rgba(255,255,255,.08);
  --shadow:0 1px 2px rgba(0,0,0,.18),0 4px 16px rgba(0,0,0,.22);
  --shadow2:0 2px 8px rgba(0,0,0,.28),0 8px 32px rgba(0,0,0,.32);
  --bg2:   #2d322d;
  --wh:    #242824;
  --gr:    var(--accent);
  --gr2:   var(--accent-h);
  --gr3:   #4ade80;
  --gt:    rgba(34,197,94,.12);
  --am:    #fb923c;
  --amt:   rgba(251,146,60,.12);
  --rd:    #f87171;
  --rdt:   rgba(248,113,113,.10);
  --ln:    rgba(255,255,255,.10);
  --ln2:   rgba(255,255,255,.06);
  --glass-bg:rgba(30,34,30,.78);
}
html{font-size:clamp(14px,1.5vw,16px);-webkit-text-size-adjust:100%;overflow-x:hidden;}
body{
  font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Meiryo','Yu Gothic',sans-serif;
  background:var(--bg);color:var(--ink);
  min-height:100vh;-webkit-font-smoothing:antialiased;
  overflow-x:hidden;
  padding-bottom:calc(var(--nav) + var(--safe));
  transition:background .25s,color .25s;
}
@media(min-width:680px){body{padding-bottom:0;}}

/* ── Header ── */
.hdr{
  background:var(--glass-bg);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border-bottom:1px solid var(--border);
  height:52px;padding:0 18px;
  display:flex;align-items:center;
  position:sticky;top:0;z-index:200;width:100%;
  transition:background .25s,border-color .25s;
}
.hdr-inner{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;max-width:900px;margin:0 auto;
}
.hdr-logo{display:flex;align-items:center;gap:8px;}
.hdr-icon{
  width:30px;height:30px;border-radius:8px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  color:#fff;flex-shrink:0;
}
.hdr-icon svg{width:16px;height:16px;stroke:#fff;stroke-width:2.2;}
.hdr-title{
  font-weight:800;
  font-size:clamp(15px,2vw,17px);
  color:var(--ink);
  letter-spacing:.04em;
}
.hdr-badge{
  font-size:10px;font-weight:700;
  background:var(--accent);color:#fff;
  padding:2px 7px;border-radius:20px;
  letter-spacing:.04em;
}
.hdr-theme-btn{
  width:38px;height:38px;border:1px solid var(--border);
  border-radius:10px;background:var(--sf2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);
  flex-shrink:0;
  color:var(--ink2);
}
.hdr-theme-btn:hover{background:var(--bg2);border-color:var(--accent);transform:translateY(-1px);}
.hdr-theme-btn:active{transform:scale(.96);}
.hdr-theme-btn svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;}
.theme-icon-dark{display:none;}
[data-theme="dark"] .theme-icon-light{display:none;}
[data-theme="dark"] .theme-icon-dark{display:flex;}
/* 旧 .hdr-dot は非表示に */
.hdr-dot{display:none;}

/* ── Top Nav (PC) ── */
.topnav{
  display:none;
  background:var(--glass-bg);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border-bottom:1px solid var(--border);
  padding:0 18px;gap:4px;width:100%;
  position:sticky;top:52px;z-index:190;
  transition:background .25s;
}
.tnb{
  height:42px;padding:0 16px;border:none;background:none;
  font-family:inherit;
  font-size:clamp(10px,1.2vw,12px);
  font-weight:700;letter-spacing:.06em;
  color:var(--ink3);cursor:pointer;
  border-radius:8px 8px 0 0;
  position:relative;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  text-transform:uppercase;
}
.tnb:hover{color:var(--ink2);background:var(--sf2);}
.tnb.active{color:var(--accent);}
.tnb.active::after{
  content:'';position:absolute;bottom:0;left:20%;right:20%;
  height:2.5px;background:var(--accent);border-radius:2px 2px 0 0;
}
@media(min-width:680px){body{padding-bottom:0;}.bnav{display:none!important;}.topnav{display:flex;}}

/* ── Bottom Nav ── */
.bnav{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav) + var(--safe));
  background:var(--glass-bg);
  backdrop-filter:saturate(200%) blur(20px);
  -webkit-backdrop-filter:saturate(200%) blur(20px);
  border-top:1px solid var(--border);
  display:flex;align-items:flex-start;padding-top:6px;
  z-index:200;width:100%;
  transition:background .25s;
}
.bnb{
  flex:1;min-height:48px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:none;font-family:inherit;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  position:relative;
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.bnb-i{
  width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;
  transition:all .2s cubic-bezier(.34,1.56,.64,1);
  color:var(--ink3);
}
.bnb-i svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.8;}
.bnb.active .bnb-i{
  background:var(--gt);color:var(--accent);
  transform:scale(1.1);
}
.bnb-l{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.04em;text-transform:uppercase;line-height:1;}
.bnb.active .bnb-l{color:var(--accent);}
/* アクティブドット */
.bnb.active::after{
  content:'';
  position:absolute;bottom:2px;
  width:4px;height:4px;background:var(--accent);border-radius:50%;
}

/* ── Main ── */
.main{width:100%;max-width:100%;padding:16px 14px 20px;overflow-x:hidden;}
@media(min-width:680px){.main{padding:20px 24px 28px;}}
.panel{display:none;}
.panel.on{display:block;}
.animate__fadeIn{animation-duration:.3s;}

/* ── スケルトンローディング */
.skeleton{
  background:linear-gradient(90deg,var(--sf2) 25%,var(--bg2) 50%,var(--sf2) 75%);
  background-size:200% 100%;
  animation:skeleton-sweep 1.5s ease-in-out infinite;
  border-radius:8px;
}
@keyframes skeleton-sweep{
  0%{background-position:200% 0;}
  100%{background-position:-200% 0;}
}

/* ════════════════════════════════════
   EFO入力フィールド（JS動的生成用）
   ════════════════════════════════════ */

/* ── 各フィールド行 ── */
.efo-field{
  display:flex;align-items:stretch;
  border-bottom:1px solid var(--border);
  min-height:56px;
  transition:background .2s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.efo-field:last-of-type{border-bottom:none;}
.efo-field:focus-within{background:rgba(22,163,74,.03);}
.efo-field.disabled-row{opacity:.5;}

/* 左端インジケータ */
.efo-field-lead{
  width:40px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-right:1px solid var(--border);
}
.efo-field-lead input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--accent);}
/* 必須インジケータバー */
.efo-field-req{width:4px;height:60%;min-height:28px;background:var(--accent);border-radius:2px;}

/* ラベル列 */
.efo-field-lbl{
  width:84px;flex-shrink:0;
  padding:10px 10px 10px 13px;
  display:flex;flex-direction:column;justify-content:center;gap:4px;
  border-right:1px solid var(--border);
}
.efo-lbl-text{font-size:clamp(11px,1.2vw,12px);font-weight:700;color:var(--ink2);line-height:1.3;}
.efo-req-badge{
  font-size:9px;font-weight:700;color:#fff;
  background:var(--rd);border-radius:4px;
  padding:1px 5px;display:inline-block;
  width:fit-content;letter-spacing:.04em;
}
.efo-opt-badge{
  font-size:9px;font-weight:700;color:var(--ink3);
  background:var(--bg2);border-radius:4px;
  padding:1px 5px;display:inline-block;width:fit-content;
}

/* 入力フィールド列 */
.efo-field-inp{flex:1;min-width:0;display:flex;align-items:center;}
.efo-inp{
  width:100%;height:56px;padding:0 14px;
  border:none;outline:none;
  font-family:inherit;font-size:16px;color:var(--ink);
  background:transparent;-webkit-appearance:none;
  transition:color .2s;
}
.efo-inp::placeholder{color:var(--ink3);font-size:14px;}
.efo-inp:focus{outline:none;}
.efo-field:focus-within .efo-field-req{box-shadow:0 0 0 2px var(--accent);}
.efo-inp:disabled{cursor:not-allowed;}
.efo-price-inp{text-align:right;font-weight:700;color:var(--am);font-size:18px;padding-right:5px;}
.efo-price-unit{font-size:11px;color:var(--ink3);padding-right:12px;flex-shrink:0;font-weight:600;white-space:nowrap;}

/* ── 追加済みリスト（ミニポップグリッド） ── */

/* ミニポップグリッド */
.pop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(115px,1fr));gap:7px;}
.pop-item{position:relative;border-radius:var(--r3);overflow:hidden;}
.pop-item canvas{width:100%;display:block;border-radius:var(--r3);box-shadow:var(--sh);transition:transform .18s;}
.pop-item:hover canvas{transform:translateY(-2px);}
.pop-del{position:absolute;top:5px;right:5px;width:26px;height:26px;background:rgba(15,20,16,.55);border:none;border-radius:50%;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:1;-webkit-tap-highlight-color:transparent;}
@media(min-width:680px){.pop-del{opacity:0;}.pop-item:hover .pop-del{opacity:1;}}
.pop-del:active,.pop-del:hover{background:var(--rd);}
.pop-confirm{position:absolute;inset:0;border-radius:var(--r3);background:rgba(10,14,10,.82);backdrop-filter:blur(6px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;opacity:0;pointer-events:none;transition:opacity .18s;}
.pop-confirm.show{opacity:1;pointer-events:all;}
.pop-confirm-msg{color:#fff;font-size:11px;font-weight:700;text-align:center;line-height:1.5;padding:0 8px;}
.pop-confirm-btns{display:flex;gap:6px;}
.pop-confirm-yes{height:28px;padding:0 12px;border:none;border-radius:7px;background:var(--rd);color:#fff;font-family:inherit;font-size:11px;font-weight:700;cursor:pointer;}
.pop-confirm-no{height:28px;padding:0 10px;border:1.5px solid rgba(255,255,255,.35);border-radius:7px;background:transparent;color:#fff;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;}
.pop-confirm-bar{width:66%;height:3px;background:rgba(255,255,255,.14);border-radius:2px;overflow:hidden;}
.pop-confirm-bar-inner{height:100%;background:var(--rd);border-radius:2px;}

/* ── プロパティパネル（テンプレート編集用・JS生成） ── */

.prop-sec{margin-top:-1px;}
.prop-body{padding:10px 13px 13px;}
.prop-row{margin-bottom:9px;}
.prop-row:last-child{margin-bottom:0;}
.prop-lbl{font-size:9px;font-weight:700;color:var(--ink3);margin-bottom:4px;letter-spacing:.07em;text-transform:uppercase;}
.prop-inp{
  width:100%;height:38px;padding:0 10px;
  border:1.5px solid var(--border);border-radius:var(--r3);
  font-family:inherit;font-size:14px;color:var(--ink);
  background:var(--sf2);outline:none;-webkit-appearance:none;
  transition:border-color .2s;
}
.prop-inp:focus{border-color:var(--accent);outline:2px solid var(--accent);outline-offset:2px;}
.prop-h{display:flex;align-items:center;gap:5px;}
.prop-btn{
  flex:1;height:34px;padding:0 6px;
  border:1.5px solid var(--border);border-radius:var(--r3);
  background:var(--sf2);font-family:inherit;font-size:11px;font-weight:700;
  color:var(--ink2);cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);
  min-height:34px;
}
.prop-btn:hover,.prop-btn.on{border-color:var(--accent);color:var(--accent);background:var(--gt);}
.prop-btn:active{transform:scale(.97);}
.prop-btn-row{display:flex;gap:4px;flex-wrap:wrap;}
input[type=range]{width:100%;accent-color:var(--accent);height:20px;}
input[type=color]{width:100%;height:38px;border:1.5px solid var(--border);border-radius:var(--r3);padding:3px;cursor:pointer;-webkit-appearance:none;}

/* 設定パネル */
.card{
  background:var(--sf);border:1px solid var(--border);
  border-radius:var(--r);margin-bottom:12px;overflow:hidden;
  box-shadow:var(--shadow);
  transition:background .25s,border-color .25s,box-shadow .2s;
}
.card:hover{box-shadow:var(--shadow2);}
.card-hdr{
  padding:11px 16px;border-bottom:1px solid var(--border);
  font-size:clamp(11px,1.2vw,12px);font-weight:700;
  background:var(--sf2);color:var(--ink2);
  display:flex;align-items:center;gap:6px;
}
.card-hdr-pill{
  font-size:10px;font-weight:700;
  background:var(--accent);color:#fff;
  padding:2px 8px;border-radius:20px;
}
.card-body{padding:14px 16px;}
.grid-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
@media(max-width:360px){.grid-wrap{grid-template-columns:repeat(3,1fr);}}
.gc{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 5px 8px;
  border:1.5px solid var(--border);border-radius:var(--r2);
  background:var(--sf2);cursor:pointer;
  transition:all .2s cubic-bezier(.4,0,.2,1);position:relative;
}
.gc:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:var(--shadow);}
.gc:active{transform:scale(.97);}
.gc.sel{border-color:var(--accent);background:var(--gt);}
.gc-vis{display:grid;gap:2px;margin-bottom:1px;}
.gc-cell{background:var(--border);border-radius:2px;}
.gc.sel .gc-cell{background:var(--accent);}
.gc-lbl{font-size:11px;font-weight:700;color:var(--ink);}
.gc.sel .gc-lbl{color:var(--accent);}
.gc-sub{font-size:9px;color:var(--ink3);text-align:center;}
.def-tag{position:absolute;top:-1px;right:-1px;font-size:8px;font-weight:700;background:var(--accent);color:#fff;border-radius:0 var(--r2) 0 5px;padding:2px 6px;}
.orient-info{font-size:clamp(11px,1.2vw,12px);color:var(--ink2);background:var(--gt);border-radius:var(--r3);padding:9px 12px;margin-top:10px;line-height:1.9;}
.tax-hint{font-size:clamp(11px,1.2vw,12px);color:var(--ink2);line-height:1.8;background:var(--sf2);border-radius:var(--r3);padding:9px 12px;margin-top:8px;border:1px solid var(--border);}

/* Modal */
.modal-ov{
  position:fixed;inset:0;
  background:rgba(8,12,8,.5);
  z-index:500;display:flex;align-items:flex-end;justify-content:center;
  padding:0;opacity:0;pointer-events:none;
  transition:opacity .2s;backdrop-filter:blur(6px);
}
@media(min-width:480px){.modal-ov{align-items:center;padding:16px;}}
.modal-ov.open{opacity:1;pointer-events:all;}
.modal-box{
  background:var(--glass-bg);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border-radius:18px 18px 0 0;
  border:1px solid var(--border);
  width:100%;max-width:100%;max-height:88vh;overflow-y:auto;
  box-shadow:0 8px 48px rgba(0,0,0,.24);
  transform:translateY(30px);transition:transform .24s cubic-bezier(.34,1.2,.64,1);
}
@media(min-width:480px){.modal-box{border-radius:16px;max-width:480px;max-height:none;transform:translateY(14px) scale(.98);}}
.modal-ov.open .modal-box{transform:translateY(0) scale(1);}
.modal-drag{width:32px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
@media(min-width:480px){.modal-drag{display:none;}}
.modal-hdr{
  padding:13px 16px 11px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  background:transparent;
}
.modal-title{font-size:clamp(13px,1.5vw,15px);font-weight:700;color:var(--ink);}
.modal-close{
  width:32px;height:32px;border:1px solid var(--border);
  background:var(--sf2);cursor:pointer;
  color:var(--ink2);display:flex;align-items:center;justify-content:center;
  border-radius:8px;
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.modal-close:hover{background:var(--rdt);color:var(--rd);border-color:var(--rd);}
.modal-close svg{width:14px;height:14px;stroke:currentColor;stroke-width:2.5;}
.modal-body{padding:14px 16px;}
.modal-foot{padding:10px 16px 16px;display:flex;gap:8px;justify-content:flex-end;}
.m-btn{
  height:44px;padding:0 18px;border:none;border-radius:var(--r3);
  font-family:inherit;font-size:clamp(12px,1.3vw,14px);font-weight:700;
  cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);
}
.m-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
.m-btn:active{transform:scale(.98);}
.m-btn-p{background:var(--accent);color:#fff;}
.m-btn-p:hover{background:var(--accent-h);}
.m-btn-p:disabled{background:var(--bg2);color:var(--ink3);transform:none;box-shadow:none;cursor:not-allowed;}
.m-btn-g{background:var(--sf2);color:var(--ink2);border:1.5px solid var(--border);}
.m-btn-g:hover{border-color:var(--accent);color:var(--accent);}
.col-sel-wrap{display:flex;gap:9px;margin-top:10px;}
.col-sel{flex:1;}
.col-sel label{display:block;font-size:10px;font-weight:700;color:var(--ink2);margin-bottom:5px;letter-spacing:.05em;text-transform:uppercase;}
.col-sel select{
  width:100%;height:44px;padding:0 10px;
  border:1.5px solid var(--border);border-radius:var(--r3);
  font-family:inherit;font-size:16px;color:var(--ink);
  background:var(--sf);outline:none;-webkit-appearance:none;
  transition:border-color .2s;
}
.col-sel select:focus{border-color:var(--accent);outline:2px solid var(--accent);outline-offset:2px;}
.preview-rows{
  margin-top:10px;border:1px solid var(--border);
  border-radius:var(--r3);overflow:hidden;max-height:140px;overflow-y:auto;
}
.preview-row{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:clamp(11px,1.2vw,13px);}
.preview-row:last-child{border-bottom:none;}
.preview-row-nm{flex:1;font-weight:600;color:var(--ink);}
.preview-row-p{color:var(--am);font-weight:700;white-space:nowrap;}

/* Toast */
.toast{
  position:fixed;
  bottom:calc(var(--nav) + var(--safe) + 10px);
  left:50%;transform:translateX(-50%) translateY(16px);
  background:var(--glass-bg);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  color:var(--ink);
  padding:10px 20px;
  border-radius:12px;
  border-left:3px solid var(--accent);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  font-size:clamp(12px,1.3vw,13px);font-weight:600;
  opacity:0;
  transition:all .28s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;z-index:999;
  white-space:nowrap;
  box-shadow:var(--shadow2);
  max-width:calc(100vw - 32px);
  overflow:hidden;text-overflow:ellipsis;
}
@media(min-width:680px){.toast{bottom:24px;left:auto;right:24px;transform:translateY(16px);}}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(min-width:680px){.toast.show{transform:translateY(0);}}
/* ════ 新入力パネル ════ */
.ip-wrap{display:flex;flex-direction:column;gap:0;max-width:540px;margin:0 auto;}
@media(min-width:960px){.ip-wrap{display:grid;grid-template-columns:540px 1fr;max-width:none;gap:0 32px;align-items:start;}}
.ip-col{display:flex;flex-direction:column;gap:14px;}
.ip-preview{display:none;}
@media(min-width:960px){.ip-preview{display:block;position:sticky;top:100px;}}
.prev-lbl{font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.1em;margin-bottom:7px;text-transform:uppercase;}
.prev-box{
  background:var(--sf);border:1px solid var(--border);
  border-radius:var(--r2);padding:10px;box-shadow:var(--shadow);
}
#prev-canvas{width:100%;border-radius:var(--r3);display:block;box-shadow:var(--shadow);}

/* Excel 2ボタン */
.xl-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.xl-card{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  padding:16px 10px;
  background:var(--sf);border:1.5px solid var(--border);border-radius:var(--r2);
  cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);text-align:center;
  box-shadow:var(--shadow);
  -webkit-tap-highlight-color:transparent;
  min-height:48px;
}
.xl-card:hover{border-color:var(--accent);background:var(--gt);transform:translateY(-2px);box-shadow:var(--shadow2);}
.xl-card:active{transform:scale(.98);}
.xl-card-icon{
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;background:var(--sf2);
  color:var(--accent);
}
.xl-card-icon svg{width:20px;height:20px;stroke:currentColor;stroke-width:1.8;}
.xl-card-main{font-size:clamp(12px,1.3vw,13px);font-weight:700;color:var(--ink);line-height:1.3;}
.xl-card-sub{font-size:clamp(9px,1vw,10px);color:var(--ink3);line-height:1.4;}

/* 手入力セクション */
.inp-section{
  background:var(--sf);border:1px solid var(--border);
  border-radius:var(--r);box-shadow:var(--shadow);
  transition:background .25s,border-color .25s;
}

/* 植物名フィールド */
.inp-field{display:flex;flex-direction:column;padding:14px 16px 12px;border-bottom:1px solid var(--border);}
.inp-field:last-of-type{border-bottom:none;}
.inp-field-lbl{
  font-size:clamp(10px,1.1vw,11px);font-weight:700;
  color:var(--ink3);letter-spacing:.06em;margin-bottom:8px;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}
.inp-field-lbl span{
  font-size:9px;font-weight:700;color:#fff;
  background:var(--rd);border-radius:4px;
  padding:1px 5px;letter-spacing:.04em;
}
.inp-text{
  width:100%;height:48px;padding:0 14px;
  border:1.5px solid var(--border);border-radius:var(--r2);
  font-family:inherit;font-size:16px;color:var(--ink);
  background:var(--sf2);outline:none;-webkit-appearance:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.inp-text:focus{
  border-color:var(--accent);
  background:var(--sf);
  outline:2px solid var(--accent);outline-offset:2px;
  box-shadow:0 0 0 3px rgba(22,163,74,.12);
}
.inp-text::placeholder{color:var(--ink3);}

/* 価格フィールド */
.price-field{padding:14px 16px 14px;border-bottom:1px solid var(--border);position:relative;}

/* 税込/税抜 トグル */
.price-toggle{
  display:flex;gap:0;margin-bottom:10px;
  border-radius:var(--r2);overflow:hidden;
  border:1.5px solid var(--border);align-self:flex-start;width:100%;
  background:var(--sf2);
}
.price-toggle-btn{
  flex:1;height:40px;border:none;background:transparent;
  font-family:inherit;font-size:clamp(11px,1.2vw,13px);font-weight:700;color:var(--ink3);
  cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);letter-spacing:.03em;
  border-right:1px solid var(--border);
}
.price-toggle-btn:last-child{border-right:none;}
.price-toggle-btn.on{background:var(--accent);color:#fff;}
.price-toggle-btn:hover:not(.on){color:var(--ink2);background:var(--bg2);}

/* 価格入力行 */
.price-row{display:flex;gap:8px;align-items:stretch;}
.price-inp{
  flex:1;min-width:0;
  height:52px;padding:0 14px;
  border:1.5px solid var(--border);border-radius:var(--r2);
  font-family:inherit;font-size:22px;font-weight:700;color:var(--am);
  text-align:right;
  background:var(--sf2);outline:none;-webkit-appearance:none;
  transition:border-color .2s,box-shadow .2s,background .2s;
}
.price-inp:focus{
  border-color:var(--am);background:var(--sf);
  outline:2px solid var(--am);outline-offset:2px;
  box-shadow:0 0 0 3px rgba(181,90,24,.12);
}
.price-inp::placeholder{color:var(--ink3);font-size:14px;font-weight:400;}

/* 税率ボタン */
.tax-rate-btn{
  width:56px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  background:var(--sf2);border:1.5px solid var(--border);border-radius:var(--r2);
  cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);padding:4px 2px;
  -webkit-tap-highlight-color:transparent;min-height:48px;
}
.tax-rate-btn:hover{border-color:var(--accent);background:var(--gt);transform:translateY(-1px);}
.tax-rate-btn:active{transform:scale(.96);}
.tax-rate-btn-lbl{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.04em;line-height:1;}
.tax-rate-btn-val{font-size:16px;font-weight:800;color:var(--accent);line-height:1.2;}
.tax-rate-btn-pct{font-size:9px;font-weight:700;color:var(--accent);line-height:1;}

/* 税率ポップオーバー */
.tax-popover{
  display:none;position:absolute;
  top:calc(100% + 6px);right:0;z-index:200;
  background:var(--glass-bg);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  border:1px solid var(--border);border-radius:var(--r2);
  box-shadow:var(--shadow2);
  padding:14px;width:220px;flex-direction:column;gap:10px;
}
.tax-popover.open{display:flex;}
.tax-pop-title{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;}
.tax-pop-btns{display:flex;gap:6px;}
.tax-pop-btn{
  flex:1;height:40px;border:1.5px solid var(--border);border-radius:var(--r3);
  background:var(--sf2);font-family:inherit;font-size:13px;font-weight:700;
  color:var(--ink2);cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);
  min-height:44px;
}
.tax-pop-btn:hover{border-color:var(--accent);color:var(--accent);}
.tax-pop-btn.on{border-color:var(--accent);color:var(--accent);background:var(--gt);}
.tax-pop-custom{
  display:flex;align-items:center;gap:6px;
  background:var(--sf2);border:1.5px solid var(--border);border-radius:var(--r3);
  padding:0 10px 0 4px;transition:border-color .2s;
}
.tax-pop-custom:focus-within{border-color:var(--am);}
.tax-pop-inp{width:52px;height:40px;border:none;outline:none;font-family:inherit;font-size:16px;font-weight:700;text-align:center;color:var(--ink);background:transparent;-webkit-appearance:none;}
.tax-pop-unit{font-size:12px;font-weight:700;color:var(--ink3);}

/* 追加ボタン */
.add-item-btn{
  width:56px;flex-shrink:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  background:var(--accent);border:none;border-radius:var(--r2);
  color:#fff;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);padding:4px 2px;
  -webkit-tap-highlight-color:transparent;min-height:48px;
}
.add-item-btn:hover{background:var(--accent-h);transform:translateY(-1px);box-shadow:0 4px 16px rgba(22,163,74,.35);}
.add-item-btn:active{transform:scale(.96);}
.add-item-btn-icon{
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;
}
.add-item-btn-icon svg{width:18px;height:18px;stroke:#fff;stroke-width:2.5;}
.add-item-btn-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.85);letter-spacing:.02em;line-height:1;}

/* カスタム入力フィールド（テンプレート追加分） */
.custom-fields{border-top:1px solid var(--border);}
.custom-field{display:flex;flex-direction:column;padding:12px 16px 10px;border-bottom:1px solid var(--border);}
.custom-field:last-child{border-bottom:none;}
.custom-field-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
.custom-field-lbl{font-size:clamp(10px,1.1vw,11px);font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;}
.custom-field-opt{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3);cursor:pointer;}
.custom-field-opt input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);}

/* 追加済みリスト */
.list-section{
  background:var(--sf);border:1px solid var(--border);
  border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow);
  transition:background .25s,border-color .25s;
}
.list-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;border-bottom:1px solid var(--border);background:var(--sf2);
}
.list-hdr-t{font-size:11px;font-weight:700;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;}
.list-cnt{
  font-size:11px;font-weight:700;color:var(--accent);
  background:var(--gt);padding:3px 10px;border-radius:20px;
}
.list-body{max-height:34vh;min-height:72px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px;}
@media(min-width:680px){.list-body{max-height:calc(100vh - 380px);}}
.list-body::-webkit-scrollbar{width:3px;}
.list-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
.list-empty{padding:20px 16px;text-align:center;font-size:clamp(12px,1.3vw,13px);color:var(--ink3);line-height:2.2;}

/* 印刷CTA */
.pdf-btn{
  width:100%;height:54px;display:flex;align-items:center;justify-content:center;gap:10px;
  background:var(--accent);border:none;border-radius:var(--r2);
  color:#fff;font-family:inherit;
  font-size:clamp(13px,1.5vw,15px);font-weight:700;
  cursor:pointer;letter-spacing:.04em;
  box-shadow:0 2px 16px rgba(22,163,74,.32);
  transition:all .2s cubic-bezier(.4,0,.2,1);
  -webkit-tap-highlight-color:transparent;min-height:48px;
}
.pdf-btn:hover{background:var(--accent-h);transform:translateY(-1px);box-shadow:0 6px 24px rgba(22,163,74,.40);}
.pdf-btn:active{transform:scale(.98);}
.pdf-btn svg{width:20px;height:20px;stroke:#fff;stroke-width:2;}
.bdg{background:rgba(255,255,255,.22);padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700;}
/* tax-popover anchor */
.price-row-wrap{position:relative;z-index:10;}

/* ════ テンプレートパネル 新デザイン ════ */
.tmpl-layout{
  display:flex;flex-direction:column;gap:14px;
}
@media(min-width:680px){
  .tmpl-layout{
    display:grid;
    grid-template-columns:minmax(180px,46%) 1fr;
    gap:14px;align-items:start;

}

}

/* Canvas エリア */
.tmpl-cvs-wrap{
  background:var(--sf);border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow);
}
.cvs-lbl-bar{
  padding:8px 12px;font-size:9px;font-weight:700;
  color:var(--ink3);letter-spacing:.1em;text-transform:uppercase;
  background:var(--sf2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.cvs-reset-btn{
  height:26px;padding:0 10px;
  border:1px solid var(--border);border-radius:6px;
  background:var(--sf);font-family:inherit;font-size:10px;font-weight:700;
  color:var(--ink3);cursor:pointer;
  display:flex;align-items:center;gap:4px;
  transition:all .2s cubic-bezier(.4,0,.2,1);
}
.cvs-reset-btn:hover{border-color:var(--accent);color:var(--accent);}
.cvs-reset-btn svg{width:12px;height:12px;stroke:currentColor;stroke-width:2;}
#pop-canvas{width:100%;display:block;cursor:grab;touch-action:none;}

/* テンプレート管理 */
.tmpl-mgr{
  background:var(--sf);border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow);
}
.tmpl-mgr-hdr{
  padding:9px 13px;font-size:10px;font-weight:700;
  color:var(--ink2);background:var(--sf2);
  border-bottom:1px solid var(--border);letter-spacing:.07em;text-transform:uppercase;
}
.tmpl-list-inner{display:flex;flex-direction:column;gap:0;max-height:200px;overflow-y:auto;}
.tmpl-list-inner::-webkit-scrollbar{width:3px;}
.tmpl-list-inner::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* テンプレートアイテム */
.tmpl-item{
  display:flex;align-items:center;gap:8px;padding:10px 13px;
  border-bottom:1px solid var(--border);cursor:pointer;
  transition:background .2s cubic-bezier(.4,0,.2,1);
}
.tmpl-item:last-child{border-bottom:none;}
.tmpl-item:hover{background:var(--sf2);}
.tmpl-item.act{background:var(--gt);}
.tmpl-item-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--border);flex-shrink:0;
  transition:background .2s;
}
.tmpl-item.act .tmpl-item-dot{background:var(--accent);}
.tmpl-item-info{flex:1;min-width:0;}
.tmpl-item-nm{font-size:clamp(11px,1.2vw,12px);font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tmpl-item-meta{font-size:10px;color:var(--ink3);margin-top:1px;}
.tmpl-item.editing .tmpl-item-nm{color:var(--am);}
.tmpl-item.editing .tmpl-item-dot{background:var(--am);}
.tmpl-item-del{
  width:30px;height:30px;border:none;background:none;
  border-radius:6px;cursor:pointer;
  color:var(--ink3);display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:all .2s;
}
.tmpl-item-del:hover{background:var(--rdt);color:var(--rd);}
.tmpl-item-del svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;}

/* 保存フォーム */
.tmpl-save-area{padding:12px 13px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;}
.tmpl-save-inp{
  width:100%;height:44px;padding:0 12px;
  border:1.5px solid var(--border);border-radius:var(--r3);
  font-family:inherit;font-size:16px;color:var(--ink);
  background:var(--sf2);outline:none;-webkit-appearance:none;
  transition:border-color .2s,box-shadow .2s;
}
.tmpl-save-inp:focus{
  border-color:var(--accent);background:var(--sf);
  outline:2px solid var(--accent);outline-offset:2px;
}
.tmpl-save-inp.err{border-color:var(--rd);}
.tmpl-save-btn{
  height:44px;background:var(--accent);border:none;border-radius:var(--r3);
  color:#fff;font-family:inherit;font-size:clamp(12px,1.3vw,13px);font-weight:700;
  cursor:pointer;letter-spacing:.04em;
  transition:all .2s cubic-bezier(.4,0,.2,1);min-height:44px;
}
.tmpl-save-btn:hover{background:var(--accent-h);transform:translateY(-1px);box-shadow:var(--shadow);}
.tmpl-save-btn:active{transform:scale(.98);}

/* 右列 */
.tmpl-right-col{
  display:flex;flex-direction:column;gap:10px;
}
@media(min-width:680px){
  .tmpl-right-col{max-height:calc(100vh - 90px);overflow-y:auto;padding-bottom:20px;}
  .tmpl-right-col::-webkit-scrollbar{width:3px;}
  .tmpl-right-col::-webkit-scrollbar-thumb{background:var(--bg2);border-radius:3px;}
}

/* 項目セクション */
.items-section{
  background:var(--sf);border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow);
}
.items-hdr{
  padding:9px 13px;font-size:10px;font-weight:700;
  color:var(--ink2);background:var(--sf2);
  border-bottom:1px solid var(--border);
  letter-spacing:.07em;text-transform:uppercase;
  display:flex;align-items:center;justify-content:space-between;
}
.items-add-btn{
  height:28px;padding:0 10px;
  border:1px solid var(--border);border-radius:6px;
  background:var(--sf);font-family:inherit;font-size:10px;font-weight:700;
  color:var(--ink3);cursor:pointer;
  display:flex;align-items:center;gap:4px;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  min-height:28px;
}
.items-add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--gt);}
.items-add-btn svg{width:12px;height:12px;stroke:currentColor;stroke-width:2.5;}

/* 項目行 */
.item-row{
  border-bottom:1px solid var(--border);
  transition:background .2s cubic-bezier(.4,0,.2,1);
}
.item-row:last-child{border-bottom:none;}
.item-row-main{

  padding:10px 13px;min-height:48px;cursor:pointer;
}
.item-row:hover .item-row-main{background:var(--sf2);}
.item-row.open .item-row-main{background:var(--gt);}
.item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.item-nm{flex:1;font-size:clamp(12px,1.3vw,13px);font-weight:700;color:var(--ink);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-row.open .item-nm{font-size:11px;color:var(--accent);}
.item-acts{display:flex;gap:2px;flex-shrink:0;}
.item-act{

  transition:all .2s;min-height:32px;
}
.item-act:hover{background:var(--rdt);color:var(--rd);}
.item-act svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;}

/* インラインプロパティパネル */
.item-props{

}

.iprop-row{display:flex;align-items:center;gap:6px;}
.iprop-lbl{font-size:9px;font-weight:700;color:var(--ink3);letter-spacing:.06em;text-transform:uppercase;min-width:36px;}
/* フォントサイズステッパー */
.fsz-ctrl{display:flex;align-items:center;gap:3px;}
.fsz-btn{
  width:28px;height:32px;border:1.5px solid var(--border);border-radius:6px;
  background:var(--sf2);font-family:inherit;font-size:14px;font-weight:700;
  color:var(--ink2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;min-height:32px;
}
.fsz-btn:hover{border-color:var(--accent);color:var(--accent);}
.fsz-val{
  width:38px;height:32px;border:1.5px solid var(--border);border-radius:6px;
  text-align:center;font-family:inherit;font-size:13px;font-weight:700;
  color:var(--ink);background:var(--sf2);outline:none;-webkit-appearance:none;
}
.fsz-val:focus{border-color:var(--accent);outline:2px solid var(--accent);outline-offset:2px;}
/* 文字色 */
.clr-btn{width:34px;height:32px;border:1.5px solid var(--border);border-radius:6px;padding:2px;cursor:pointer;-webkit-appearance:none;}
/* スタイル・揃えボタン */
.style-btns{display:flex;gap:3px;flex-wrap:wrap;}
.s-btn{
  height:32px;padding:0 8px;min-width:32px;
  border:1.5px solid var(--border);border-radius:6px;
  background:var(--sf2);font-family:inherit;font-size:12px;font-weight:700;
  color:var(--ink2);cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);
  min-height:32px;
}
.s-btn:hover{border-color:var(--accent);color:var(--accent);}
.s-btn.on{border-color:var(--accent);background:var(--gt);color:var(--accent);}

/* 背景追加セクション */
.bg-section{
  background:var(--sf);border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow);
}
.bg-hdr{
  padding:9px 13px;font-size:10px;font-weight:700;
  color:var(--ink2);background:var(--sf2);
  border-bottom:1px solid var(--border);letter-spacing:.07em;text-transform:uppercase;
}
.bg-body{padding:12px 13px;display:flex;flex-direction:column;gap:10px;}
.bg-note{font-size:clamp(10px,1.1vw,11px);color:var(--ink3);line-height:1.7;}
.bg-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.bg-btn{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:14px 8px;
  background:var(--sf2);border:1.5px solid var(--border);border-radius:var(--r2);
  font-family:inherit;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);text-align:center;
  min-height:48px;
}
.bg-btn:hover{border-color:var(--accent);background:var(--gt);transform:translateY(-1px);}
.bg-btn:active{transform:scale(.97);}
.bg-btn-icon{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border-radius:8px;background:var(--sf);color:var(--accent);
}
.bg-btn-icon svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;}
.bg-btn-lbl{font-size:clamp(11px,1.2vw,12px);font-weight:700;color:var(--ink);}
.bg-btn-sub{font-size:10px;color:var(--ink3);}
/* 背景プレビュー */
.bg-preview{display:none;margin-top:4px;position:relative;}
.bg-preview img{width:100%;border-radius:var(--r3);display:block;box-shadow:var(--shadow);}
.bg-preview-clr{
  position:absolute;top:6px;right:6px;width:28px;height:28px;
  border:none;border-radius:50%;
  background:rgba(0,0,0,.55);color:#fff;font-size:11px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
.bg-preview-clr:hover{background:var(--rd);}
.bg-preview-clr svg{width:12px;height:12px;stroke:#fff;stroke-width:2.5;}
.dstyle-sel{
  width:100%;height:44px;padding:0 12px;
  border:1.5px solid var(--border);border-radius:var(--r3);
  font-family:inherit;font-size:14px;color:var(--ink);
  background:var(--sf2);outline:none;-webkit-appearance:none;
  transition:border-color .2s;
}
.dstyle-sel:focus{border-color:var(--accent);outline:2px solid var(--accent);outline-offset:2px;}
.clr-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.clr-row:last-child{border-bottom:none;}
.clr-lbl{flex:1;font-size:clamp(12px,1.3vw,13px);color:var(--ink2);font-weight:500;}

input:focus,button:focus{outline:none;}

/* ── 印刷プレビューオーバーレイ ── */
#print-overlay{display:none;position:fixed;inset:0;z-index:800;background:#444;flex-direction:column;}
#print-toolbar{
  flex-shrink:0;height:54px;
  background:var(--accent);
  display:flex;align-items:center;justify-content:center;gap:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.3);
}
#print-title{color:#fff;font-size:clamp(12px,1.3vw,13px);font-weight:600;}
.print-btn-do{
  height:38px;padding:0 18px;border:none;border-radius:9px;
  background:#fff;color:var(--accent);font-family:inherit;font-size:13px;font-weight:700;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:all .2s;
}
.print-btn-do:hover{background:var(--sf2);}
.print-btn-do svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.2;}
.print-btn-close{
  height:38px;padding:0 14px;
  border:1.5px solid rgba(255,255,255,.4);border-radius:9px;
  background:transparent;color:#fff;font-family:inherit;font-size:13px;font-weight:600;
  cursor:pointer;display:flex;align-items:center;gap:5px;
  transition:all .2s;
}
.print-btn-close:hover{border-color:#fff;background:rgba(255,255,255,.1);}
.print-btn-close svg{width:14px;height:14px;stroke:#fff;stroke-width:2.5;}
#print-pages{flex:1;overflow-y:auto;overflow-x:hidden;padding:14px;display:flex;flex-direction:column;align-items:center;gap:14px;}

/* ════ Square変換ツール CSS ════ */
.sq-tool{
  --sq-cream:var(--sf2);--sq-white:var(--sf);
  --sq-green-dark:var(--accent);--sq-green-mid:#4a7c6f;--sq-green-light:#a8c5bb;--sq-green-pale:var(--gt);
  --sq-sage:#8fad97;--sq-gold:#c9a84c;
  --sq-text-dark:var(--ink);--sq-text-mid:var(--ink2);--sq-text-muted:var(--ink3);--sq-border:var(--border);
  --sq-red:var(--rd);--sq-red-light:var(--rdt);
  --sq-orange:#c97d10;--sq-orange-light:#fef6ea;
  --sq-blue-light:#eaf2fb;
  font-family:'Hiragino Sans','Meiryo','Yu Gothic',sans-serif;
}
.sq-tool::before{
  content:'';position:absolute;pointer-events:none;
  background:radial-gradient(ellipse 60% 50% at 10% 20%,rgba(168,197,187,.15) 0%,transparent 70%),
             radial-gradient(ellipse 50% 60% at 90% 80%,rgba(201,168,76,.06) 0%,transparent 70%);
  inset:0;z-index:0;
}
.sq-header{text-align:center;margin-bottom:2rem;position:relative;}
.sq-logo-mark{display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;background:var(--sq-green-dark);border-radius:50%;margin-bottom:1rem;font-size:1.6rem;}
.sq-h1{font-size:1.5rem;font-weight:700;color:var(--sq-green-dark);letter-spacing:.04em;line-height:1.4;margin:0;}
.sq-subtitle{margin-top:.5rem;font-size:.82rem;color:var(--sq-text-muted);font-weight:300;}
.sq-arrow-badge{display:inline-block;background:var(--sq-gold);color:#fff;font-size:.7rem;font-weight:700;padding:.15rem .55rem;border-radius:2px;margin:0 .3rem;vertical-align:middle;}
.sq-version-badge{display:inline-block;background:var(--sq-green-dark);color:#fff;font-size:.65rem;font-weight:700;padding:.1rem .45rem;border-radius:10px;margin-left:.4rem;vertical-align:middle;}

.sq-card{background:var(--sq-white);border:1px solid var(--sq-border);border-radius:12px;padding:1.6rem 1.8rem;margin-bottom:1.25rem;box-shadow:0 2px 12px rgba(44,74,62,.06);}
.sq-card:hover{box-shadow:0 4px 20px rgba(44,74,62,.10);}
.sq-card-label{font-size:.7rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sq-sage);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem;}
.sq-card-label::after{content:'';flex:1;height:1px;background:var(--sq-green-pale);}

.sq-notice-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;}
@media(max-width:600px){.sq-notice-grid{grid-template-columns:1fr;}}
.sq-notice{border-radius:8px;padding:.85rem 1rem;border-left:3px solid;font-size:.8rem;line-height:1.6;}
.sq-fixed{background:var(--sq-green-pale);border-color:var(--sq-green-mid);}
.sq-warn{background:var(--sq-orange-light);border-color:var(--sq-orange);}
.sq-notice-title{font-weight:700;margin-bottom:.2rem;}
.sq-fixed .sq-notice-title{color:var(--sq-green-dark);}
.sq-warn .sq-notice-title{color:var(--sq-orange);}
.sq-notice-body{color:var(--sq-text-mid);}

.sq-settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
@media(max-width:500px){.sq-settings-grid{grid-template-columns:1fr;}}
.sq-field{display:flex;flex-direction:column;gap:.4rem;}
.sq-field label{font-size:.78rem;font-weight:500;color:var(--sq-text-mid);}
.sq-field small{font-size:.7rem;color:var(--sq-text-muted);}
.sq-field input,.sq-field select{border:1px solid var(--sq-border);border-radius:8px;padding:.55rem .9rem;font-size:.9rem;font-family:inherit;color:var(--sq-text-dark);background:var(--sq-cream);transition:border-color .2s,box-shadow .2s;outline:none;width:100%;}
.sq-field input:focus,.sq-field select:focus{border-color:var(--sq-green-mid);box-shadow:0 0 0 3px rgba(74,124,111,.12);background:var(--sq-white);}

#sq-dropZone{border:2px dashed var(--sq-green-light);border-radius:12px;padding:2.5rem 2rem;text-align:center;cursor:pointer;background:var(--sq-green-pale);transition:all .25s;}
#sq-dropZone:hover,#sq-dropZone.sq-drag-over{border-color:var(--sq-green-mid);background:rgba(74,124,111,.08);}
#sq-dropZone.sq-has-file{border-style:solid;border-color:var(--sq-green-mid);background:var(--sq-white);}
#sq-fileInput{display:none;}
.sq-upload-icon{font-size:2.2rem;margin-bottom:.75rem;display:block;}
.sq-upload-primary{font-size:1rem;font-weight:700;color:var(--sq-green-dark);margin-bottom:.3rem;}
.sq-upload-secondary{font-size:.78rem;color:var(--sq-text-muted);}
.sq-file-name-display{font-size:.85rem;font-weight:500;color:var(--sq-green-mid);margin-top:.75rem;display:none;}
#sq-dropZone.sq-has-file .sq-file-name-display{display:block;}
#sq-dropZone.sq-has-file .sq-upload-icon{display:none;}

#sq-previewSection{display:none;}
.sq-preview-meta{display:flex;gap:1.5rem;flex-wrap:wrap;margin-bottom:1.2rem;}
.sq-meta-chip{display:flex;flex-direction:column;gap:.1rem;}
.sq-meta-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;color:var(--sq-text-muted);font-weight:700;}
.sq-meta-value{font-size:1.1rem;font-weight:700;color:var(--sq-green-dark);}
.sq-meta-value.sq-meta-warn{color:var(--sq-orange);}

.sq-vbox{border-radius:8px;padding:.85rem 1.1rem;font-size:.8rem;line-height:1.7;margin-bottom:.5rem;}
.sq-vbox.sq-ok{background:var(--sq-green-pale);border:1px solid var(--sq-green-light);color:var(--sq-green-dark);}
.sq-vbox.sq-vwarn{background:var(--sq-orange-light);border:1px solid #e8c07a;color:var(--sq-orange);}
.sq-vbox ul{margin:.3rem 0 0 1.2rem;}

.sq-preview-table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--sq-border);margin-top:1rem;}
.sq-preview-table{width:100%;border-collapse:collapse;font-size:.77rem;}
.sq-preview-table th{background:var(--sq-green-dark);color:#fff;padding:.5rem .7rem;text-align:left;font-weight:500;white-space:nowrap;}
.sq-preview-table td{padding:.45rem .7rem;border-bottom:1px solid var(--sq-green-pale);white-space:nowrap;max-width:170px;overflow:hidden;text-overflow:ellipsis;color:var(--sq-text-mid);}
.sq-preview-table tr:last-child td{border-bottom:none;}
.sq-preview-table tr:nth-child(even) td{background:var(--sq-cream);}
.sq-sku-col{font-family:monospace;font-size:.73rem!important;color:var(--sq-green-mid)!important;}
.sq-price-col{text-align:right!important;font-weight:500!important;}

#sq-mappingSection{display:none;}
.sq-mapping-grid{display:grid;grid-template-columns:1fr 1fr;gap:.4rem 1.5rem;}
@media(max-width:500px){.sq-mapping-grid{grid-template-columns:1fr;}}
.sq-mapping-row{display:flex;align-items:flex-start;gap:.5rem;font-size:.8rem;padding:.35rem 0;border-bottom:1px solid var(--sq-green-pale);}
.sq-mapping-src{font-weight:600;color:var(--sq-text-dark);flex-shrink:0;}
.sq-mapping-arrow{color:var(--sq-gold);font-size:.7rem;flex-shrink:0;margin-top:.1rem;}
.sq-mapping-dst{color:var(--sq-text-muted);font-size:.76rem;flex:1;}
.sq-mapping-note{font-size:.67rem;color:var(--sq-green-mid);font-weight:700;background:var(--sq-green-pale);padding:.05rem .35rem;border-radius:4px;white-space:nowrap;}

#sq-convertBtn{display:block;width:100%;padding:1.1rem;background:var(--sq-green-dark,#2c4a3e);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:1.05rem;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .2s;margin-top:.5rem;}
#sq-convertBtn:disabled{background:#a8c5bb;cursor:not-allowed;color:rgba(255,255,255,.5);}
#sq-convertBtn:not(:disabled):hover{background:#4a7c6f;transform:translateY(-1px);box-shadow:0 6px 20px rgba(44,74,62,.3);}
#sq-convertBtn:not(:disabled):active{transform:translateY(0);}

#sq-statusMsg{margin-top:1rem;padding:.9rem 1.2rem;border-radius:8px;font-size:.85rem;display:none;align-items:flex-start;gap:.6rem;}
#sq-statusMsg.sq-success{display:flex;background:#e8f0ee;border:1px solid #a8c5bb;color:#2c4a3e;}
#sq-statusMsg.sq-error{display:flex;background:#fdf0ef;border:1px solid #e8b4b0;color:#b03030;}
.sq-status-text{line-height:1.6;}

.sq-footer{text-align:center;margin-top:3rem;font-size:.72rem;color:var(--ink3);font-weight:300;}

/* ── Square カード上書き（ダークモード対応） */
.sq-card{
  background:var(--sf);border:1px solid var(--border);
  border-radius:16px;padding:1.6rem 1.8rem;margin-bottom:1.25rem;
  box-shadow:var(--shadow);
  transition:background .25s,box-shadow .2s;
}
.sq-card:hover{box-shadow:var(--shadow2);}
.sq-field input,.sq-field select{
  border:1px solid var(--border);
  background:var(--sf2);color:var(--ink);
}
.sq-field input:focus,.sq-field select:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px rgba(22,163,74,.12);
  background:var(--sf);outline:2px solid var(--accent);outline-offset:2px;
}
#sq-dropZone{
  border:2px dashed var(--border);border-radius:12px;
  padding:2.5rem 2rem;text-align:center;cursor:pointer;
  background:var(--sf2);transition:all .25s;
}
#sq-dropZone:hover,#sq-dropZone.sq-drag-over{
  border-color:var(--accent);background:var(--gt);
}
#sq-dropZone.sq-has-file{border-style:solid;border-color:var(--accent);background:var(--sf);}
#sq-convertBtn{
  display:block;width:100%;padding:1.1rem;
  background:var(--accent);color:#fff;border:none;border-radius:12px;
  font-family:inherit;font-size:1.05rem;font-weight:700;
  letter-spacing:.06em;cursor:pointer;
  transition:all .2s cubic-bezier(.4,0,.2,1);margin-top:.5rem;
  min-height:48px;
}
#sq-convertBtn:disabled{background:var(--border);cursor:not-allowed;color:var(--ink3);}
#sq-convertBtn:not(:disabled):hover{background:var(--accent-h);transform:translateY(-1px);box-shadow:0 6px 20px rgba(22,163,74,.35);}
#sq-convertBtn:not(:disabled):active{transform:scale(.98);}

/* ── ポップアイテム削除ボタン（Lucide SVG対応） */
.pop-del svg{width:12px;height:12px;stroke:#fff;stroke-width:2.5;}

/* ── focus-visible でアクセシビリティ向上 */
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
button:focus,input:focus,select:focus{outline:none;}

<!-- ─── INPUT ─────────────────────────────── -->
<div class="panel on" id="panel-input">
  <div class="ip-wrap">

    <div class="ip-col">

      <!-- Excel 一括挿入 -->

      <!-- 豊明花き 一括読み込み -->
      <div class="toyoake-section">
        <div class="xl-btns">
          <button class="xl-card" onclick="onXlToyoake()" style="grid-column:1/-1;">
            <span class="xl-card-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="1.8"/></svg></span>
            <span class="xl-card-main">豊明花き CSV 一括読み込み</span>
            <span class="xl-card-sub">POP作成 + Square Excelを同時生成</span>
          </button>
          <input type="file" id="xl-toyoake-file" accept=".csv,.CSV" style="display:none" onchange="onXlToyoakeFile(event)">
        </div>

        <!-- 読み込み結果（初期非表示） -->
        <div id="toyoake-result" style="display:none;">
          <div class="card" style="margin-top:10px;">
            <div class="card-hdr">読み込み結果</div>
            <div class="card-body" style="display:flex;flex-direction:column;gap:10px;">
              <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:13px;">
                <span><strong id="toyoake-count">0</strong> 件のPOPを追加</span>
                <span>売立日: <strong id="toyoake-date">—</strong></span>
              </div>
              <!-- Square Excel ダウンロード -->
              <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <button id="toyoake-sq-dl" class="m-btn m-btn-p" onclick="downloadSquareExcel()" style="height:40px;display:flex;align-items:center;gap:6px;">
                  <svg viewBox="0 0 24 24" fill="none" width="16" height="16" style="stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                  Square Excel ダウンロード
                </button>
                <span id="toyoake-sq-status" style="font-size:12px;color:var(--ink3);"></span>
              </div>
              <!-- Square設定（折りたたみ） -->
              <details style="font-size:13px;">
                <summary style="cursor:pointer;color:var(--ink2);font-weight:600;">Square変換の設定</summary>
                <div style="margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                  <div class="sq-field">
                    <label style="font-size:12px;">店舗名</label>
                    <input type="text" id="sq-storeName" value="北山ナーセリー" placeholder="北山ナーセリー" style="height:36px;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:0 10px;">
                  </div>
                  <div class="sq-field">
                    <label style="font-size:12px;">消費税</label>
                    <select id="sq-taxValue" style="height:36px;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:0 10px;">
                      <option value="Y" selected>適用する</option>
                      <option value="N">適用しない</option>
                    </select>
                  </div>
                  <div class="sq-field">
                    <label style="font-size:12px;">価格設定</label>
                    <select id="sq-priceMode" style="height:36px;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:0 10px;">
                      <option value="case" selected>ケース単価そのまま</option>
                      <option value="per_unit">÷入数（1本単価）</option>
                    </select>
                  </div>
                  <div class="sq-field">
                    <label style="font-size:12px;">商品タイプ</label>
                    <select id="sq-productType" style="height:36px;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:0 10px;">
                      <option value="有形商品" selected>有形商品</option>
                      <option value="その他">その他</option>
                    </select>
                  </div>
                </div>
              </details>
            </div>
          </div>
        </div>
      </div>

      <!-- 任意Excelファイル（既存機能維持） -->
      <div class="xl-btns" style="margin-top:8px;">
        <button class="xl-card" onclick="document.getElementById('xl-file').click()" style="grid-column:1/-1;">
          <span class="xl-card-icon"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="1.8"/><path d="M3 9h18M9 21V9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
          <span class="xl-card-main">任意のExcelファイル</span>
          <span class="xl-card-sub">.xlsx / .xls / .csv — 列を手動で指定</span>
        </button>
        <input type="file" id="xl-file" accept=".xlsx,.xls,.csv" style="display:none" onchange="onXlFile(event)">
      </div>

      <!-- 手入力フォーム -->
      <div class="inp-section" id="inp-card">

        <!-- 植物名 -->
        <div class="inp-field" id="inp-field-name">
          <div class="inp-field-lbl">植物名<span>必須</span></div>
          <input class="inp-text" type="text" id="inp-name"
            placeholder="例：モンステラ デリシオーサ"
            autocomplete="off" autocorrect="off" enterkeyhint="next"
            oninput="redrawPrev()" onkeydown="nameKey(event)">
        </div>

        <!-- カスタムフィールド（テンプレート連動） -->
        <div class="custom-fields" id="inp-custom-fields"></div>

        <!-- 価格フィールド -->
        <div class="price-field">
          <!-- 税込/税抜 トグル -->
          <div class="price-toggle">
            <button class="price-toggle-btn on" id="ptab-excl" onclick="setPriceMode('excl')">税抜価格</button>
            <button class="price-toggle-btn" id="ptab-incl" onclick="setPriceMode('incl')">税込価格</button>
          </div>
          <!-- 価格入力行 -->
          <div class="price-row-wrap">
            <div class="price-row">
              <input class="price-inp" type="number" id="inp-price"
                placeholder="0" inputmode="decimal" enterkeyhint="done"
                oninput="redrawPrev()" onkeydown="priceKey(event)">
              <!-- 税率ボタン -->
              <button class="tax-rate-btn" id="tax-rate-toggle-btn" onclick="toggleTaxPopover()" aria-label="税率設定">
                <span class="tax-rate-btn-lbl">税率</span>
                <span class="tax-rate-btn-val" id="tax-rate-val">10</span>
                <span class="tax-rate-btn-pct">%</span>
              </button>
              <!-- 追加ボタン -->
              <button class="add-item-btn" onclick="addItem()">
                <span class="add-item-btn-icon"><svg viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg></span>
                <span class="add-item-btn-lbl">追加</span>
              </button>
            </div>
            <!-- 税率ポップオーバー -->
            <div class="tax-popover" id="tax-popover">
              <div class="tax-pop-title">消費税率を設定</div>
              <div class="tax-pop-btns">
                <button class="tax-pop-btn" id="tpop-8" onclick="setTaxRate(8,'btn')">8%</button>
                <button class="tax-pop-btn on" id="tpop-10" onclick="setTaxRate(10,'btn')">10%</button>
              </div>
              <div class="tax-pop-custom">
                <input class="tax-pop-inp" type="number" id="tax-rate-inp"
                  value="10" min="0" max="99" step="1" placeholder="独自"
                  oninput="setTaxRateCustom(this.value)">
                <span class="tax-pop-unit">%</span>
              </div>
            </div>
          </div>
        </div>

      </div><!-- /inp-section -->

      <!-- 追加済みリスト -->
      <div class="list-section">
        <div class="list-hdr">
          <span class="list-hdr-t">追加済みリスト</span>
          <span class="list-cnt" id="list-cnt">0件</span>
        </div>
        <div class="list-body" id="list-body">
          <div class="list-empty" id="list-empty">植物名と価格を入力して＋を押してください</div>
          <div class="pop-grid" id="list-items"></div>
        </div>
      </div>

      <!-- 印刷 CTA -->
      <button class="pdf-btn" onclick="generatePDF()">
        <svg viewBox="0 0 24 24" fill="none"><polyline points="6 9 6 2 18 2 18 9" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="6" y="14" width="12" height="8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        印刷プレビューを開く
        <span class="bdg" id="pdf-bdg" style="display:none"></span>
      </button>

    </div>

    <!-- PC右カラム：プレビュー -->
    <div class="ip-preview">
      <div class="prev-lbl">リアルタイムプレビュー</div>
      <div class="prev-box"><canvas id="prev-canvas"></canvas></div>
    </div>

  </div>
</div>
<!-- ─── TEMPLATE ──────────────────────────── -->
<div class="panel" id="panel-template">
  <div class="tmpl-layout">

    <!-- 左列：Canvas + テンプレート管理 -->
    <div class="tmpl-left-col">

      <!-- 編集プレビュー -->
      <div class="tmpl-cvs-wrap">
        <div class="cvs-lbl-bar">
          編集プレビュー（ドラッグで移動）
          <button class="cvs-reset-btn" onclick="resetEl()"><svg viewBox="0 0 24 24" fill="none"><polyline points="1 4 1 10 7 10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.51 15a9 9 0 1 0 .49-4.98" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg> 初期値</button>
        </div>
        <canvas id="pop-canvas"></canvas>
      </div>

      <!-- テンプレート管理 -->
      <div class="tmpl-mgr">
        <div class="tmpl-mgr-hdr">テンプレート管理</div>
        <div class="tmpl-list-inner" id="tmpl-list"></div>
        <div class="tmpl-save-area">
          <input class="tmpl-save-inp" type="text" id="tmpl-author" placeholder="作成者名" maxlength="20">
          <input class="tmpl-save-inp" type="text" id="tmpl-inp" placeholder="テンプレート名" maxlength="30">
          <button class="tmpl-save-btn" onclick="saveTmpl()">保存する</button>
        </div>
      </div>

    </div>

    <!-- 右列：項目 + 背景 -->
    <div class="tmpl-right-col">

      <!-- 項目リスト -->
      <div class="items-section">
        <div class="items-hdr">
          <span>項目</span>
          <button class="items-add-btn" onclick="addEl()"><svg viewBox="0 0 24 24" fill="none"><line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg> テキスト追加</button>
        </div>
        <div id="ellist"></div>
      </div>

      <!-- 背景追加 -->
      <div class="bg-section">
        <div class="bg-hdr">背景追加</div>
        <div class="bg-body">
          <div class="bg-note">デザインソフトで作成した背景画像を読み込むか、アプリで直接作成できます。</div>
          <div class="clr-row"><span class="clr-lbl">枠・アクセント色</span><input type="color" id="caccent" value="#2d7a4f" onchange="markEdited();redrawAll()"></div>
          <div class="clr-row"><span class="clr-lbl">背景色</span><input type="color" id="cbg" value="#fffef8" onchange="markEdited();redrawAll()"></div>
          <select class="dstyle-sel" id="dstyle" onchange="markEdited();redrawAll();rebuildInpFields();">
            <option value="custom">🖼 カスタム背景（外部ソフト）</option>
            <option value="natural" selected>🌿 シンプルポップ</option>
            <option value="ikea">🟡 IKEAスタイル</option>
          </select>
          <div class="bg-btns">
            <button class="bg-btn" onclick="document.getElementById('bg-img-file').click()">
              <span class="bg-btn-icon"><svg viewBox="0 0 24 24" fill="none"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
              <span class="bg-btn-lbl">ファイルから</span>
              <span class="bg-btn-sub">PNG / JPG</span>
            </button>
            <button class="bg-btn" onclick="openExtDesignApp()">
              <span class="bg-btn-icon"><svg viewBox="0 0 24 24" fill="none"><circle cx="13.5" cy="6.5" r=".5" stroke="currentColor" stroke-width="2"/><circle cx="17.5" cy="10.5" r=".5" stroke="currentColor" stroke-width="2"/><circle cx="8.5" cy="7.5" r=".5" stroke="currentColor" stroke-width="2"/><circle cx="6.5" cy="12.5" r=".5" stroke="currentColor" stroke-width="2"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z" stroke="currentColor" stroke-width="1.8"/></svg></span>
              <span class="bg-btn-lbl">アプリから</span>
              <span class="bg-btn-sub">Canva / Figma 他</span>
            </button>
          </div>
          <input type="file" id="bg-img-file" accept="image/png,image/jpeg,image/webp" style="display:none" onchange="loadBgImage(event)">
          <div class="bg-preview" id="bg-img-preview">
            <img id="bg-img-thumb">
            <button class="bg-preview-clr" onclick="clearBgImage()"><svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg></button>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
<!-- ─── SETTINGS ──────────────────────────── -->
<div class="panel" id="panel-settings">
  <div class="card">
    <div class="card-hdr">
      <span>分割レイアウト</span>
    </div>
    <div class="card-body">
      <div class="grid-wrap" id="grid-wrap"></div>
      <div class="orient-info" id="orient-info"></div>
    </div>
  </div>

      <div class="tax-hint">税抜入力モード時、自動で税込価格を計算して表示します。</div>
    </div>
  </div>
</div>

</main>

<!-- 印刷プレビューオーバーレイ -->
<div id="print-overlay">
  <div id="print-toolbar">
    <span id="print-title"></span>
    <button class="print-btn-do" onclick="doPrint()">
      <svg viewBox="0 0 24 24" fill="none"><polyline points="6 9 6 2 18 2 18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><rect x="6" y="14" width="12" height="8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      印刷
    </button>
    <button class="print-btn-close" onclick="closePrintOverlay()">
      <svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
      閉じる
    </button>
  </div>
  <div id="print-pages"></div>
</div>
<style id="print-style"></style>

<!-- Excel Modal -->
<div class="modal-ov" id="xl-modal">
  <div class="modal-box">
    <div class="modal-drag"></div>
    <div class="modal-hdr">
      <span class="modal-title">Excelから一括挿入</span>
      <button class="modal-close" onclick="closeXlModal()">
        <svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div id="xl-err" style="display:none;padding:8px 12px;background:var(--rdt);border-radius:var(--r3);font-size:13px;color:var(--rd);margin-bottom:10px;"></div>
      <div id="xl-msg" style="font-size:13px;color:var(--ink2);margin-bottom:10px;line-height:1.7;">
        1行目：ヘッダー行として認識します。<br>植物名・価格の列を選んでください。
      </div>
      <div style="font-size:12px;color:var(--ink3);margin-bottom:8px;">
        ファイル: <span id="xl-filename" style="font-weight:700;color:var(--ink2);"></span>
      </div>
      <div class="col-sel-wrap" id="xl-col-sel" style="display:none;">
        <div class="col-sel">
          <label>植物名の列</label>
          <select id="xl-name-col"></select>
        </div>
        <div class="col-sel">
          <label>価格の列</label>
          <select id="xl-price-col"></select>
        </div>
      </div>
      <div class="preview-rows" id="xl-preview" style="display:none;"></div>
    </div>
    <div class="modal-foot">
      <button class="m-btn m-btn-g" onclick="closeXlModal()">キャンセル</button>
      <button class="m-btn m-btn-p" id="xl-import-btn" onclick="doXlImport()" disabled>挿入する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

// テンプレートのELSを参照して入力フォームを動的生成
function rebuildInpFields(){
  // テンプレート名
  var tmplName=document.getElementById('inp-tmpl-name');
  var activeTmpl=getActiveTmpl();
  if(tmplName)tmplName.textContent=activeTmpl?activeTmpl.name:'';
  // カスタムフィールドのみ動的生成（植物名・価格は固定HTML）
  var cf=document.getElementById('inp-custom-fields');
  if(!cf)return;
  cf.innerHTML='';
  ELS.forEach(function(el){
    if(el.id==='name'||el.id==='price'||el.id==='tax'||el.id==='shop') return;
    if(el.type==='text'&&el.inputField){
      cf.appendChild(makeCustomRow(el));
    }
  });
  if(cf.children.length===0)cf.style.display='none';
  else cf.style.display='block';
}

function makeCustomRow(el){
  var frow=document.createElement('div');
  frow.className='custom-field';
  frow.dataset.elId=el.id;
  // 左端：任意はチェックボックス、必須はバー
  var lead=document.createElement('div');lead.className='efo-field-lead';
  var ck=null;
  if(el.optional){
    ck=document.createElement('input');ck.type='checkbox';
    ck.checked=false;ck.title=el.label+'を入力する';
    ck.addEventListener('change',function(){
      var inp=frow.querySelector('.efo-inp');
      if(inp){inp.disabled=!this.checked;inp.style.opacity=this.checked?'1':'0.38';}
      var badge=frow.querySelector('.efo-opt-badge');
      if(badge)badge.textContent=this.checked?'入力中':'任意';
      redrawPrev();
    });
    lead.appendChild(ck);
  } else {
    var req=document.createElement('div');req.className='efo-field-req';lead.appendChild(req);
  }
  frow.appendChild(lead);
  // ラベル
  // ヘッダー（ラベル+バッジ+チェック）
  var hdr=document.createElement('div');hdr.className='custom-field-hdr';
  var lbl=document.createElement('span');lbl.className='custom-field-lbl';lbl.textContent=el.label;hdr.appendChild(lbl);
  var ck=null;
  if(el.optional){
    var optLabel=document.createElement('label');optLabel.className='custom-field-opt';
    ck=document.createElement('input');ck.type='checkbox';ck.checked=false;
    ck.addEventListener('change',function(){
      var inp=frow.querySelector('.inp-text');
      if(inp){inp.disabled=!this.checked;inp.style.opacity=this.checked?'1':'0.38';}
      redrawPrev();
    });
    optLabel.appendChild(ck);optLabel.appendChild(document.createTextNode('入力する'));
    hdr.appendChild(optLabel);
  }
  frow.appendChild(hdr);
  // 入力欄
  var inp=document.createElement('input');
  inp.className='inp-text';inp.type='text';inp.id='inp-el-'+el.id;
  inp.placeholder=el.label+'を入力';
  if(el.optional){inp.disabled=true;inp.style.opacity='0.38';}
  inp.addEventListener('input',function(){redrawPrev();});
  frow.appendChild(inp);
  return frow;
}

function getCustomFieldValues(){
  var vals={};
  ELS.forEach(function(el){
    if(el.id==='name'||el.id==='price'||el.id==='tax'||el.id==='shop') return;
    if(el.type==='text'&&el.inputField){
      var row=document.querySelector('.efo-field[data-el-id="'+el.id+'"]');
      if(!row)return;
      var ck=row.querySelector('input[type=checkbox]');
      var inp=row.querySelector('.efo-inp');
      vals[el.id]={enabled:ck?ck.checked:true, value:inp?inp.value.trim():''};
    }
  });
  return vals;
}

function getActiveTmpl(){
  var arr=loadT();
  var dot=document.querySelector('.tmpl-item.act');
  if(!dot)return null;
  var id=dot.dataset.id;
  return arr.find(function(t){return t.id===id;})||null;
}

// ━━ TAB ━━
function switchTab(name,btn){
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.tnb,.bnb').forEach(function(b){b.classList.remove('active');});
  var panel=document.getElementById('panel-'+name);
  if(panel){
    panel.classList.add('on');
    panel.classList.remove('animate__animated','animate__fadeIn');
    void panel.offsetWidth; // reflow
    panel.classList.add('animate__animated','animate__fadeIn');
    panel.addEventListener('animationend',function h(){
      panel.classList.remove('animate__animated','animate__fadeIn');
      panel.removeEventListener('animationend',h);
    });
  }
  if(btn)btn.classList.add('active');
  // bnav同期
  var bmap={input:'bnav-input',template:'bnav-template',settings:'bnav-settings'};
  var bb=document.getElementById(bmap[name]);
  if(bb)bb.classList.add('active');
  // topnav同期
  var order=['input','template','settings'];
  var idx=order.indexOf(name);
  var tnbs=document.querySelectorAll('.tnb');
  if(tnbs[idx])tnbs[idx].classList.add('active');

  if(name==='template'){
    var cfg=gst();
    savedSnapshot={els:JSON.parse(JSON.stringify(ELS)),ca:cfg.ca,cb:cfg.cb,st:cfg.st};
    setTimeout(function(){redrawEd();},60);
    renderTmplList();
  }
  if(name==='input'){
    setTimeout(function(){
      var n=document.getElementById('inp-name');
      if(n)n.focus();
    },60);
    redrawPrev();
  }
}

// ━━ TAX RATE ━━
function setTaxRate(v,fromBtn){
  var n=parseInt(v)||0;if(n<0)n=0;if(n>99)n=99;
  TAX_RATE=n;
  var inp=document.getElementById('tax-rate-inp');if(inp)inp.value=n;
  var disp=document.getElementById('tax-rate-disp');if(disp)disp.textContent=n;
  var val=document.getElementById('tax-rate-val');if(val)val.textContent=n;
  // 旧ボタン
  ['8','10','c'].forEach(function(r){
    var btn=document.getElementById('taxbtn-'+r);if(!btn)return;
    if(r==='8') btn.classList.toggle('on',n===8&&fromBtn!=='c');
    else if(r==='10') btn.classList.toggle('on',n===10&&fromBtn!=='c');
    else btn.classList.toggle('on',fromBtn==='c'||(n!==8&&n!==10));
  });
  // 新ポップオーバーボタン
  var b8=document.getElementById('tpop-8');var b10=document.getElementById('tpop-10');
  if(b8)b8.classList.toggle('on',n===8&&fromBtn==='btn');
  if(b10)b10.classList.toggle('on',n===10&&fromBtn==='btn');
  redrawPrev();redrawAll();
}
function setTaxRateCustom(v){
  var n=parseInt(v)||0;if(n<0)n=0;if(n>99)n=99;
  TAX_RATE=n;
  var disp=document.getElementById('tax-rate-disp');if(disp)disp.textContent=n;
  var val=document.getElementById('tax-rate-val');if(val)val.textContent=n;
  ['8','10','c'].forEach(function(r){var btn=document.getElementById('taxbtn-'+r);if(!btn)return;if(r==='8')btn.classList.toggle('on',n===8);else if(r==='10')btn.classList.toggle('on',n===10);else btn.classList.toggle('on',n!==8&&n!==10);});
  var b8=document.getElementById('tpop-8');var b10=document.getElementById('tpop-10');
  if(b8)b8.classList.toggle('on',n===8);if(b10)b10.classList.toggle('on',n===10);
  redrawPrev();redrawAll();
}
function focusTaxInp(){
  ['8','10','c'].forEach(function(r){var b=document.getElementById('taxbtn-'+r);if(b)b.classList.toggle('on',r==='c');});
  var inp=document.getElementById('tax-rate-inp');if(inp){inp.focus();inp.select();}
}
function calcPrices(inputPrice){
  if(!inputPrice)return{base:0,incl:0};
  if(PRICE_MODE==='excl'){
    return{base:Math.round(inputPrice),incl:Math.round(inputPrice*(1+TAX_RATE/100))};
  } else {
    var incl=Math.round(inputPrice);
    return{base:Math.round(incl/(1+TAX_RATE/100)),incl:incl};
  }
}

// ━━ KEY HANDLERS ━━
function nameKey(e){
  if(e.key==='Enter'||e.key==='Tab'){
    e.preventDefault();
    if(!document.getElementById('inp-name').value.trim())return;
    var fields=document.querySelectorAll('.custom-field .inp-text:not(:disabled)');
    if(fields.length){fields[0].focus();fields[0].select();return;}
    var pi=document.getElementById('inp-price');if(pi){pi.focus();pi.select();}
  }
}
function priceKey(e){
  if(e.key==='Enter'){e.preventDefault();addItem();}
  if(e.key==='Tab'){e.preventDefault();addItem();}
}

// ━━ ITEMS ━━
function addItem(){
  var n=(document.getElementById('inp-name')||{value:''}).value.trim();
  var p=parseInt((document.getElementById('inp-price')||{value:''}).value)||0;
  if(!n){
    var ni=document.getElementById('inp-name');
    if(ni){ni.focus();shake(ni.parentElement);}
    return;
  }
  if(!p){
    var pi=document.getElementById('inp-price');
    if(pi){pi.focus();shake(pi.parentElement);}
    return;
  }
  var extras=getCustomFieldValues();
  items.push({name:n,price:p,extras:extras});
  document.getElementById('inp-name').value='';
  document.getElementById('inp-price').value='';
  document.querySelectorAll('.custom-field .inp-text').forEach(function(inp){inp.value='';});
  renderList();updateBadge();
  setTimeout(function(){var ni=document.getElementById('inp-name');if(ni)ni.focus();},30);
}
function shake(el){
  if(!el)return;
  el.style.transition='transform .08s';
  el.style.transform='translateX(-5px)';
  setTimeout(function(){el.style.transform='translateX(5px)';},80);
  setTimeout(function(){el.style.transform='translateX(0)';el.style.transition='';},160);
}
function removeItem(idx){
  items.splice(idx,1);renderList();updateBadge();redrawPrev();
}
function updateBadge(){
  var bdg=document.getElementById('pdf-bdg');
  if(bdg){bdg.style.display=items.length?'inline':'none';bdg.textContent=items.length+'件';}
}

var _confirmTimers={};
function showPopConfirm(wrap,idx){
  var ov=wrap.querySelector('.pop-confirm');if(!ov)return;
  ov.classList.add('show');
  var bar=ov.querySelector('.pop-confirm-bar-inner');
  if(bar){bar.style.transition='none';bar.style.width='100%';
    setTimeout(function(){bar.style.transition='width 3s linear';bar.style.width='0%';},20);
  }
  _confirmTimers[idx]=setTimeout(function(){hidePopConfirm(wrap,idx);},3100);
}
function hidePopConfirm(wrap,idx){
  clearTimeout(_confirmTimers[idx]);
  var ov=wrap.querySelector('.pop-confirm');if(ov)ov.classList.remove('show');
}

// ━━ RENDER LIST ━━
function renderList(){
  var empty=document.getElementById('list-empty');
  var grid=document.getElementById('list-items');
  var cnt=document.getElementById('list-cnt');
  if(cnt)cnt.textContent=items.length+'件';
  if(!items.length){
    if(empty)empty.style.display='block';
    if(grid)grid.innerHTML='';
    return;
  }
  if(empty)empty.style.display='none';
  if(!grid)return;
  grid.innerHTML='';
  var p=curPreset();
  var ar=p.cw/p.ch;
  var iw=Math.round(Math.min(160,grid.parentElement.clientWidth/2-10)*2);
  var ih=Math.round(iw/ar);
  items.forEach(function(item,idx){
    var wrap=document.createElement('div');wrap.className='pop-item';
    var cvs=document.createElement('canvas');cvs.width=iw;cvs.height=ih;
    var ctx=cvs.getContext('2d');
    drawPop(ctx,0,0,iw,ih,item,gst());
    wrap.appendChild(cvs);
    // 削除ボタン
    var del=document.createElement('button');del.className='pop-del';del.textContent='✕';
    del.addEventListener('click',function(e){e.stopPropagation();showPopConfirm(wrap,idx);});
    wrap.appendChild(del);
    // 確認オーバーレイ
    var conf=document.createElement('div');conf.className='pop-confirm';
    conf.innerHTML=
      '<div class="pop-confirm-msg">削除しますか？</div>'+
      '<div class="pop-confirm-btns">'+
        '<button class="pop-confirm-yes">削除</button>'+
        '<button class="pop-confirm-no">キャンセル</button>'+
      '</div>'+
      '<div class="pop-confirm-bar"><div class="pop-confirm-bar-inner"></div></div>';
    conf.querySelector('.pop-confirm-yes').addEventListener('click',function(){removeItem(idx);});
    conf.querySelector('.pop-confirm-no').addEventListener('click',function(){hidePopConfirm(wrap,idx);});
    wrap.appendChild(conf);
    grid.appendChild(wrap);
  });
}

// ━━ GRID ━━
function buildGrid(){
  var wrap=document.getElementById('grid-wrap');if(!wrap)return;
  wrap.innerHTML='';
  PRESETS.forEach(function(p){
    var div=document.createElement('div');
    div.className='gc'+(p.c===gridCols&&p.r===gridRows?' sel':'');
    // ビジュアル
    var vis=document.createElement('div');
    vis.className='gc-vis';
    vis.style.gridTemplateColumns='repeat('+p.c+',1fr)';
    vis.style.width=(p.c*14)+'px';
    for(var i=0;i<p.c*p.r;i++){
      var cell=document.createElement('div');cell.className='gc-cell';
      cell.style.width='12px';cell.style.height='8px';vis.appendChild(cell);
    }
    div.appendChild(vis);
    var lbl=document.createElement('div');lbl.className='gc-lbl';lbl.textContent=p.lbl;div.appendChild(lbl);
    var sub=document.createElement('div');sub.className='gc-sub';sub.textContent=Math.round(p.cw)+'×'+Math.round(p.ch)+'mm';div.appendChild(sub);
    if(p.def){var tag=document.createElement('div');tag.className='def-tag';tag.textContent='標準';div.appendChild(tag);}
    div.addEventListener('click',function(){gridCols=p.c;gridRows=p.r;buildGrid();updateOrientInfo();redrawPrev();});
    wrap.appendChild(div);
  });
}
